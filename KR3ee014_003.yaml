body:
  text: 卷二騎竹馬法治癰疽惡瘡發背男左女右臂腕中橫紋起用薄篾一條量至中指齊肉盡處不量爪甲截斷次用薄篾取前同身寸一寸則可卻令病人脫去上下衣服以大竹槓一條跨定兩人隨徐扛起足要離地五寸許兩旁更以兩人扶定毋令動搖不穩卻以前量長篾貼定竹槓豎起從尾骶骨貼脊量至篾盡處以筆點記此不是穴卻用後取同身寸篾取兩寸平折自中橫量兩頭各一寸方是灸穴可灸三壯依法量穴在督脈脊中至陽筋束二穴中外太陽行背二行鬲俞肝俞之內非正當穴也疑必後人傳訛以三寸為二寸耳豈有不得正穴徒破好肉而能愈病哉此不能無疑也四花穴法崔知悌云灸骨蒸勞熱灸四花穴以稻稈心量口縫如何闊斷其多少以如此長裁紙四方當中剪小孔別用長稻稈踏腳下前取腳大指為止後取腳曲䐐橫紋中為止斷了卻環在結喉下垂向背後看稻稈止處即以前小孔紙當中安分為四花灸紙角也可灸七壯初疑四花穴古人恐人不識點穴故立此捷法當必有合於五臟俞也今依此法點穴果合太陽行背二行鬲俞膽俞四穴難經曰血會鬲俞疏曰血病治此蓋骨蒸勞熱血虛火旺故取此以補之膽者肝之府藏血故亦取是俞也崔氏止言四花而不言鬲俞膽俞四穴者為粗工告也今只依揣摸脊骨鬲俞膽俞為正然人口有大小闊狹不同故四花亦不準灸癆穴法資生經云久癆其狀手足心熱多盜汗精神困頓骨節疼寒初發咳嗽漸吐膿血肌瘦面黃減食少力令身正直用草子男左女右自腳中指尖量過腳心下向上至曲䐐大紋處截斷卻將此草自鼻尖量從頭正中分開頭心發貼肉量至脊以草盡處用墨點記別用草一條令病人自然合口量闊狹截斷卻將此草於墨點上平折兩頭盡處量穴灸時隨年多灸一壯如年三十灸三十一纍效依此量之其穴合五椎兩旁三寸心俞二穴也豈心主血故灸之歟取腎俞法千金注云凡取腎俞者在平處立以杖子約量至臍又以此杖子當背脊骨上量之知是與臍平處也然後相去各寸半取其穴則腎俞也按此法以臍准腎俞雖似然肥人腹垂則臍低瘦人腹平則臍平今不論肥瘦均以杖量之未有準也竇氏八穴或云少室隱者之所傳劉氏曰八穴用為輔治非拘於法取者也公孫足太陰脾通衝脈合於心胸主治二十七證九種心痛心胃痰鬲涎悶心胸臍腹痛脹三焦胃脅肋疼痛心脾産後血迷心主氣隔食不下小腸胃泄瀉不止大腸胃痃氣疼痛心胃裡急後重大腸傷寒結胸小腸心水隔酒痰肝胃中滿不快反胃嘔吐胃腹脅脹滿痛脾胃腸風下血大腸包絡脫肛不收大人小兒大腸肺氣隔心肺食隔不下胃脾食積疼痛胃脾癖氣小兒食癖小腸心主兒枕痛婦人血塊小腸三焦酒癖胃三焦腹鳴小腸胃血刺痛肝脾小兒脾瀉脾腎瀉腹痛大腸胃胸中刺痛心瘧疾心痛心包絡上病公孫悉主之先取公孫後取內關內關手厥陰心包絡通陰維主治二十五證中滿不快心胃傷寒心主心胸痞滿肝胃吐逆不定脾胃胸滿痰隔肺心腹痛胃泄瀉滑腸大腸酒痰隔痛心主米穀不化胃橫豎痃氣肝胃小兒脫肛大腸肺九種心痛心主胃脅肋痛肝膽婦人血刺痛心肝腸鳴大腸積塊痛肝男子酒癖脾肺二膈並心下痞痛心脾胃氣膈食不下胃心肺腹肋脹痛脾胃心主腸風下血大腸傷寒結胸胃裡急後重小腸食膈不下食心主胃痎瘧寒熱新添有驗上病證內關悉主之臨泣此足臨泣也足少陽膽經通帶脈合於目上走耳後頰頸缺盆胸鬲主治二十五證足趺腫痛胃手足麻小腸三焦手指顫掉肝心主赤眼冷淚膀胱咽喉腫痛三焦手足攣急肝腎脅肋痛膽牙齒痛胃大腸手足發熱胃心主解利傷寒膀胱腿胯痛膽腳膝腫痛胃肝四肢不遂膽頭風腫膀胱頭頂腫膀胱浮風瘙癢肺身體腫腎胃身體麻肝脾頭目眩膀胱筋攣骨痛肝胃頰腮痛大腸雷頭風膽眼目腫痛肝心中風手足不舉腎耳聾腎膽上列病證臨泣悉主之先取臨泣後取外關外關手少陽三焦經通陽維主治二十七證肢節腫痛腎腎膊冷痛三焦鼻衄肺手足發熱三焦手指節痛不能屈伸三焦眉稜中痛膀胱手足疼痛胃産後惡風腎胃傷寒自汗胃肺頭風膀胱四肢不遂膽胃筋骨疼痛肝腎迎風淚出肝赤目疼痛肝心腰背腫痛腎手足麻痛並無力胃眼腫心頭風掉眩痛膀胱傷寒表熱膀胱破傷風肝胃手臂痛大腸三焦頭項痛小腸盜汗心主目翳或隱澀肝産後身腫胃腎腰胯痛腎雷頭風膽上病證外關悉主之後溪手太陽小腸經通督脈合於內眥走頭項耳戶膊小腸膀胱主治二十四證手足攣急肝手足顫掉肝三焦頭風痛三焦膀胱傷寒不解膀胱盜汗不止肺心中風不語經絡肝牙齒痛胃大腸癲癇吐沫胃腰背強痛腎筋骨痛肝胃咽喉閉塞腎肺胃頰腮腫痛胃小腸傷寒項強或痛膀胱膝脛腫痛腎手足麻胃眼赤腫肝心傷寒頭痛膀胱表汗不出肺胃迎風淚下肝膽破傷風搐肝産後汗出惡風肺喉痹肺肝腳膝腿疼胃手麻痹大腸上病後溪穴主之先取後溪後取申脈申脈足太陽膀胱經通陽蹺主治二十五證腰背強痛膀胱肢節煩痛腎肝手足不遂胃肺傷寒頭痛膀胱身體腫滿胃頭面自汗胃癲癇肝目赤腫痛膀胱傷風自汗胃頭風癢痛膽眉稜痛膀胱雷頭風膽手臂痛大腸臂冷三焦産後自汗腎鼻衄肺破傷風肝肢節腫痛腎肝腿膝腫痛胃耳聾腎手足麻膽吹奶胃洗頭風膀胱手足攣肝腎産後惡風腎上病申脈穴主之先取申脈後取後溪列缺手太陰肺經通任脈合肺及肺系喉嚨胸鬲主治三十一證寒痛泄瀉脾婦人血積痛或敗血肝咽喉腫痛胃死胎不出及胎衣不下肝牙齒腫痛胃大腸小腸氣撮痛小腸脅癖痛肝肺吐唾膿血肺咳嗽寒痰肺痃氣胃食噎不下胃臍腹撮痛脾心腹痛脾腸鳴下痢大腸痔癢痛漏血大腸心痛溫痢脾産後腰痛腎肝産後發狂心産後不語心包絡米穀不化脾男子酒癖胃肝乳癰腫痛胃婦人血塊肝腎溫病不瘥膽吐逆不止脾胃小便下血小腸小便不通膀胱大便閉塞大腸大便下血大腸胃腸痛病心胃諸積心胃上病列缺悉主之先取列缺後取照海照海足少陰腎經通陰蹺主治二十七證喉嚨閉塞胃小便冷痛腎肝小便淋澀不通膀胱婦人血暈肝腎膀胱氣痛膀胱胎衣不下肝臍腹痛脾小腹脹滿小腸腸澼下血大腸飲食不納反胃吐食胃男子癖並酒積肺肝腸鳴下痢腹痛大腸中滿不快胃食不化胃婦人血積腎心兒枕痛胃肝難産腎肝泄瀉脾嘔吐胃酒積脾痃氣胃氣塊脾肝腎酒痹胃肝氣膈心主大便不通大腸食勞黃脾胃足熱厥心主上病照海悉主之先取照海後取列缺上法先刺主證之穴隨病左右上下所在取之仍循捫道引按法祛除如病未已必求合穴未已則求之須要停針待氣使上下相接快然無其所苦而後出針按此八穴治法溥博亦許學士所謂廣絡原野冀獲一免者也子午流注髎穴開闔膽甲日甲與己合膽引氣行木原在寅甲戌時竅陰井膽丙子時前谷滎小腸戊寅時陷谷俞胃並過本原丘墟庚辰時陽溪經大腸壬午時委中合膀胱甲申時氣納三焦肝乙日乙與庚合肝與血行乙酉時大敦井肝丁亥時少府滎心己丑時太白俞脾辛卯時經渠經肺癸巳時陰谷合腎乙未時血納包絡小腸丙日丙與辛合小腸引氣出行火原在子火入水鄉丙申時少澤井小腸戊戌時內庭滎胃庚子時三間俞大腸過本原腕骨原火原在子壬寅時崑崙經膀胱甲辰時陽陵泉合膽丙午時氣納三焦心丁日丁與壬合心引血行丁未時少衝井心己酉時大都滎脾辛亥時太淵俞肺癸丑時復溜經腎乙卯時曲泉合肝丁巳時血納包絡胃戊日戊與癸合胃引氣出行土原在戌戊午時厲兌井胃庚申時三間滎大腸壬戌時束骨俞膀胱過本原衝陽土原在戊甲子時陽輔經膽丙寅時少海合小腸戊辰時氣納三焦脾己日甲與己合脾引血行己巳時隱白井脾辛未時魚際滎肺癸酉時太溪俞腎乙亥時中封經肝丁丑時少海合心己卯時血納包絡大腸庚日庚與乙合大腸引氣出行金原在申庚辰時商陽井大腸壬午時通谷滎膀胱甲申時臨泣俞膽過本原合谷金原在申丙戌時陽谷經小腸戊子時三里合胃庚寅時氣納三焦支溝肺辛日丙與辛合肺引血出行辛卯時少商井肺癸巳時然谷滎腎乙未時太衝俞肝丁酉時靈道經心己亥時陰陵泉合脾辛丑時血納包絡膀胱壬日丁與壬合膀胱引氣出行水原在午水入火鄉壬寅時至陰井膀胱甲辰時俠溪滎膽丙午時後溪俞小腸過本原京骨水原在午火入水鄉故壬丙子午相交戊申時解溪經胃庚戌時曲池合大腸壬子時氣納三焦還原化本腎癸日戊與癸合腎引血行癸亥時湧泉井腎乙丑時行間滎肝丁卯時神門俞心己巳時商丘經脾辛未時尺澤合肺癸酉時血納包絡三焦十二經之本生氣之原主通行榮衛經歷五臟六腑壬子時關衝井三焦甲寅時液門滎丙辰時中渚俞過本原陽池原戊午時支溝經庚申時天井合壬戌時氣入行心包絡心主與三焦為表裡癸丑時中衝井乙卯時勞宮滎丁巳時大陵俞己未時間使經辛酉時曲澤合癸亥血入行上子午流注開闔時原有方圓二圖今直録之以便記誦舊方圖以甲己為九乙庚為八丙辛為七丁壬為六戊癸為五子午為九丑未為八寅申為七卯酉為六辰戌為五巳亥為四圓圖無此而缺三焦包絡大抵書之有圖所以彰明其理耳今反晦之是以不録竇氏井滎俞經合應日開闔有圖有說今人泥其圖而不詳其說妄言今日某日某時其穴開凡百病皆針灸此開穴明日某日某時其穴開凡百病針灸明日開穴誤人多矣今去其圖直録其說使人知某病宜針灸某經某穴當用某日某時開方針如東垣治前陰臊臭刺肝經行間用乙丑時矣又刺少衝則宜丁未日矣豈東垣治一病而有首尾越四十三日刺兩穴哉此又不通之論也大抵醫自素難之下皆為旁溪曲徑非周行也臟腑井滎俞經合主治假令得弦脈病人善潔膽為清淨之府故耳面青善怒此膽病也若心下滿當刺竅陰井身熱當刺俠溪滎體重節痛刺臨泣俞喘咳寒熱刺陽輔經逆氣而泄刺陽陵泉合又總取丘墟原假令得弦脈病人淋溲難轉筋四肢滿閉臍右有動氣此肝病也若心下滿當刺大敦井身熱刺行間滎體重節痛刺太衝俞喘嗽寒熱刺中封經逆氣而泄刺曲泉合假令得浮洪脈病人面赤口乾喜笑此小腸病也若心下滿刺少澤井身熱刺前谷滎體重節痛刺後溪俞喘嗽寒熱刺陽谷經逆氣而泄刺小海合又總刺腕骨原假令得浮洪脈病人煩心心痛掌中熱而噦臍上有動氣此心病也若心下滿刺少衝井身熱刺少府滎體重節痛刺神門俞喘嗽寒熱刺靈道經逆氣而泄刺少海合假令得浮緩脈病人面黃善噫善思善沫此胃病也若心下滿刺厲兌井身熱刺內庭滎體重節痛刺陷谷俞喘嗽寒熱刺解溪經逆氣而泄刺三里合又總刺衝陽原假令得浮緩脈病人腹脹滿食不消體重節痛怠隋嗜臥四肢不收當臍有動氣按之牢若痛此脾病也若心下滿刺隱白井身熱刺大都滎體重節痛刺太白俞喘嗽寒熱刺商丘經逆氣而泄刺陰陵泉合假令得浮脈病人面白善嚏悲愁不樂欲哭此大腸病也若心下滿刺商陽井身熱刺二間滎體重節痛刺三間俞喘嗽寒熱刺陽溪經逆氣而泄刺曲池合又總刺合谷原假令得浮脈病人喘嗽灑淅寒熱臍右有動氣按之牢若痛此肺病也若心下滿刺少商井身熱刺魚際滎體重節痛刺太淵俞喘嗽寒熱刺經渠經逆氣而泄刺尺澤合假令得沉遲脈病人面黑善恐缺此膀胱病也若心下滿刺至陰井身熱刺通谷滎體重節痛刺束骨俞喘嗽寒熱刺崑崙經逆氣而泄刺委中合又通刺京骨原假令得沉遲脈病人逆氣小腹急痛泄如下重足脛寒而逆此腎病也若心下滿刺湧泉井身熱刺然谷滎體重節痛刺太溪俞喘嗽寒熱刺復溜經逆氣而泄刺陰谷合此五臟六腑井滎俞經合刺法深得素難之旨學者不可不知十二經是動所生病補瀉迎隨經曰十二經病盛則瀉之虛則補之熱則疾之寒則留之不盛不虛以經取之又曰迎而奪之隨而濟之又曰虛則補其母實則瀉其子難經曰經脈行血氣通陰陽以榮於身者也其始平旦寅時從中焦注手太陰肺陽明大腸卯陽明注足陽明胃辰太陰脾巳太陰注手少陰心午太陽小腸未太陽注足太陽膀胱申少陰腎酉少陰注手心主包絡戌少陽三焦亥少陽注足少陽膽子厥陰肝醜厥陰復注於手太陰如環無端轉相灌溉又曰迎隨者知榮衛之流行經脈之往來隨其順逆而取之又曰所出為井所溜為滎所注為俞所行為經所入為合又曰井者東方春也萬物之始生故言井合者北方冬陽氣入臟故言合舉始終而言經俞在其中矣又曰諸井者肌肉淺薄不足為使也刺井當刺滎滑氏曰補井當補合又曰原者三焦之尊號五臟六腑有病皆取其原又曰瀉南方補北方今本素難發揮於左圓機之士必以為贅姑以私備忘爾十二經病井滎俞經合補虛瀉實手太陰肺經屬辛金起中府終少商多氣少血寅時注此是動病邪在氣氣為是動病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀是謂臂厥所生病邪在血血為所生病咳嗽上氣喘喝煩心胸滿臑臂內前廉痛掌中熱氣盛有餘則肩背痛風寒疑寒字衍汗出中風小便數而缺寸口大三倍於人迎虛則肩背痛寒少氣不足以息溺色變卒遺失無度寸口反小於人迎也補虛則補之用卯時隨而濟之太淵穴在掌後陷中為經土土生金為母經曰虛則補其母瀉盛則瀉之用寅時迎而奪之尺澤為合水金生水實則瀉其子穴在肘中約紋動脈中手陽明大腸經為庚金起商陽終迎香氣血俱多卯時注此是動病齒痛頰腫是主津所生病目黃口乾鼽衄喉痹肩前臑痛大指次指不用氣有餘則當脈所過者熱腫人迎大三倍於寸口虛則寒栗不復人迎反小於寸口也補用辰時曲池穴在肘外輔骨屈肘曲骨之中拱胸取之為合土土生金虛則補其母瀉用卯時二間穴在食指本節前內側陷中為滎水金生水為子實則瀉其子足陽明胃經屬戊土起承泣終厲兌氣血俱多辰時氣血注此是動病灑灑然振寒善伸數缺顏黑病至惡人與火聞木音則惕然而驚心動欲獨閉戶牖而處甚則欲上高而歌棄衣而走賁響腹脹是謂骭厥主血所生病狂瘧溫淫汗出鼽衄口喎唇疹喉痹大腹水腫膝臏腫痛循胸乳氣衝股伏兔䯒外廉足跗上皆痛中指不用氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃人迎大三倍於寸口氣不足則身以前皆寒栗胃中寒則脹滿人迎反小於寸口也補用巳時解溪穴在衝陽後一寸五分腕上陷中為經火火生土經曰虛則補其母瀉用辰時厲兌穴在足大指次指去甲如韭葉為金井土生金經曰實則瀉其子足太陰脾經屬己土起隱白終周榮多氣少血巳時氣血注此是動病舌本強食則嘔胃脘痛腹脹善噫得後出與氣則快然如衰身體皆重是主脾所生病舌本痛體不能動搖食不下煩心心下急痛寒瘧溏瘕泄水閉黃疸不能臥強立膝股內腫厥足大指不用盛者寸口大三倍於人迎虛者寸口小三倍於人迎也補用午時大都穴在足大指本節後陷中為滎火火生土為母虛則補其母瀉用巳時商丘穴在足內踝下微前陷中為經金土生金實則瀉其子手少陰心經屬丁火起極泉終少衝多血少氣午時注此是動病嗌乾心痛渴而欲飲是為臂厥主心所生病目黃脅痛臑臂內後廉痛厥掌中熱盛者寸口大再倍於人迎虛者寸口反小於人迎也補用未時少衝穴在手小指內廉端去爪甲如韭葉為井木木生火為母經曰虛則補其母瀉用午時靈道穴在掌後一寸五分為經土土生金為子實則瀉其子手太陽小腸經屬丙火起少澤終聽宮多血少氣未時注此是動病嗌痛頷腫不可回顧肩似拔臑似折是主液所生病耳聾目黃頰腫頸頷肩臑肘臂外後廉痛盛者人迎大再倍於寸口虛者人迎反小於寸口也補用申時後溪穴在手小指外側本節後陷中為俞木木生火虛則補其母瀉用未時小海穴在肘內大骨外肘端五分陷中為合土火生土為子實則瀉其子足太陽膀胱經屬壬水起睛明終至陰多血少氣申時注此是動病頭痛目似脫項似拔脊痛腰似折髀不可以曲膕如結腨似裂是為踝厥是主筋所生病痔瘧狂癲頭囟項痛目黃淚出鼽衄項背腰尻膕腨腳皆痛小指不用盛者人迎大再倍於氣口虛者人迎反小於氣口也補用酉時至陰穴在足小指外側去爪甲角如韭葉為井金金生水為母虛則補其母瀉用申時束骨穴在足小指外側本節後陷中為俞水水生木為子實則瀉其子足少陰腎經屬癸水起湧泉終俞府多血少氣酉時注此是動病飢不欲食面黑如炭色咳唾則有血喝喝而喘坐而欲起目䀮䀮然如無所見心如懸飢狀氣不足則善恐心惕然如人將捕之是謂骨厥是主腎所生病口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛盛者寸口大再倍於人迎虛者寸口反小於人迎也補用戌時復溜穴在足內踝上二寸動脈陷中為經金金生水虛則補其母瀉用酉時湧泉穴在足心陷中為井木水生木木為水之子實則瀉其子手厥陰心包絡經配腎相火起天池終中衝多血少氣戌時注此是動病手心熱臂肘攣痛腋腫甚則胸脅肢滿心中淡淡大動面赤目黃喜笑不休是主心包絡所生病煩心心痛掌中熱盛者寸口大三倍於人迎虛者寸口反小於人迎補用亥時中衝穴在手中指端去爪甲如韭葉為井木木生火為母虛則補其母滑氏曰井者肌肉淺薄不足為使也補井者當補合瀉用戌時大陵穴在掌後兩筋間陷中為俞土火生土為子實則瀉其子手少陽三焦經屬相火配心包起關衝終絲竹空多氣少血亥時注此是動病耳聾渾渾焞焞咽腫喉痹是主氣所生病汗出目鋭眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用盛者人迎大一倍於寸口虛者人迎反小於氣口也補用子時中渚穴在手小指次指本節後陷中為俞木木生火為母虛則補其母瀉用亥時天井穴在肘外大骨後上一寸兩筋間陷中屈肘得之甄權云屈肘一寸叉手按膝頭取之兩筋骨罅為合土火生土為子實則瀉其子足少陽膽經屬甲木起瞳子髎終竅陰多氣少血子時注此是動病口苦善太息心脅痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥是主骨所生病頭角頷痛目鋭眥痛缺盆中腫痛腋下腫馬刀挾癭汗出振寒瘧胸中脅肋髀膝外至脛絶骨外踝前及諸節皆痛小指次指不用盛者人迎大三倍於寸口虛者人迎反小於寸口也補用丑時俠溪穴在足小指次指岐骨間本節前陷中為滎水水生木為母虛則補其母丘墟穴在足外踝下去臨泣三寸為原皆取之瀉用子時陽輔穴在足外踝上四寸輔骨前絶骨端去丘墟七寸為經火木生火為子實則瀉其子足厥陰肝經屬乙木起大敦終期門多血少氣丑時注此是動病腰痛不可俯仰丈夫㿗疝婦人小腹腫甚則嗌乾面塵脫色是主肝所生病胸滿嘔逆洞泄狐疝遺溺癃閉盛者寸口大一倍於人迎虛者寸口反小於人迎也補用寅時曲泉穴在膝內輔骨下大筋上小筋下陷中屈膝得之在膝橫文頭是為合水水生木為母虛則補其母瀉用丑時行間穴在足大指間動脈應手為滎火木生火為子實則瀉其子上針法井滎俞經合補瀉皆本素難也東垣針法東垣針法悉本素難近世醫者止讀玉龍金針標幽等歌賦而於先生之所以垂教者廢而不講宜其針之不古若而病之不易瘳也茲故表而出之引伸觸類應用不窮矣東垣曰黃帝針經胃病者胃脘當心而痛上支兩脅膈咽不通飲食不下取三里以補之脾胃虛弱感濕成痿汗大泄妨食三里氣衝以三稜針出血若汗不減不止者於三里穴下三寸上廉穴出血禁酒濕面東垣曰黃帝針經云從下上者引而去之上氣不足推而揚之蓋上氣者心肺上焦之氣陽病在陰從陰引陽去其邪氣於腠理皮毛也又云視前痛者當先取之是先以謬刺瀉其經絡之壅者為血凝而不流故先去之而治他病東垣曰胃氣下溜五臟氣皆亂其為病互相出見黃帝曰五亂刺之有道乎岐伯曰有道以來有道以去審知其道是謂身寶帝曰願聞其道岐伯曰氣在於心者取之手少陰心主之輸神門大陵同精導氣以復其本位氣在於肺者取之手太陰滎足少陰輸魚際太溪成痿者以導溫熱引胃氣出陽道不令濕土克腎其穴在太溪氣在於腸胃者取之足太陰陽明不下者取之三里章門中脘因足太陰虛者於募穴中導引之於血中有一說腑輸去腑病也胃虛而致太陰無所稟者於足陽明之募穴中引導之如氣逆為霍亂者取三里氣下乃止不下復始氣在於頭取之天柱大杼不足取之足太陽滎輸通谷束骨先取天柱大杼不補不瀉以導氣而已取足太陽膀胱經中不補不瀉深取通谷束骨丁心火己脾土穴中以引導去之氣在於臂足取之先去血脈後取其陽明少陰之滎輸二間三間深取之內庭陷谷深取之視其足臂之血絡盡取之後治其痿厥皆不補不瀉從陰深取引而上之上者出也去也皆陰火有餘陽氣不足伏匿於地中者榮血也當從陰引陽先於地中升奉陽氣次瀉陰火乃導氣同精之法帝曰補瀉奈何曰徐入徐出謂之導氣補瀉無形謂之同精是非有餘不足也亂氣之相逆也帝曰允乎哉道明乎哉問請著之玉版命曰治亂也東垣曰陰病治陽陽病治陰陰陽應象論云審其陰陽以別柔剛陽病治陰陰病治陽定其血脈各守其鄉血實宜決之氣虛宜掣引之夫陰病在陽者是天外風寒之邪乘中而外入在人之背上腑腧臟腧是人之受天外客邪亦有二說中於陽則流於經此病始於外寒終歸外熱故以治風寒之邪治其各臟之俞非止風寒而已六淫濕暑燥火皆五臟所受乃筋骨血脈受邪各有背上五臟腧以除之傷寒一說從仲景中八風者有風論中暑者治在背上小腸俞中濕者治在胃俞中燥者治在大腸俞此皆六淫客邪有餘之病皆瀉其背之腑俞若病久傳變有虛有實各隨病之傳變補瀉不定只治在背腑俞別有上熱下寒經曰陰病在陽當從陽引陰必須先去絡脈經隧之血若陰中火旺上騰於天致六陽反不衰而上充者先去五臟之血絡引而下行天氣降下則下寒之病自去矣慎勿獨瀉其六陽此病陽亢乃陰火之邪滋之只去陰火只損脈絡經隧之邪勿誤也陽病在陰者病從陰引陽是水穀之寒熱感則害人六腑又曰飲食失節及勞役形質陰火乘於坤土之中致穀氣營氣清氣胃氣元氣不得上升滋於六腑之陽氣是五陽之氣先絶於外外者天也下流伏於坤土陰火之中皆先由喜怒悲憂恐為五賊所傷而後胃氣不行勞役飲食不節繼之則元氣乃傷當從胃俞合三里穴中推而揚之以伸元氣故曰從陰引陽若元氣愈不足治在腹上諸腑之募穴若傳在五臟為九竅不通隨各竅之病治其各臟之募穴於腹故曰五臟不平乃六腑元氣閉塞之所生也又曰五臟不和九竅不通皆陽氣不足陰氣有餘故曰陽不勝其陰凡治腹之募皆為元氣不足從陰引陽勿誤也若錯補四末之腧錯瀉四末之腧皆非也錯瀉者差尤甚矣按岐伯所說只取穴於天上天上者人之背上五臟六腑之俞不當瀉而瀉豈有生者乎興言及此寒心切骨若六淫客邪及上熱下寒筋骨皮肉血脈之病苟錯取穴於胃之合及諸腹之募者必危亦岐伯之言下工豈可不慎哉東垣曰三焦元氣衰王黃帝針經云上氣不足腦為之不滿耳為之苦鳴頭為之傾目為之瞑中氣不足溲便為之變腸為之苦鳴下氣不足則為痿厥心悗補足外踝留之東垣曰一富者前陰臊臭又因連日飲酒腹中不和求先師治之曰夫前陰足厥陰之脈絡循陰器出其挺末凡臭者心之所主散入五方為五臭入肝為臊此其一也當於肝經中瀉行間是治其本後於心經中瀉少衝乃治其標治例傷寒發熱風寒客於皮膚陽氣怫鬱所致此表熱也陽氣下陷入陰分蒸熏此裡熱也汗不出悽悽惡寒取玉枕大杼肝俞鬲俞陶道身熱惡寒後溪身熱汗出足厥冷取大都身熱頭痛食不下取三焦俞汗不出取合谷後溪陽池厲兌解溪風池身熱而喘取三間餘熱不盡取曲池煩滿汗不出取風池命門汗出寒熱取五處攢竹上脘煩心好嘔取巨闕商丘身熱頭痛汗不出取曲泉身熱進退頭痛取神道關元懸顱以上出針經六脈沉細一息二三至灸氣海關元少陰發熱灸太溪惡寒有熱惡寒者發於陽無熱惡寒者發於陰背惡寒口中和灸關元惡風有汗為中風衛病無汗惡風為寒傷榮先刺風池風府卻與桂枝葛根湯胸脅滿邪氣自表侵里必先自胸脅以次入心腹胃胸脅滿兼譫語刺期門結胸臟氣閉而不流布也按之痛為小結不按自痛為大結刺期門刺肺俞嚴仁庵婦人因血結胸熱入血室刺期門又以黃連巴豆七粒作餅子置臍中以火灸之得利為度咳逆胸中氣不交也水火相搏而有聲故咳逆也刺期門小腹滿物聚而滿上為氣下為溺與血小腹硬小便自利其人如狂血證也當出不出積而為滿中痧腹虛脹或腹中急痛刺括委中或奪命穴等處煩躁邪氣在裡煩為內不安躁為外不安傷寒六七日脈微手足厥冷煩躁灸厥陰俞穴蓄血熱毒流於下而瘀血者少陰證下利便膿血者可刺陽明病下血譫語必熱入血室頭汗出者當刺期門嘔吐表邪傳裡裡氣上逆則為嘔吐口中和脈微澀弱皆灸厥陰脈經千金翼林氏本曰灸厥陰五十壯戰栗戰者正氣勝栗者邪氣勝邪與正爭心戰而外栗為病欲解也心氣內盛正氣大虛心栗而鼓頷身不戰者已而遂成寒逆者宜灸之四逆四肢逆冷而不溫積涼成寒六腑氣絶於外四肢手足寒冷足脛寒逆少陰也四肢厥冷身寒者厥陰也四逆灸氣海腎俞肝俞厥手足逆冷陽氣伏陷熱氣逆伏而手足冷也刺內庭大都龐氏曰脈促而厥者灸之鬱冒郁為氣不舒冒為神昏不清即昏迷是也多虛極乘寒所致或吐下使然鬱冒刺太陽少陽並病頭痛或冒悶如結胸狀當刺大椎第一間及肺肝二俞慎不可汗自利不經攻下自溏泄下利脈微澀嘔而汗出必更衣反小者當溫上灸之以消陰小便自利手中不冷反發熱脈不至灸少陰太溪穴少陰下利便膿血者可刺之宜通用之熱入血室男子由陽明而傷下血譫語婦人則隨經而入月水適來邪乘虛入七八日熱除而脈遲胸脅滿如結胸狀譫語此熱入血室刺期門用甘草芍藥湯不已刺隱白霍亂上吐下利揮霍撩亂邪在中焦胃氣不治陰陽乖隔遂上吐下利躁擾煩亂也乾霍亂或腹中急痛絞刺宜刺委中及奪命穴腹痛有實有虛寒熱燥屎舊積按之不痛為虛痛為實合灸不灸令病人冷結久而彌困氣衝心而死刺括委中穴陰毒陰證陰病盛則微陽消於上故沉重四肢逆冷臍腹築痛厥逆或冷六脈沉細陰毒灸關元氣海太陽少陽並病刺肺俞肝俞如頭痛刺大椎小便不利邪蓄於內津液不行陰寒甚下閉者灸之陰證小便不利必陰囊縮入小腹痛欲死者灸石門不仁不柔和癢痛寒熱皆不知正氣為邪氣閉伏鬱而不散血氣虛少故也若越人入診虢太子尸厥以鬱冒不仁為可治刺之而濟痊者神醫之診也設脈浮洪汗如油喘不休體不仁越人其能治哉以上見劉氏傷寒治例雜病風大率主血虛氣虛火與濕多痰中風神闕風池百會曲池翳風風市環跳肩髃皆可灸之以鑿竅疏風又針以道氣寒見傷寒陰寒及陷下脈絶者宜灸之發熱有寒熱潮熱煩熱往來熱熱病汗不出商陽合谷陽谷俠溪厲兌勞宮腕骨以導氣熱無度不止陷谷血以泄熱腹痛有實有虛有寒氣滯死血積熱風濕痰驚痰食瘡痧疝實痛宜刺瀉之太衝三陰交太白太淵大陵邪客經絡藥不能及者宜灸氣海關元中脘頭痛有風風熱痰濕寒真頭痛手足青至節死不治灸疏散寒針脈浮刺腕骨京骨脈長合骨衝陽脈弦陽池風府風池腰痛氣虛血虛腎病風濕濕熱瘀寒氣滯血滯於下委中出血灸腎俞崑崙又用附子尖烏頭尖南星麝香雄黃樟腦丁香煉蜜丸薑汁化開成膏放手內烘熱摩之脅痛肝火盛木氣實有死血痰注肝急針丘墟中瀆心痛有風寒氣血虛食積熱針太溪然谷尺澤行間建里大都太白中脘神門湧泉牙疼主血熱胃口有熱風寒濕熱蟲蛀合谷內庭浮白陽白三間眼目肝氣實風熱痰熱血瘀熱血實氣壅絲竹空上星百會攢竹宣泄痛者風池合谷張子和治眼目神庭上星前頂灸大寒犯腦連及目痛或風濕相搏風邪皆可用有翳取二間合谷小兒疳眼灸合谷二穴各一壯瀉痢氣虛兼寒熱食積風邪驚邪熱濕陽氣下陷痰積當分治瀉輕痢重陷下則灸之脾俞關元腎俞復溜腹哀長強太溪大腸俞三里氣舍中脘白痢大腸俞赤小腸俞瘧有風暑山嵐瘴氣食老瘧瘧母寒濕痹五臟瘧五腑瘧針合谷曲池公孫灸不拘男女於大椎中第一節處先針後灸三七壯立效或灸第三節亦可咳嗽風寒火勞痰肺脹濕灸天突肺俞肩井少商然谷肝俞期門行間廉泉扶突針曲澤出血立已前谷面赤熱咳支溝多唾三里吐衄血身熱是血虛血溫身熱者死不治針隱白脾俞上脘肝俞下血腸風多在胃與大腸針隱白灸三里諸氣怒則氣上驚則氣亂恐則氣下勞則氣散悲則氣消喜則氣緩思則氣結針以導氣淋屬熱熱結痰氣不利胞痹為寒老人氣虛灸三陰交小水不禁灸陰陵泉陽陵泉喉痹針合谷湧泉天突豐隆灸初起傍灸之蓋亦鑿竅使外泄也頭腫針曲池穴諸瘡瘰癧瘡灸肩井曲池大迎針緣唇瘡須去惡血疝有因寒因氣因濕熱痰積流下灸大敦三陰交小腹下橫紋斜尖灸一壯針太衝大敦絶骨腳氣有濕熱食積流注風濕寒濕針公孫衝陽灸三里痿有濕熱有痰有無血而虛有氣弱有瘀血針中瀆環跳停針待氣一二時方可灸三里肺俞喘有痰氣虛陰虛灸中府雲門天府華蓋肺俞噁心因痰熱虛灸胃俞幽門商丘中府石門鬲俞陽關膈噎因血虛氣虛熱痰火血積癖積針天突石門三里胃俞胃脘鬲俞水分氣海胃倉水腫皮水正水石水風水因氣濕食刺胃倉合谷石門水溝三里復溜曲泉四滿鼓脹氣脹寒脹脾虛中滿針上脘三里章門陰谷關元期門行間脾俞懸鐘承滿頭眩痰挾氣虛火動其痰針上星風池天柱痛風風熱風濕血虛有痰針百會環跳肩臂痛痰濕為主灸肩髃曲池夢遺專主濕熱相火灸中極曲骨膏肓腎俞癇俱是痰火不必分牛馬六畜灸百會鳩尾上脘神門陽蹺晝發陰蹺夜發癩感天地間殺厲之氣聲啞者難治針委中出血二三合黑紫疙瘩處亦去惡血以上見劉氏雜病治例瘡瘍河間曰凡瘡瘍須分經絡部分血氣多少俞穴遠近從背出者當從太陽五穴選用至陰通谷束骨崑崙委中從鬢出者當從少陽五穴選用竅陰夾溪臨泣陽輔陽陵泉從髭出者當從陽明五穴選用厲兌內庭陷谷衝陽解溪從胸出者則以絶骨一穴腸癰纂要云千金灸法曲兩肘正肘頭鋭骨灸百壯下膿血而安武按河間瘡瘍止論足三陽而手足三陰三陽未備學者當引伸而觸類玉機微義針灸證治咳嗽千金方曰寒咳肝咳刺足太衝心咳刺手神門脾咳刺足太白肺咳刺手太淵腎咳刺足太溪膽咳刺足陽陵泉厥陰咳刺手大陵劉氏曰經有三焦而無心主此有心主而無三焦然已發其祕矣惜乎胃大小腸膀胱咳及針治皆略之而不議千金云咳者灸兩乳下黑白際各數十壯即瘥又以蒲當乳頭周匝圍身令前後正中當脊骨灸十壯上氣咳逆嗽短氣氣滿食不下灸肺募五十壯上氣咳逆短氣風勞病灸肩井二百壯上氣咳逆短氣胸滿多唾唾惡冷痰灸肺俞五十壯便血寶鑑曰邪在五臟則陰脈不和不和則血留之結陰之病陰氣內結不得外行無所稟滲入腸間故便血灸中脘三里氣海等穴便血不止灸勞宮太白會陽咳逆丹溪曰氣逆也氣自臍下直衝上出於口而作聲也人之陰氣依胃為養胃土傷損則木氣侮之陰為火乘不得內守木挾相火乘之故直衝清道而上出言胃弱者陰弱也嚴氏曰灸乳下一指男左女右與乳相直問陷中灸三壯婦人屈乳頭向下盡處寶鑑曰病甚者灸二七壯武按此穴名乳根也癘風丹溪曰是人受得天地間殺厲之風以其酷烈暴悍可畏也不外乎陽明一經病機云灸承漿七壯灸瘡輕再灸瘡愈三灸之劉氏曰陽明任脈之會所以宣通血脈以散風也內經云數刺腫上出血子和曰刺其面大脈出血如墨刺三次血色變每刺自額至頤針上下俱刺每隔一日一刺刺至二十餘日方已劉氏曰委中皆可出血同汗也癇劉氏曰此疾與中風顛狂小兒急慢驚相類原其所由或在母腹中受驚或因聞大驚而得蓋小兒神氣尚弱驚則神不守舍舍空則涎歸之或飲食失節脾胃有傷積為痰飲迷心竅治法必當尋火尋痰而治丹溪曰不必分六畜牛馬雞犬大率主痰火潔古云晝發灸陽蹺夜發灸陰蹺各二七壯千金方驚癇按圖灸之一小兒四歲與長老念咒摩頂受記發搐後見皂衣人即發羅謙甫先與灸兩蹺各二七壯次服沉香天麻湯傷寒陰厥脈絶氣海臟結陰汗不止腹脹腸鳴面黑指甲青石關關元宜灸百壯陽陵泉潔古曰煩滿囊縮者灸此太溪灸七壯治少陰皆利手足不冷反發熱脈不至者劉氏曰大抵不可刺者宜灸之一則沉寒痼冷二則無脈知陽絶也三則腹皮急而陽陷也舍此三者余皆不可灸醫學發明云陷下則灸之天地間陰陽二氣而已陽在外在上陰在內在下今言陷下者陽氣下陷入陰血之中是陰反居其上而覆其陽脈證俱見寒在外者則灸之異法方宜論云北方之人宜灸焫也為冬寒火旺伏陽在內皆宜灸之以至理論則腎主臟藏陽氣在內冬三月主閉藏是也若太過則病固宜灸焫此陽明陷入陰水之中是也難經曰熱病在內取會之氣穴為陽陷入陰中取陽氣通天之竅穴以火引火而道之此宜灸焫也若將有病一概灸之豈不誤哉如仲景云微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也又云脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痹名火逆也脈浮熱甚而灸之此為實實而虛虛治因火而動必咽燥唾血又云身之穴三百六十有五其三十穴灸之有害七十九穴刺之為災並中髓也此仲景傷寒例按明堂針經條下所說禁忌明矣內經云脈之所見邪之所在脈沉者邪氣在內脈浮者邪氣在表世醫只知脈之說而不知病證之禁忌若表見寒證身汗出常清數栗而寒不渴欲覆厚衣常惡寒手足厥皮膚乾枯其脈必沉細而遲但有一二證皆宜灸之陽氣陷故也若身熱惡熱時見躁作或面赤黃咽乾嗌乾口乾舌上黃赤時渴咽嗌痛皆熱在外也但有一二證皆不宜灸其脈必浮數或但數亦不可灸灸之災害立生若有鼻不聞香臭鼻流清涕或缺或嚏惡寒其脈必沉是脈證相應也或輕手得弦緊者是陰伏其陽也雖面赤宜灸之不可拘於面赤色而禁之也瘡元戎云凡人初覺發背欲結未結赤熱腫痛先濕紙覆其上立視候之其紙先干處即是結癰頭也取大蒜切成片如當三錢厚薄安於頭上用大艾炷灸三壯即換一蒜片痛者灸至不痛不痛灸至痛時方佳最要早覺早灸為上一日二日十灸七活三日四日六七活五六日三四活過七日則不可灸若有十數頭作一處生者即用大蒜研成膏作薄餅鋪其上聚艾於蒜餅上燒之亦能活也若背上初發赤腫一片中間有一片黃粟米頭子便用獨蒜切去兩頭取中間半寸厚正安於瘡上著艾灸十四壯多至四十九壯又曰灸而不痛痛而後止其灸灸而不痛者先及其㿉所以不痛而後及良肉所以痛也灸而痛不痛而後止其灸灸而痛者先及其未㿉所以痛次及將㿉所以不痛也劉氏曰此謂癰疽初發宜灸之也然諸瘡患久成漏者常有膿水不絶其膿不臭內無歹肉尤宜用附子浸透切作大片厚二三分於瘡上著艾灸之仍服內托之藥隔三二日再灸之不五七次自然肌肉長滿矣至有膿水惡物漸潰根深者郭氏治用白麵硫黃大蒜三物一處搗爛著瘡大小捻作餅子厚約三分於瘡上用艾炷灸二十一壯一灸一易後隔四五日方用翠霞錠子並信效錠子互相用之紝入瘡內歹肉盡處好肉長平然後外貼收斂之藥內服應病之劑調理即瘥矣蓋不止宜灸於瘡之始發也大抵始發宜灸要汗下補養之藥對證至灸冷瘡亦須內托之藥切當設有反逆不唯不愈恐致轉生他病也元好問記云素飲酒於九月中患腦之下項之上出小瘡後數日腦項麻木腫勢外掀瘍醫遂取五香連翹至八日不下而云不可速療十八日得膿俟膿出用藥或砭刺三月乃可平四月如故豫記醫經云凡瘡見膿九死一生果如其言則有束手待斃之悔矣乃請東垣診視且謂膏粱之變不當投五香五香已無及當先用火攻之然後用藥以大艾炷如兩核許者攻之至百壯乃覺痛次為處方云是足太陽膀胱之經其病逆當急治以黃連消毒丸身面疣瘤寶鑑云艾炷灸十壯即用醋摩雄黃塗紙上剪如螺螄靨大貼灸處用膏藥重貼二日一易候癢折出紙如豆粉愈水氣內經謂經脈滿則脈絡溢絡脈溢則謬刺之以調其絡脈使形容如舊而不腫故曰謬刺其處以復其形謹按謬刺謂不分俞穴而刺之也水熱穴論刺水穴分大法水溢於表或腹脹或四肢雖腫而氣稍實脈浮洪者宜行此至病氣孤危脈微弱而四肢小氣盛實者今人往往謬刺之禍不旋踵蓋不審經言脈滿絡溢謬刺之理也腳氣孫真人云古人無此疾自永嘉南渡衣冠之人多有之濕流足脛房事所致發明曰北方人飲潼酪濕熱之物所致有道以來有道以去治之以灸焫為佳以導引濕氣出外又察足之三陰三陽是何經絡所起楊太受云腳氣是為壅疾當治以宣通之劑使氣不成壅既成而盛者砭惡血而去其腫勢經曰畜則腫熱砭射之也喉痹原病式曰痹不仁也俗作閉閉壅也火主腫脹故熱客上焦而咽嗌腫脹也張戴人曰手少陰少陽二脈並於喉氣熱則內結腫脹痹而不通則死後人強立八名曰單乳蛾雙乳蛾單閉喉雙閉喉子舌脹木舌脹纏喉風走馬喉閉熱氣上行故傳於喉之兩旁近外腫作以其形似是謂乳蛾一為單一為雙也其比乳蛾差小者名閉喉熱結舌下復生一小舌名子舌脹熱結於舌中為之腫名木舌脹木者強而不柔和也熱結於咽喉腫繞於外且麻且癢腫而大者名曰纏喉風暴發暴死者名走馬喉痹八名雖詳皆歸之火微者咸軟之大者下散之至於走馬喉痹生死人在反掌間砭刺出血則病已嘗治一婦人木舌脹其舌滿口令以䤵針鋭而小者砭之五七度三日方平計所出血幾盈斗劉氏曰傷寒少陰病咽痛及生瘡不能言聲不出者用甘苦辛溫制其標病以通咽喉至若傷寒伏氣內發咽痛兼下利清穀裡寒外熱面赤脈微弱者用辛熱之藥攻其本病以順陰陽利止則水升火降而咽痛自無也此非雜病一陰一陽結為喉之比不可妄施針砭及寒涼之藥上是火熱喉痹急用吹藥點刺少商合谷豐隆湧泉關衝等穴淋閉原病式曰淋小便澀痛也熱客膀胱鬱結不能滲泄故也嚴氏曰氣淋者小便澀常有餘瀝石淋者莖中痛尿不得卒出膏淋尿似膏出勞淋者勞倦即發痛引氣衝血淋過熱即發甚則溺血劉氏曰大抵是膀胱蓄熱而成灸法炒鹽不拘多少熱填滿病人臍中卻用箸頭大艾炷七壯或灸三陰交眼目東垣曰五臟上注於目而為之精精之窠為眼骨之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約束裹擷筋骨血氣之精而與脈併為系目者五臟六腑之精榮衛魂魄之所常營也神之所主也子和曰目之五輪乃五臟六腑之精華宗脈之所聚其白屬肺金肉屬脾土赤屬心火黑水神光屬腎水兼屬肝木目不因火則不病白輪變赤火乘肺也肉輪赤腫火乘脾也黑水神光被翳火乘肝與腎也赤脈貫目火自甚也凡目暴赤腫起羞明隱澀淚出不止暴寒目匡匡大熱之所為也在針則神庭上星囟會前頂百會翳者可使立退腫者可使立消惟小兒不可刺囟會肉分淺薄恐傷其骨目之內眥太陽膀胱之所過血多氣少目之鋭眥少陽膽經血少氣多目之上綱太陽經也亦血多氣少目之下綱陽明胃經也血氣俱多然陽明經起於目兩旁交頞中與太陽少陽俱會於目惟足厥陰肝經連於目系而已故血太過者太陽陽明之實也血不及者厥陰之虛也故出血者宜太陽陽明蓋此二經血多故也少陽一經不宜出血血少故也刺太陽陽明出血則目愈明刺少陽出血則目愈昏要知無使太過不及以血養目而已雀目不能夜視及內暴怒大憂所致皆肝血少禁出血止宜補肝養胃劉氏曰內障有因於痰熱氣鬱血熱陽陷陰脫脫營所致種種病因古人皆不議況外障之翳有起於內眥外眥睛上睛下睛中當視其翳色從何經而來如東垣治魏邦彥夫人目翳緑色從下而上病自陽明來也緑非五色之正殆肺腎合而成病也乃就畫家以墨調膩粉合成色與翳同矣如論治之疾遂不作眼生倒睫拳毛者兩目緊急皮縮之所致也蓋內復熱陰氣外行當去其內熱併火邪眼皮緩則毛出翳膜亦退用手法攀出內瞼向外速以三稜針出血以左手爪甲迎其針鋒立愈目眶久赤爛俗呼為赤瞎當以三稜針刺目眶外以瀉濕熱而愈劉氏曰外治針也以瀉瘀熱內治服藥以杜其原可也偷針眼視其背上有細紅點如瘡以針刺破即瘥實解太陽之鬱熱也腰痛東垣曰經云腰痛上寒不可顧取足太陽陽明腰痛上熱取足厥陰不可俯仰取足少陽蓋足之三陽從頭走足足之三陰從足入腹經所過處皆能為痛治之者當審其何經所過分野循其孔穴而刺之審其寒熱而藥之假令足太陽令人腰痛引項脊尻皆如重狀刺其郤中太陽二經出血余皆仿此劉氏曰王注經中言灸疑誤灸者宜腎俞腰俞寶鑑云灸曲瞅下兩紋頭左右腳四處各三壯每灸一腳二火齊下午時著灸人定以來臟腑自動一兩行或轉動如雷聲立愈損傷內經云人有所墮墜惡血留內腹中腹滿不得前後先飲利藥此上傷厥陰之脈下傷少陰之絡刺足內踝下然骨之前出血刺足跗上動脈不已刺三毛各一痏見血立已左刺右右刺左其脈堅強者生小弱者死婦人寶鑑曰一婦病傷寒遇夜則見鬼許學士曰得病之初曾值月經來否其家人曰經水方來而病作而遂止曰此熱入血室小柴胡已遲刺期門請善針者治之而愈乳癰腫痛針三里穴五分其痛立止乳癰喉痹䯒腫足跗不收灸下廉三壯女子漏下惡血月事不調逆氣腹脹其脈緩者灸血海二穴三壯女子如妊娠赤白帶下婦人漏血不止腹脹滿不得息小便黃如蠱及治腰痛如錐刺不得屈伸舌縱涎下煩逆溺難小腹急引陰痛股內廉痛灸陰谷二穴女子不月灸會陰三壯婦人月水不利難産子上衝心痛不得息灸氣衝七壯婦人月事不利利即多心下滿目䀮䀮不能遠視腹中痛灸水泉五壯婦人月事不調帶下崩中因産惡露不止繞臍㽲痛灸氣海婦人不孕月不調勻赤白帶下氣轉連背引痛不可忍灸帶脈二穴産後惡露不止及諸淋注灸氣海産後兩脅急痛不可忍灸石關五十壯女子月事不調産後惡露不止繞臍冷痛灸陰交百壯帶下癥瘕因産惡露不止斷産絶孕經冷灸關元百壯婦人卒口噤語音不出風癇灸承漿五壯婦人産後血氣俱虛灸血海百壯婦人疝氣臍腹冷疼相引脅下痛不可忍先灸中庭三七壯小兒小兒針毫針艾炷如小麥或雀糞大寶鑑曰急慢驚風灸前頂若不愈灸攢竹人中各三壯武疑急驚屬肝慢驚屬脾寶鑑不分灸前頂攢竹二穴俱太陽督脈未詳其義小兒慢驚風灸尺澤各七壯初生小兒臍風撮口灸然谷三壯或針三分不見血立效小兒癲癇癥瘕脊強互相引灸長強三十壯小兒癲癇驚盡目眩灸神庭一穴七壯小兒風癇先曲手指如數物乃發也灸鼻柱直髮際宛宛中三壯小兒驚癇先驚怖啼叫乃發灸後頂上旋毛中三壯及耳後青絡脈小兒癖氣久不消灸章門各七壯臍後脊中灸二七壯小兒脅下滿瀉痢體重四肢不收痃癖積聚腹痛不嗜食痰瘧寒熱又治腹脹引背食飲多漸漸黃瘦灸十一椎下兩旁相去各一寸五分七壯小兒黃疸灸三壯小兒疳瘦脫肛體瘦渴飲形容瘦瘁諸方不瘥灸尾翠骨上三寸陷中三壯兼三伏內用楊湯水浴之正午時灸自灸之後用帛子拭見有疳蟲隨汗出此法神效小兒身羸瘦賁豚腹脹四肢懈惰肩背不舉灸章門小兒吐乳汁灸中庭一壯小兒脫肛瀉血秋深不效灸龜尾一壯脫肛灸臍中三壯千金云隨年壯脫肛久不瘥及風癇中風角弓反張多哭語言不擇發無時節盛則吐涎沫灸百會七壯戒逆針灸無病而先針灸曰逆逆未至而迎之也小兒新生無疾不可逆針灸之如逆針灸則忍痛動其五臟因喜成癇河洛關中土地多寒兒喜病痓其生兒三日多逆灸以防之吳蜀地溫無此疾也古方既傳之今人不分南北灸之多害小兒也所以田舍小兒任其自然得無夭橫也秦承祖灸鬼法鬼哭穴以兩手大指相併縛用艾炷騎縫灸之令兩甲角後肉四處著火一處不著則不效按丹溪治一婦人久積怒與酒病癇目上視揚手躑足筋牽喉響流涎定則昏昧腹脹痛衝心頭至胸大汗癇與痛間作此肝有怒邪因血少而氣獨行脾受刑脾胃間有酒疾為肝氣所侮而為痛酒性喜動出入升降入內則痛出外則癇用竹瀝薑汁參朮膏等藥甚多癇痛間作無度乘痛時灸大敦行間中脘間以陳皮芍藥甘草川芎湯調石膏與竹瀝服之無數又灸太衝然谷巨闕及大指甲肉且言鬼怪怒罵巫者丹溪曰邪乘虛而入理或有之與前藥佐以荊瀝防痰又灸鬼哭穴餘證調理而安
