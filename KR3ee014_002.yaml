body:
  text: 卷一上五臟六腑脊骨二十一節大椎三節至尾骶共二十四節素問肺附三椎心附五椎肝附九椎脾附十一椎腎附十四椎膈膜前齊鳩尾後齊十一椎周圍著脊所以遮隔濁氣不使上熏心肺也胃在膈膜下小腸上小腸在臍上大腸當臍膽在肝之短葉間膀胱在腎下俱難經心藏神肺藏魄肝藏魂脾藏意腎藏志是為五臟難經膽胃大小腸三焦膀胱瀉而不藏受五臟濁氣名曰傳化之腑此不能久留輸瀉者是為六腑五臟者藏精而不瀉也故滿而不實六腑傳化而不藏故實而不能滿也所以然者以水穀入口則胃實而腸虛食下則腸實而胃虛故曰實而不滿滿而不實也素問仰人尺寸伏人尺寸手足陰陽流注凡人兩手足各有三陰脈三陽脈以合為十二經也三陰謂太陰厥陰少陰三陽謂陽明太陽少陽也人兩手足各有三陰三陽脈合為十二經也詳見脈訣謂之經者以血氣流行經常不息而言謂之脈者以血理分袤行體者而言也袤音謀言相去也手之三陰從藏走至手手之三陽從手走至頭足之三陽從頭走至足足之三陰從足走入腹手三陰從藏走至手謂手太陰起中焦至出大指之端手少陰起心中至出小指之端手厥陰起胸中至出中指之端手三陽從手走至頭謂手陽明起大指次指之端至上挾鼻孔手太陽起小指之端至目內眥手少陽起小指次指之端至目鋭眥足三陽從頭走至足謂足陽明起於鼻至入中指內間足太陽起目內眥至小指外側端足少陽起目鋭眥至入小指次指間足三陰從足入腹謂足太陰起大指之端至屬脾絡胃足少陰起足心至屬腎絡膀胱足厥陰起大指聚毛至屬肝絡膽足三陰雖曰從足入腹然太陰乃復上膈挾咽散舌下少陰復從腎挾舌本厥陰乃復上出額與督脈會於巔兼手太陰從肺系橫出腋下手少陰從心系上肺出腋下手厥陰循胸出脅上抵腋下此又秦越人所謂諸陰脈皆至頸胸而還者也然厥陰則又上出於巔蓋厥陰陰之盡者也所以然者示陰無可盡之理猶易之碩果不食示陽無可盡之義也然易之陰陽以氣言人之陰陽以藏象言氣無形而藏象有質氣陽而質陰也然則無形者貴乎陽有質者貴乎陰歟脈絡傳注周流不息絡脈者本經之旁支而別出以聯絡於十二經者也本經之脈由絡脈而交他經他經之交亦由是焉傳注周流無停息也夫十二經之有絡脈猶江漢之有沱潛也絡脈之傳注於他經猶沱潛之旁導於他水也是以手太陰之支者從腕後出次指端而交於手陽明手陽明之支者從缺盆上挾口鼻而交於足陽明足陽明之支者別跗上出大指端而交於足太陰足太陰之支者從胃別上膈注心中而交於手少陰手少陰則直自本經少衝穴而交於手太陽不假支授蓋君者出令者也手太陽之支者別頰上至目內眥而交於足太陽足太陽之支者從膊內左右別下合膕中下至小指外側端而交於足少陰足少陰之支者從肺出注胸中而交於手厥陰手厥陰之支者從掌中循小指次指出其端而交於手少陽手少陽之支者從耳後出至目鋭眥而交於足少陽足少陽之支者從跗上入大指爪甲出三毛而交於足厥陰足厥陰之支者從肝別貫膈上注肺而交於手太陰也故經脈者行血氣通陰陽以榮於身也通結上文以起下文之義經脈之流行不息所以運行血氣流通陰陽以榮養於身者也不言絡脈者舉經以該之其始平旦寅時從中焦注手太陰肺陽明大腸卯時注此陽明注足陽明胃辰時注此太陰脾巳時注此太陰注手少陰心午時注此太陽小腸未時注此太陽注足太陽膀胱申時注此少陰腎酉時注此少陰注手心主厥陰心包絡戌時注此少陽三焦亥時注此少陽注足少陽膽子時注此厥陰肝丑時注此厥陰復注手太陰明日寅時始於中焦注手太陰終於注足厥陰是經脈之行一周身也其氣常以平旦為紀句以漏水下百刻晝夜流行與天同度終而復始也氣營氣紀統紀也承上文而言經脈之行其始則起自中焦其氣則常以平旦為紀也營氣常以平旦寅時為紀由中焦而始注手太陰以次流行也不言血者言氣則血行可知漏水下百刻晝夜流行與天同度者言一晝夜漏下百刻之內人身之經脈流行無有窮止與天同一運行也蓋天以三百六十五度四分度之一為一周天而終一晝夜人之營衛則以五十度周於身氣行一萬三千五百息脈行八百一十丈而終一晝夜適當明日之寅時而復會於手太陰是與天同度終而復始也或云晝夜漏刻有長短其營氣盈縮當何如然漏水刻雖有長短之殊而五十度周身者均在其中不因漏刻而有盈縮也中指同身寸法男左女右手中指第二節內廷兩橫紋相去為一寸取稻稈心量或用薄竹量則易折用蠟紙則黏手不便用繩則有伸縮不準用稻稈心則易得而有準肺重三斤三兩六葉兩耳凡八葉四垂如蓋附著於脊之第三椎中有二十四空行列分布諸臟之氣為諸臟之華蓋為華蓋者以其高於諸臟難經丁德用注以木之脈脂全者方一寸為一兩今按權衡度量起於黃鐘古之一兩今之四錢強也西方白色入通於肺開竅於鼻藏精於肺故病在背其味辛其類金其畜馬其谷稻其應四時上為太白星是以知病之在皮毛也其音商其數九其臭腥其液涕西方生燥燥生金金生辛辛生肺肺生皮毛皮毛生腎肺主鼻其在天為燥在地為金在體為皮毛在臟為肺在色為白在音為商在聲為哭在變動為咳在竅於鼻在味為辛在志為憂憂傷肺喜勝憂熱傷皮毛寒勝熱辛傷皮毛苦勝辛素問膻中者臣使之官喜樂出焉肺者氣之本魄之處也其華在毛其充在皮為陽中之太陰通於秋氣素問肺之合皮也其榮毛也其主心也肺氣通鼻鼻和則知香臭矣難經肺氣虛則使人夢見白物見人斬血藉藉得時則夢見兵刃血戰秋三月肺色白欲如鵝毛不欲如鹽素問肺白象金金得水而沉肺得水而浮何也肺者非為純金也辛商也丙之柔大言陰與陽小言夫與婦釋其微陰昏而就火其意樂火又行陽道多故肺得水而浮也肺熱而復沉者辛當歸庚物極則反也肺氣絶則皮毛焦肺氣行於皮毛氣弗榮則皮毛焦皮毛焦則津液去津液去則皮節傷皮節傷則皮枯毛折毛折者則毛先死丙日篤丁日死俱難經手太陰肺經手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺起發也絡繞也還復也循巡也又依也沿也屬會也中焦者在胃中脘當臍上四寸之分大腸注見本經胃口胃上下口也胃上口在臍上五寸上脘穴下口在臍上二寸下脘穴之分也膈隔也凡人心下有隔膜與脊脅周圍相著所以遮隔濁氣不使上熏心肺也手太陰起中焦受足厥陰之交也由是循任脈之外足少陰經脈之裡以次下行當臍上一寸水分穴之分繞絡大腸手太陰陽明相為表裡也乃復行本經之外上循胃口迤邐上膈而屬會於肺榮氣有所歸於本臟也從肺系橫出腋下下循臑內行少陰心主之前下肘中肺系謂喉嚨也喉以候氣下接於肺肩下脅上際曰腋膊下對腋處為臑肩肘之間也臑盡處為肘肘臂節也自肺臟循肺系出而橫行循胸部第四行之中府雲門以出腋下下循臑內歷天府俠白行手少陰心主之前下入肘中抵尺澤穴也蓋手少陰循臑臂出手小指之端手心主循臑臂出中指之端手太陰則行乎二經之前也循臂內上骨下廉入寸口上魚句循魚際出大指之端肘以下為臂廉隅也邊也手掌後高骨傍動脈為關關前動脈為寸口曰魚曰魚際云者謂掌骨之前大指本節之後其肥肉隆起處統謂之魚魚際則其間之穴名也既下肘中乃循臂內上骨之下廉歷孔最列缺入寸口之經渠太淵以上魚循魚際出大指之端至少商穴而終也端杪也其支者從腕後直出次指內廉出其端臂骨盡處為腕脈之大隧為經交經者為絡本經終於出大指之端矣此則從腕後列缺穴達次指內廉出其端交於手陽明也是經多氣少血平旦寅時氣血注此受足厥陰之交凡十一穴左右共二十二穴手之陰陽其受氣之道近其氣之來疾刺深無過二分其留無過一呼過此者則脫氣中府一名膺俞雲門下一寸乳上三肋間動脈應手陷中去中行六寸肺之募募猶結募也言經氣聚此足太陰脾脈之會銅人針三分留五呼灸五壯埤雅云壯者以壯人為法也主腹脹四肢腫食不下喘氣胸滿肩背痛嘔啘咳逆上氣肺系急肺寒熱胸悚悚膽熱嘔逆咳唾濁涕風汗出皮痛面腫少氣不得臥傷寒胸中熱飛尸遁疰癭瘤雲門巨骨下俠氣戶傍二寸陷中動脈應手舉臂取之去胸中行任脈兩旁相去各六寸素注針七分銅人針三分不宜深深則使氣逆灸五壯主傷寒四肢熱不已咳逆短氣氣上衝心胸脅徹背痛喉痹肩背痛臂不得舉癭氣天府腋下三寸臂臑內廉動脈陷中以鼻取之甲乙禁灸灸之使人逆氣銅人針四分留七呼素注留三呼銅人灸二七壯至百壯資生云非大急不灸主暴痹內逆肝脈相搏血溢鼻口鼻衄血不止卒中惡風邪氣泣出喜忘飛尸惡疰鬼語遁下喘不得息瘧寒熱目眩遠視䀮䀮癭氣俠白天府下去肘五寸動脈中銅人針三分灸五壯主心痛短氣乾嘔煩滿尺澤肘中約紋上動脈中甄權云屈肘橫紋筋骨罅陷中手太陰肺脈所入為合水肺實瀉之素注針三分留三呼灸三壯明堂禁灸銅人灸五壯資生同素問刺肘中內陷氣歸之為不屈伸主肩脊痛汗出中風小便數而缺溺色變卒遺失無度面白善嚏悲愁不樂欲哭灑淅寒熱風痹臑肘攣手臂不得舉喉痹上氣嘔吐口舌乾咳嗽唾濁痎瘧四肢腹暴腫臂寒短氣心痛肺脹膨膨缺盆中痛心煩悶亂少氣不足以息勞熱風汗出中風小便數而缺上氣喘滿腰脊強痛肺積息奔小兒慢驚風孔最去腕上七寸陷者中銅人灸五壯針三分主熱病汗不出咳逆肘臂厥痛屈伸難手不及頭指不握吐血失音咽腫痛頭痛列缺手太陰絡別走陽明去腕側上一寸五分滑氏曰以手交叉頭食指末筋罅中銅人針二分留三呼瀉五吸灸三壯明堂針三分日灸七壯至七七壯主偏風口面喎斜手肘無力半身不遂掌中熱口噤不開寒熱瘧嘔沫咳嗽善笑縱唇口健忘溺血精出陰莖痛小便熱癇驚妄見面目四肢癰腫肩痹胸背寒栗少氣不足以息尸厥寒厥交兩手而瞀實則胸背熱汗出四肢暴腫虛則胸背寒栗少氣不足以息素問云實則手鋭掌熱瀉之虛則缺㰦小便遺補之按素問曰直行者謂之經旁出者謂之絡手太陰之支從腕後直出次指內廉出其端是列缺為太陰別走陽明之絡人或有寸關尺三部脈不見自列缺至陽溪脈見者俗謂之反關脈此經脈虛而絡脈滿千金翼謂陽脈逆反大於寸口三倍惜叔和尚未之及而況高陽生哉經渠寸口陷中肺脈所行為經金素注針三分銅人針二分留三呼禁灸灸傷人神明主瘧寒熱胸背拘急胸滿膨膨喉痹掌中熱咳逆上氣數缺傷寒熱病汗不出暴痹喘促心痛嘔吐太淵一名太泉避唐祖諱掌後陷中肺脈所注為俞土肺虛補之難經曰脈會太淵疏曰脈病治此平旦寅時氣血從此始故曰寸口者脈之大要會手太陰之動脈也銅人灸三壯針一分素注針二分留二呼灸三壯主胸痹逆氣善噦嘔飲食咳嗽煩冤不得眠肺脹膨膨臂內廉痛目生白翳眼眥赤筋眼痛眼青轉筋乍寒乍熱缺盆中引痛掌中熱數缺肩背痛寒喘不得息噫氣上逆心痛脈澀咳血嘔血振寒咽乾狂言口噼溺色變卒遺失無度魚際大指本節後內側陷中又云散脈中肺脈所溜為滎火銅人針一分留三呼明堂素注針二分灸三壯素問刺手魚腹內陷為腫主酒病惡風寒虛熱舌上黃身熱頭痛咳嗽噦傷寒汗不出痹走胸背痛不得息目眩煩心少氣腹痛不下食肘攣肢滿喉中乾燥寒栗鼓頷咳引尻痛溺血嘔血心痹悲恐乳癰東垣曰胃氣下溜五臟氣皆亂在於肺者取之手太陰魚際足少陰俞少商大指端內側去爪甲角如韭葉白肉際宛宛中肺脈所出為井木銅人針一分留三呼瀉五吸不宜灸素注留一呼明下灸三壯甲乙灸一壯主頷腫喉閉煩心善啘嘔心下滿汗出而寒咳逆痎瘧振寒腹滿唾沫唇乾引飲食不下膨膨手攣指痛掌熱寒栗鼓頷喉中鳴小兒乳蛾唐刺史成君綽忽頷腫大如升喉中閉塞水粒不下三日甄權以三稜針刺之微出血立愈泄藏熱也按難經曰諸井者肌肉淺薄不足為使也刺井者當刺滎甄權寫井而療喉痹杜寶善類聚井穴主治病證者難經曰井主心下滿又曰春刺井蓋並行而不悖也或問素問注銅人明堂千金諸書於髎穴有宜針灸有禁針灸刺淺刺深艾壯多寡不同將孰從哉武曰一穴而有宜針禁針宜灸禁灸者看病勢輕重緩急病輕勢緩者當別用一主治穴以代之若病勢重急倘非此穴不可療當用此一穴若諸書皆禁針灸則斷不可用矣針淺深艾多少則以素問十二經淺深刺法為主諸書相參互用之不可偏廢也經曰春夏刺淺秋冬刺深肥人刺深瘦人刺淺故在春夏與瘦人當從淺刺秋冬與肥人當從深刺又曰陷下則灸之陷下不甚者灸當從少陷下甚者灸當從多又寒涼之月火氣衰灸當從多溫暑之月火氣旺灸當從少又肌肉淺薄髎穴刺淺艾少肌肉深厚髎穴刺深艾多又春與夏不同秋與冬不同肥瘦有適中者有過肥而臃腫者有太瘦而骨立者以意消息不可執一論也又大人與小兒刺淺深艾多少不同又人頭面及小兒宜毫針艾炷如小麥也大腸重二斤十二兩長二丈一尺廣四寸徑一寸當臍右回十六曲盛谷一斗水七升半大腸者傳道之官變化出焉大腸為白腸俱素問五臟各有所句腑皆相近而心肺獨去大腸小腸遠者何也然經言心榮肺衛通行陽氣故居在上大腸小腸傳陰氣而下故居在下所以相去而遠也難經食下則腸實而胃虛故曰實而不滿滿而不實手陽明大腸經手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中大指之次指謂食指也手陽明大腸經也凡經脈之道陰脈行手足之裡陽脈行手足之表此經起於大指次指之端商陽穴受手太陰之交行於陽之分也由是循指之上廉歷二間三間以出合谷兩骨之間復上入陽溪兩筋之中循臂上廉入肘外廉上循臑外前廉上肩自陽溪而上循臂上廉之偏歷溫溜下廉上廉三里入肘外廉之曲池循臑外前廉歷肘髎五里臂臑絡臑會上肩至肩髃穴也出髃骨之前廉上出柱骨之會上肩端兩骨間為髃骨肩胛上際會處為天柱骨出髃骨前廉循巨骨穴上出柱骨之會上會於大椎下入缺盆絡肺下膈屬大腸自大椎而下入缺盆循足陽明經脈外絡繞肺臟復下膈當天樞之分會屬於大腸也其支別者從缺盆上頸貫頰入下齒縫中頭莖為頸耳以下曲處為頰口前小者為齒其支別者自缺盆上行於頸循天鼎扶突上貫於頰入下齒縫中還出挾口交人中左之右右之左上挾鼻孔唇口上鼻柱下為人中既入齒縫復出夾兩口吻相交於人中之分左脈之右右脈之左上挾鼻孔循禾髎迎香而終以交於足陽明也是經氣血俱多卯時氣血注此受手太陰之交凡二十穴左右共四十穴手之陰陽其受氣之道近其氣之來疾刺深無過二分其留無過一呼過此者則脫氣商陽一名絶陽手大指次指內側去爪甲角如韭葉手陽明大腸脈所出為井金銅人灸三壯針一分留一呼主胸中氣滿喘咳支腫熱病汗不出耳鳴耳聾寒熱痎瘧口乾頤頷腫齒痛惡寒肩背急相引缺盆中痛目青盲灸三壯左取右右取左如食頃立已二間一名間谷食指本節前內側陷中手陽明大腸脈所溜為滎水大腸實瀉之銅人針三分留六呼灸三壯主喉痹頷䪼腫肩背臑痛振寒鼻鼽衄血多驚齒痛目黃口乾口喎急食不通傷寒水結東垣曰氣在於臂足取之先去血脈後深取陽明少陰之滎俞二間三間三間一名少谷食指本節後內側陷中手陽明大腸脈所注為俞木銅人針三分留三呼灸三壯主喉痹咽中如梗下齒齲痛嗜臥胸腹滿腸鳴洞泄寒熱瘧唇焦口乾氣喘目眥急痛吐舌戾頸喜驚多唾急食不通傷寒氣熱身寒結水合谷一名虎口手大指次指岐骨間陷中手陽明大腸脈所過為原虛實皆拔之銅人針三分留六呼灸三壯主傷寒大渴脈浮在表發熱惡寒頭痛脊強無汗寒熱瘧鼻衄不止熱病汗不出目視不明生白翳頭痛下齒齲耳聾喉痹面腫唇吻不收喑不能言口噤不開偏風風疹痂疥偏正頭痛腰脊內引痛小兒單乳蛾按合谷婦人妊娠可瀉不可補補即墮胎詳見足太陰脾經三陰交下陽溪一名中魁腕中上側兩筋間陷中手陽明大腸脈所行為經火銅人針三分留七呼灸三壯主狂言喜笑見鬼熱病煩心目風赤爛有翳厥逆頭痛胸滿不得息寒熱瘧疾寒咳嘔沫喉痹耳鳴耳聾驚掣肘臂不舉痂疥偏歷腕中後三寸手陽明絡脈別走太陰銅人針三分留七呼灸三壯明下灸五壯主肩膊肘腕痠疼眯目䀮䀮齒痛鼻衄寒熱瘧癲疾多言咽喉干喉痹耳鳴風汗不出利小便實則齲聾瀉之虛則齒寒痹鬲補之溫溜一名逆注一名池頭腕後大士五寸小士六寸明堂在腕後五寸六寸間銅人針三分灸三壯主腸鳴而痛傷寒噦逆噫鬲中氣閉寒熱頭痛喜笑狂言見鬼吐涎沫風逆四肢腫吐舌口舌痛喉痹下廉輔骨下去上廉一寸輔鋭肉分外銅人斜針五分留二呼灸三壯主飧泄勞瘵小腹滿小便黃便血狂言偏風熱風冷痹不遂風濕痹小腸氣不足面無顏色痃癖腹痛若刀刺不可忍飧泄腹脅痛滿狂走俠臍痛食不化喘息不能行唇乾涎出乳癰上廉三里下一寸其分獨抵陽明之會外銅人斜針五分灸五壯主小便難黃赤腸鳴胸痛偏風半身不遂骨髓冷手足不仁喘息大腸氣腦風頭痛三里一名手三里曲池下二寸按之肉起鋭肉之端銅人灸三壯針二分主霍亂遺失失音齒痛頰頷腫瘰癧手臂不仁肘攣不伸中風口噼手足不隨曲池肘外輔骨屈肘兩骨之中以手拱胸取之手陽明大腸脈所入為合土素注針五分留七呼銅人針七分得氣先瀉後補之灸三壯明堂日灸七壯至二百壯且停十餘日更灸止二百主繞踝風手臂紅腫肘中痛偏風半身不遂惡風邪氣泣出喜忘風癮疹喉痹不能言胸中煩滿臂膊疼痛筋緩捉物不得挽弓不開屈伸難風痹肘細無力傷寒餘熱不盡皮膚乾燥瘛瘲癲疾舉體痛癢如蟲齧皮脫作瘡皮膚痂疥婦人經脈不通肘髎肘大骨外廉陷中銅人灸三壯針三分主風勞嗜臥臂痛不舉肩重腋急肘臂麻木不仁五里肘上三寸行向里大脈中央銅人灸十壯素問大禁針主風勞驚恐吐血咳嗽肘臂痛嗜臥四肢不得動心下脹滿上氣身黃時有微熱瘰癧臂臑肘上七寸䐃肉端肩髃下一寸兩筋兩骨罅陷宛宛中平手取之手陽明絡手足太陽陽維之會銅人灸三壯針三分明堂宜灸不宜針日灸七壯至二百壯若針不得過三五分主臂細無力臂痛不得向頭瘰癧頸項拘急肩髃一名中肩井一名扁骨膊骨頭肩端上兩骨罅間陷者宛宛中舉臂取之有空足少陽陽蹺之會銅人灸七壯至二七壯以瘥為度若灸偏風灸七七壯不宜多恐手臂細若風病筋骨無力久不瘥灸不畏細刺即泄肩臂熱氣明堂針八分留三呼瀉五吸灸不及針以平手取其穴灸七壯增至二七素注針一寸灸五壯又云針六分留六呼主中風手足不隨偏風風瘓風𤸷風病半身不遂熱風肩中熱頭不可回顧肩臂疼痛臂無力手不可向頭攣急風熱癮疹顏色枯焦勞氣泄精傷寒熱不已四肢熱諸癭氣唐魯州刺史厙狄欽風痹不得挽弓甄權使欽彀弓矢向堋立針肩髃針進即可射巨骨肩尖端上行兩叉骨罅間陷中手陽明陽蹺之會銅人灸五壯針一寸半明堂灸三壯至七壯素注禁針針則倒懸一食頃乃得下針針四分瀉之勿補針出始得正臥明下灸三壯主驚癇破心吐血臂膊痛胸中有瘀血肩臂不得屈伸天鼎頸缺盆上直扶突後一寸素注針四分銅人灸三壯針三分明堂灸七壯主喉痹嗌腫不得息飲食不下喉鳴扶突一名水穴氣舍上一寸五分在頸當曲頰下一寸人迎後一寸五分仰而取之銅人灸三壯針三分素注針四分主咳嗽多唾上氣咽引喘息喉中如水雞聲暴喑氣哽禾髎一名長頰鼻孔下俠水溝旁五分銅人針三分灸三壯主尸厥及口不可開鼻瘡息肉鼻塞不聞香臭鼽衄迎香禾髎上一寸鼻下孔旁五分手陽明足陽明之會銅人針三分留三呼不宜灸主鼻塞不聞香臭偏風口喎面癢浮腫風動葉葉狀如蟲行唇腫痛喘息不利鼻喎多涕鼽衄有瘡鼻有息肉胃重二斤一兩大一尺五寸長二尺六寸徑五寸紆曲屈伸盛谷二斗水一斗五升胃者倉廩之官五味出焉胃為黃腸五味入口藏於胃以養五臟氣胃者水穀之海六腑之大原也是以五臟六腑之氣味皆出於胃水穀入口則胃實而腸虛食氣入胃散精於肝淫氣於筋食氣入胃濁氣歸心淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於腑腑精神明留於四臟氣歸於權衡權衡以平氣口成寸以決死生飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也人胃中常有留谷二斗古鬥非今之比斤兩尺寸亦然水一斗五升故平人日再至圊一行二升半日行五升七日五七三斗五升而水穀盡矣故平人不食七日死也東垣曰飲食勞倦內傷脾胃則胃脘之陽不能升舉並心肺之氣陷入中焦用補中益氣湯又曰胃中元氣盛多食不傷過時不飢胃火盛則多食易飢能食而大便溏者胃熱善消脾病不化也又曰脾胃不和九竅不通足陽明胃經足陽明之脈起於鼻交頞中旁約太陽之脈下循鼻外上入齒中還出挾口環唇下交承漿頞鼻莖也鼻山根為頞足陽明起於鼻兩旁迎香穴由是而上左右相交於頞中過睛明之分下循鼻外歷承泣四白巨髎入上齒中復出循地倉挾口兩吻環繞唇下左右相交於承漿之分也卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱腮下為頷頷中為頤囟前為髮際髮際前為額顱自承漿卻循頤後下廉出大迎循頰車上耳前歷下關過客主人循髮際行懸釐頷厭之分經頭維會於額顱之神庭其支別者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾胸兩傍高處為膺膺上橫骨為巨骨巨骨上陷中為缺盆其支別者從大迎前下人迎循喉嚨歷水突氣舍入缺盆行足少陰俞府之外下膈當上脘中脘之分屬胃絡脾其直行者從缺盆下乳內廉下挾臍入氣衝中直行者從缺盆而下下乳內廉循氣戶庫房屋翳膺窗乳中乳根不容承滿梁門關門太乙滑肉門下挾臍歷天樞外陵大巨水道歸來諸穴而入氣衝中也其支者起胃下口循腹裡下至氣衝中而合胃下口下脘之分難經云太倉下口為幽門者是也自屬胃處起胃下口循腹裡過足少陰肓俞之外本經之裡下至氣衝中與前之入氣衝者合以下髀關抵伏兔下入膝臏中下循䯒外廉下足跗入中指外間䯒戶當切抵至也股外為髀髀前膝上起肉處為伏兔伏兔後交文為髀關挾膝解中為臏脛骨為䯒跗足面也既相合氣衝中乃下髀關抵伏兔歷陰市梁丘下入膝臏中經犢鼻下循跗之衝陽陷谷入中指外間之內庭至歷兌而終也其支者下膝三寸而別以下入中指外間此支自膝下三寸循三里穴之外別下歷上廉條口下廉豐隆解溪衝陽陷谷以至內庭厲兌而合也其支者別跗上入大指間出其端此支自跗上衝陽穴別行入大指間斜出足厥陰行間穴之外循大指下出其端以交於足太陰此經多血多氣辰時氣血注此受手陽明之交凡四十五穴左右共九十穴足陽明五臟六腑之海也其脈大血多氣盛壯熱不深不散不留不瀉刺深六分留六呼承泣目下七分直瞳子陷中陽蹺脈任脈胃脈之會銅人灸三壯禁針針之令人目烏色明堂針四分半不宜灸灸後令人目下大如拳息肉日加如桃至三十日定不見物資生云當不灸不針東垣曰魏邦彥夫人目翳自下侵上者自陽明來也主目冷淚出上觀瞳子癢遠視䀮䀮昏夜無見目瞤動與項口相引口眼喎斜口不能言面葉葉牽動眼赤痛耳鳴耳聾四白目下一寸直瞳子令病人正視取之素注針四分甲乙銅人灸七壯針三分凡用針穩當方得下針刺太深令人目烏色主頭痛目眩目赤痛僻淚不明目癢目膚翳口眼喎噼不能言巨髎俠鼻孔旁八分直瞳子平水溝蹺脈足陽明之會銅人針三分得氣即瀉灸七壯明下灸七七壯主瘛瘲唇頰腫痛口喎噼目障無見青盲無見遠視䀮䀮淫膚白膜翳覆瞳子面風鼻䪼腫癰痛招搖視瞻腳氣膝腫地倉俠口吻旁四分外如近下有脈微動手足陽明任蹺脈之會銅人針三分明堂三分半留五呼得氣即瀉日可灸二七壯重者七七壯炷如粗叉股腳大炷若大口轉喎灸承漿七七壯即愈主偏風口喎目不得閉腳腫失音不語飲水不收水漿漏落眼瞤動不止瞳子癢遠視䀮䀮昏夜無見病左治右病右治左宜頻針灸以取盡風氣口眼喎斜者以正為度大迎曲頷前一寸三分骨陷中動脈又以口下當兩肩是穴素注針三分留七呼灸三壯主風痙口喑啞口噤不開唇吻瞤動頰腫牙疼寒熱頸痛瘰癧舌強舌緩不收不能言目痛不得閉頰車一名機關一名曲牙耳下曲頰端近前陷中開口有空銅人針四分得氣即瀉日灸七壯止七七壯明堂灸三壯素注針三分主中風牙關不開口噤不語失音牙關痛頷頰腫牙不可嚼物頸強不得回顧口眼喎下關客主人下耳前動脈下廉合口有空開口則閉閉口有穴足陽明少陽之會素注針三分留七呼灸三壯銅人針四分得氣即瀉禁灸又不得久留針針經云刺之則缺不能㰦耳中有干聹摘之不得灸主失缺牙車脫臼目眩齒痛偏風口眼喎斜耳鳴耳聾耳痛膿汁出頭維額角入髮際本神旁一寸五分神庭旁四寸五分足少陽陽明二脈之會銅人針三分素注針五分禁灸主頭痛如破目痛如脫目瞤目風淚出偏風視物不明人迎一名五會頸大脈動應手俠結喉兩旁一寸五分仰而取之以候五臟氣足陽明少陽之會滑氏曰古以俠喉兩旁為氣口人迎至晉王叔和直以左右手寸口為人迎氣口銅人禁針明堂針四分素注刺過深殺人主吐逆霍亂胸中滿喘呼不得息咽喉癰腫瘰癧水突一名水門頸大筋前直人迎下氣舍上銅人針三分灸三壯主咳逆上氣咽喉癰腫呼吸短氣喘息不得臥氣舍頸直人迎下俠天突陷中銅人灸五壯針三分主咳逆上氣肩腫不得顧喉痹哽噎咽腫不消食飲不下癭瘤缺盆一名天蓋肩下橫骨陷中銅人灸三壯針三分素注針二分留七呼不宜太深深則使人逆息素問刺缺盆中內陷氣泄令人喘咳主息奔胸滿喘急水腫瘰癧喉痹汗出寒熱缺盆中腫外㿉則生胸中熱滿傷寒胸中熱不已氣戶巨骨下俞府兩旁各二寸陷中仰而取之去中行各四寸去膺窗四寸八分銅人針三分灸五壯主咳逆上氣胸背痛咳逆不得息不知味咳嗽胸脅支滿喘息庫房氣戶下一寸六分陷中去中行各四寸仰而取之銅人灸五壯針三分主胸脅滿咳逆上氣呼吸不至息唾膿血濁沫屋翳庫房下一寸六分陷中氣戶下三寸二分去中行各四寸巨骨下四寸八分仰而取之素注針四分銅人灸五壯針二分主咳逆上氣唾血多濁沫膿血痰飲身體腫皮膚痛不可近衣淫濼瘛瘲不仁膺窗屋翳下一寸六分陷中去中行各四寸銅人針四分灸五壯主胸滿短氣不得臥腸鳴注泄乳癰寒熱乳中當乳中是銅人微刺三分禁灸灸則不幸生蝕瘡瘡中有膿血清汁可治瘡中有息肉若蝕瘡者死素問云刺乳上中乳房為腫根蝕丹溪曰乳房陽明胃所經乳頭厥陰肝所屬乳去聲子之母不知調養忿怒所逆鬱悶所遏厚味所釀以致厥陰之氣不行竅不得通汁不得出陽明之血沸騰熱甚化膿亦有所乳之子膈有滯痰口氣焮熱含乳而睡熱氣所吹遂生結核初起時便須忍痛揉令稍軟吮令汁透自可消散失此不治必成癰癤若加以艾火兩三壯其效尤捷粗工便用針刀卒惹拙病若不得夫與舅姑憂怒鬱悶脾氣消阻肝氣橫逆遂成結核如棋子不痛不癢十數年後為瘡陷名曰奶岩以此瘡形如嵌凹似巖穴也不可治矣若於始生之際便能消息病根使心清神安然後施治亦有可安之理乳根乳中下一寸六分陷中去中行各四寸仰而取之銅人灸五壯針三分素注針四分灸三壯主胸下滿悶胸痛鬲氣不下食噎病臂痛腫乳痛乳癰悽悽寒熱痛不可按咳逆霍亂轉筋四厥不容幽門旁相去各一寸五分去中行任脈各三寸上脘兩旁各一寸直四肋間銅人灸五壯明堂三壯針五分素注針八分主腹滿痃癖唾血肩脅痛口乾心痛與背相引不可咳咳則引肩痛嗽喘疝瘕不嗜食腹虛鳴嘔吐痰癖承滿不容下一寸去中行各三寸銅人針三分灸五壯明堂三壯主腸鳴腹脹上氣喘逆食飲不下肩息唾血梁門承滿下一寸去中行各三寸銅人針二分灸五壯主脅下積氣食飲不思大腸滑泄完穀不化關門梁門下一寸去中行各三寸銅人針八分灸五壯主善滿積氣腸鳴卒痛泄利不欲食腹中氣走俠臍急痛身腫痰瘧振寒遺溺太乙關門下一寸去中行各三寸銅人灸五壯針八分主心煩癲狂吐舌滑肉門太乙下一寸下俠臍下一寸至天樞去中行各三寸銅人灸五壯針八分主癲狂嘔逆吐血重舌舌強天樞一名長溪一名谷門去肓俞半寸俠臍中兩傍各二寸陷中大腸之募銅人灸五壯濟生拔萃灸百壯針五分留十呼千金云魂魄之舍不可針素注針五分留七呼主奔豚泄瀉脹疝赤白痢水痢不止食不下水腫腹脹腸鳴上氣衝胸不能久立久積冷氣繞臍切痛時上衝心煩滿嘔吐霍亂冬月感寒泄利瘧寒熱狂言傷寒飲水過多腹脹氣喘婦人女子癥瘕血結成塊漏下赤白月事不時外陵天樞下一寸去中行各二寸素注一寸半銅人灸五壯針三分素注針八分主腹痛心下如懸下引臍痛大巨外陵下一寸天樞下二寸素注一寸去中行各二寸素注作一寸半銅人針五分灸五壯素注針八分主小腹脹滿煩渴小便難㿉疝偏枯四肢不收驚悸不眠水道大巨下二寸素注三寸去中行各二寸銅人灸五壯針三分半素注針二分半主肩背痠疼三焦膀胱腎中熱氣婦人小腹脹滿痛引陰中月水至則腰背痛胞中瘕子門寒大小便不通歸來水道下二寸素注三寸去中行各二寸銅人灸五壯針五分素注針八分主奔豚卵上入腹引莖中痛婦人血臟積冷氣衝一名氣街歸來下素注腹下俠臍相去四寸鼠鼷上一寸動脈應手宛宛中衝脈所起銅人灸七壯禁針素問刺氣街中脈血不出為腫鼠僕明堂針三分留七呼氣至即瀉灸三壯主腹滿不得正臥㿗疝大腸中熱身熱腹痛大氣石水陰痿莖痛兩丸騫痛小腹奔豚腹有逆氣上攻心腹脹滿上搶心痛不得息腰痛不得俯仰淫濼傷寒胃中熱婦人無子小腹痛月水不利妊娠子上衝心産難包衣不出東垣曰脾胃虛弱感濕成痿汗大泄妨食三里氣街以三稜針出血又曰吐血多不愈以三稜針於氣街出血立愈髀關膝上伏兔後交分中銅人針六分灸三壯主腰痛足麻木膝寒不仁痿痹股內筋絡急不屈伸小腹引喉痛伏兔膝上六寸起肉正跪坐而取之一云膝蓋上七寸以左右各三指按捺上有肉起如兔之狀因以此名此事難知定癰疽死地分有九伏兔居一劉宗厚曰脈絡所會也主膝冷不得溫風勞痹逆狂邪手攣縮身癮疹腹脹少氣頭重腳氣婦人八部諸疾陰市一名陰鼎膝上三寸伏兔下陷中拜而取之銅人針三分禁灸明堂灸三壯主腰腳如冷水膝寒痿痹不仁不屈伸卒寒疝力痿少氣小腹痛脹滿腳氣腳以下伏兔上寒消渴梁丘膝上二寸兩筋間銅人灸三壯針三分明堂針五分主膝腳腰痛冷痹不仁難跪不可屈伸足寒大驚乳腫痛犢鼻膝臏下䯒骨上俠解大筋陷中形如牛鼻故名素注針六分銅人針三分灸三壯素問刺犢鼻出液為跛主膝中痛不仁難跪起腳氣膝臏腫膝臏腫潰者不可治不潰可治若犢鼻堅硬不便攻先洗尉微刺之愈三里膝下三寸䯒骨外廉大筋內宛宛中兩筋肉分間舉足取之極重按之則趺上動脈止矣又云犢鼻下三寸足陽明胃脈所入為合土素注刺一寸留一呼灸三壯銅人灸三壯針五分明堂針八分留十呼瀉七吸日灸七壯止百壯素注刺一寸千金灸五百壯少亦一二百壯主胃中寒心腹脹滿腸鳴臟氣虛憊真氣不足腹痛食不下大便不通心悶不已卒心痛腹有逆氣上攻腰痛不得俯仰小腸氣水氣蠱毒鬼擊痃癖四肢滿膝䯒痠痛目不明産婦血暈不省人事秦承祖云諸病皆治華他云主五勞羸瘦七傷虛乏胸中瘀血乳癰千金翼云主腹中寒脹滿腸中雷鳴氣上衝胸喘不能久立腹痛胸腹中瘀血小腹脹皮腫陰氣不足小腹堅傷寒熱不已熱病汗不出喜嘔口苦壯熱身反折口噤鼓頷腫痛不可回顧顧而有所見喜悲上下求之口噼乳腫喉痹不能言胃氣不足久泄利食不化脅下支滿不能久立膝痿寒熱中消穀苦飢腹熱身煩狂言乳癰喜噫惡聞食臭狂歌妄笑恐怒大罵霍亂遺失失氣陽厥悽悽惡寒頭眩小便不利喜噦腳氣外臺祕要云人年三十以上若不灸三里令人氣上衝目東垣曰飲食失節及勞役形質陰火乘於坤土之中致穀氣榮氣清氣胃氣元氣不得上升滋於六腑之陽氣是五陽之氣先絶於外外者天也下流入於坤土陰火之中皆由喜怒悲憂恐為五賊所傷而後胃氣不行勞役飲食不節繼之則元氣乃傷當於胃合三里穴中推而揚之以伸元氣又曰氣在於腸胃者取之足太陰陽明不下者取之三里又曰氣逆霍亂者取三里氣下乃止不下復治又曰胃病者胃脘當心而痛上支兩脅鬲噎不通飲食不下取三里以補之脾胃虛弱感濕成痿汗大泄妨食三里氣街以三稜針出血若汗不減不止者於三里穴下三寸上廉出血禁酒濕面又曰六淫客邪及上熱下寒筋骨皮肉血脈之病錯取於胃之合三里大危又曰有人年少氣弱常於三里氣海灸之節次約五七十壯至年老熱厥頭痛雖大寒猶喜風寒痛愈惡暖處及煙火皆灸之過也巨虛上廉一名上巨虛三里下三寸舉足取之足陽明胃合手陽明大腸銅人灸三壯針三分甄權隨年為壯明堂針八分得氣即瀉灸日七壯下至三壯主藏氣不足偏風腳氣腰腿手足不仁腳脛痠痛屈伸難不能久立風水膝腫骨髓冷疼大腸冷食不化飧泄勞瘵夾臍腹脅痛腸中切痛雷鳴氣上衝胸喘息不能行不能久立傷寒胃中熱東垣曰脾胃虛弱濕痿汗泄妨食三里氣街出血不愈於上廉出血條口下廉上一寸舉足取之銅人針五分明堂八分灸三壯主足麻木風氣足下熱不能久立足寒膝痛脛寒濕痹腳痛胻腫轉筋足緩不收巨虛下廉一名下巨虛上廉下三寸蹲地舉足取之足陽明胃與手太陽小腸合銅人針八分灸三壯素注針三分明堂針六分得氣即瀉甲乙灸日七七壯主小腸氣不足面無顏色偏風腿痿足不履地熱風冷痹不遂風濕痹喉痹腳氣不足沉重唇乾涎出不覺不得汗出毛髮焦肉脫傷寒胃中熱不嗜食泄膿血胸脅小腹控睪而痛時窘之後當耳前熱若寒甚若獨肩上熱甚及小指次指之間熱痛暴驚狂言語非常女子乳癰足跗不收跟痛豐隆外踝上八寸下䯒外廉陷中足陽明絡別走太陰銅人針三分灸三壯明下七壯主厥逆大小便難怠惰腿膝酸屈伸難胸痛如刺腹若刀切痛風痰頭痛風逆四肢腫足清身寒濕喉痹不能言登高而歌棄衣而走見鬼好笑氣逆則喉痹卒喑實則癲狂瀉之虛則足不收脛枯補之解溪衝陽後一寸五分腕上陷中足大指次指直上跗上陷者宛宛中足陽明胃脈所行為經火胃虛補之銅人灸三壯針五分留三呼主風面浮腫顏黑厥氣上衝腹脹大便下重瘈驚膝股胻腫轉筋目眩頭痛癲疾煩心悲泣霍亂頭風面赤目赤眉攢疼不可忍衝陽足跗上五寸去陷谷三寸骨間動脈足陽明胃脈所過為原胃虛實皆拔之素注針三分留十呼素問刺足跗上動脈血出不止死銅人針五分灸三壯主偏風口眼喎跗腫齒齲發寒熱腹堅大不嗜食傷寒病振寒而缺久狂登高而歌棄衣而走足緩履不收身前痛陷谷足大指次指外間本節後陷中去內庭二寸足陽明胃脈所注為俞木素注針五分留七呼灸三壯主面目浮腫及水病善噫腸鳴腹痛熱病無度汗不出振寒瘧疾東垣曰氣在於臂足取之先去血脈後取其陽明少陰之滎俞內庭陷谷深取之內庭足大指次指外間陷中足陽明胃脈所溜為滎水銅人灸三壯針三分留十呼甲乙留二十呼主四肢厥逆腹脹滿數缺惡聞人聲振寒咽中引痛口喎上齒齲瘧不嗜食腦皮膚痛鼻衄不止傷寒手足逆冷汗不出赤白痢仲景曰太陽若欲作再經者針足陽明使不傳則愈厲兌足大指次指之端去爪甲角如韭葉足陽明胃脈所出為井金胃實瀉之銅人針一分灸一壯一云三壯主尸厥口噤氣絶狀如中惡心腹脹滿水腫熱病汗不出寒瘧不嗜食面腫足胻寒喉痹上齒齲惡寒鼻不利多驚好臥狂欲登高而歌棄衣而走黃疸鼽衄口喎唇疹頸腫膝臏腫痛循胸乳氣街股伏兔胻外廉足跗上痛消穀善飢溺黃脾重二斤三兩扁廣三寸長五寸有散膏半斤居脊之第十二椎掩乎太倉胃主裹血溫五臟中央黃色入通於脾開竅於口藏精於脾故病在舌本其味甘其類土其畜牛其谷稷其應四時上為鎮星是以知病之在肉也其音宮其數五其臭焦其液涎其色黃中央生濕濕生土土生甘甘生脾脾生肉肉生肺脾主口其在天為濕在地為土在體為肉在臟為脾在色為黃在音為宮在聲為歌在變動為噦在竅為口在味為甘在志為思思傷脾怒勝思濕傷肉風勝濕甘傷肉酸勝甘脾之合肉也其榮唇也其主肝也脾胃者倉廩之官五味出焉脾者倉廩之本營之居也其華在唇四白其充在肌此至陰之類通於土氣從滑氏改正脾者土也孤臟以灌四旁脾主四肢為胃行其津液丹溪曰脾具坤靜之德而有乾健之用易牝馬地類行地無強之意脾主治中央常以四時長四臟各十八日寄治不獨主於時也脾氣通於口口和則知穀味矣脾氣虛則夢飲食不足得其時則夢築垣牆蓋屋長夏及四季脾色黃欲如羅裹雄黃不欲如黃土一云枳實脾氣絶則脈不榮其唇口唇者肌肉之本也脈不榮則肌肉不滑澤肌肉不滑澤則肉滿肉滿則唇反唇反則肉先死甲日篤乙日死足太陰脾經足太陰之脈起於大指之端循指內側白肉際過核骨後上內踝前廉核骨一作核骨俗云孤拐骨是也足跟後兩旁起骨為踝骨足太陰起大指之端隱白穴受足陽明之交也由是循大指內側白肉際大都穴過核骨後歷太白公孫商丘上內踝前廉之三陰交也上腨內循䯒骨後交出厥陰之前腨示兗切腨腓腸也由三陰交上腨內循䯒骨後之漏谷上行二寸交出足厥陰經之前至地機陰陵泉上循膝股內前廉入腹屬脾絡胃髀內為股臍上下為腹自陰陵泉上循膝股內前廉之血海箕門迤邐入腹經衝門府舍會中極關元復循腹結大橫會下脘歷腹哀過日月期門之分循本經之裡下至中脘下脘之際以屬脾絡胃也上膈挾咽連舌本散舌下咽所以咽物者居喉之前至胃長一尺六寸為胃系也舌本舌根也由腹哀上膈循食竇天溪胸鄉周榮由周榮外曲折向下至大包又自大包外曲折向上會中腑上行人迎之裡挾喉連舌本散舌下而終焉其支別者復從胃別上膈注心中此支由腹哀別行再從胃部中脘穴之外上膈注於膻中之裡心之分以交於手少陰此經多氣少血巳時氣血注此凡二十一穴左右共四十二穴隱白足大指端內側去爪甲角如韭葉脾脈所出為井木素注針一分留三呼銅人針三分留三呼灸三壯主腹脹喘滿不得安臥嘔吐食不下胸中熱暴泄衄血卒尸厥不識人足寒不能溫婦人月事過時不止小兒客忤慢驚風大都足大指本節後內側陷中骨縫赤白肉際脾脈所溜為滎火脾虛補之銅人針三分灸三壯主熱病汗不出不得臥身重骨疼傷寒手足逆冷腹滿善嘔煩熱悶亂吐逆目眩腰痛不可俯仰繞踝風胃心痛腹脹胸滿心蛔痛小兒客忤太白足大指內側內踝前核骨下陷中脾脈所注為俞土銅人針三分灸三壯主身熱煩滿腹脹食不化嘔吐泄瀉膿血腰痛大便難氣逆霍亂腹中切痛腸鳴膝股胻酸轉筋身重骨痛胃心痛腹脹胸滿心痛脈緩公孫足大指本節後一寸內踝前脾之絡脈別走陽明胃經銅人針四分灸三壯主寒瘧不嗜食癇氣好太息多寒熱汗出病至則喜嘔嘔已乃衰頭面腫起煩心狂言多飲膽虛厥氣上逆則霍亂實則腸中切痛瀉之虛則鼓脹補之商丘足內踝骨下微前陷中脾脈所行為經金脾實瀉之銅人灸三壯針三分主腹脹腸中鳴不便脾虛令人不樂身寒善太息心悲骨痹氣逆痔疾骨疽蝕魘夢癇瘈寒熱好嘔陰股內痛氣癰狐疝走上下引小腹痛不可俯仰脾積痞氣黃疸舌本強痛胃脘痛腹脹寒瘧溏瘕泄水下面黃善思善味食不消體重節痛怠惰嗜臥婦人絶子小兒慢風三陰交內踝上三寸骨下陷中足太陰少陰厥陰之交會銅人針三分灸三壯主脾胃虛弱心腹脹滿不思飲食脾痛身重四肢不舉腹脹腸鳴溏泄食不化痃癖腹寒膝內廉痛小便不利陰莖痛足痿不能行疝氣小便遺失膽虛食後吐水夢遺失精霍亂手足逆冷失缺頰車蹉開張口不合男子陰莖痛元髒髮動臍下痛不可忍小兒客忤婦人臨經行房羸瘦癥瘕漏血不止月水不止妊娠胎動橫生産後惡露不行去血過多血崩暈不省人事如經脈閉塞不通瀉之立通經脈虛耗不行者補之經脈益盛則通按宋太子出苑逢妊婦診曰女徐文伯曰一男一女太子性急欲視文伯瀉三陰交補合谷胎應針而下果如文伯之診後世遂以三陰交合谷為妊婦禁針然文伯瀉三陰交補合谷而墮胎今獨不可補三陰交瀉合谷而安胎乎蓋三陰交腎肝脾三脈之交會主陰血血當補不當瀉合谷為大腸之原大腸為肺之腑主氣當瀉不當補文伯瀉三陰交以補合谷是血衰氣旺也今補三陰交瀉合谷是血旺氣衰矣故劉元賓亦曰血衰氣王定無妊血王氣衰應有體漏谷一名太陰絡內踝上六寸䯒骨下陷中銅人針三分灸三壯主腸鳴強缺心悲逆氣腹脹滿急痃癖冷氣食飲不為肌膚膝痹足不能行地機一名脾舍膝下五寸膝內側輔骨下陷中伸足取之足太陰郤別走上一寸有空銅人灸三壯針五分主腰痛不可俯仰溏泄腹脅脹水腫腹堅不嗜食小便不利精不足女子癥瘕按之如湯沃股內至膝陰陵泉膝下內側輔骨下陷中伸足取之或曲膝取之與陽陵泉穴相對足太陰脾脈所入為合水銅人針五分主腹中寒不嗜食脅下滿水脹腹堅喘逆不得臥腰痛不可俯仰霍亂疝瘕遺尿失禁不自知小便不利氣淋寒熱不節陰痛胸中熱暴泄飧泄血海膝臏上內廉白肉際二寸半銅人針五分灸三壯主氣逆腹脹女子漏下惡血月事不調東垣曰女子漏下惡血月事不調暴崩不止多下水漿之物皆由飲食不節或勞傷形體或素有氣不足灸太陰脾經七壯箕門魚腹上越筋間陰股內動脈應手一云股上起筋間銅人灸三壯主淋小便不通遺溺鼠鼷腫痛衝門一名上慈宮去大橫五寸府舍下橫骨兩端約紋中動脈去腹中行四寸半銅人針七分灸五壯主腹寒氣滿腹中積聚疼癃淫濼陰疝婦人乳難妊娠子衝心不得息府舍腹結下三寸去腹中行各四寸半足厥陰太陰陰維之會三脈上下一一入腹絡肝脾結心肺從脅上至肩此太陰郤三陰陽明之別銅人灸五壯針七分主疝癖痹疼腹滿上搶心積聚霍亂腹結一名陽窟十四經發揮云大橫下一寸三分去腹中行四寸半銅人針七分灸五壯主咳逆臍痛腹寒瀉利心痛大橫腹哀下三寸五分直臍旁二寸五分去腹中行四寸半足太陰陰維之會銅人針七分灸三壯主大風逆氣多寒善悲四肢不可舉動多汗洞痢腹哀日月下一寸五分去腹中行四寸半足太陰陰維之會銅人針三分主寒中食不化大便膿血食竇天溪下一寸六分舉臂取之銅人針四分灸五壯主胸脅支滿鬲間雷鳴常有水聲鬲痛天溪胸鄉下一寸六分陷中仰而取之銅人針四分灸五壯主胸中滿痛咳逆上氣喉中作聲婦人乳腫㿉癰胸鄉周榮下一寸六分陷中仰而取之銅人針四分灸五壯主胸脅支滿引胸背痛不得臥轉側難周榮中府下一寸六分仰而取之銅人針四分灸五壯主胸脅滿不得俯仰食不下喜飲咳唾稠膿咳逆多淫淫恐作唾大包淵液下三寸布胸脅中出九肋間脾之大絡總統陰陽諸絡由脾灌溉五臟銅人灸三壯針三分主胸脅中痛喘氣實則身盡痛瀉之虛則百節盡皆縱補之心重一十二兩附著於脊之第五椎居肺下膈上中有七孔三毛一云惟上智之人有之形如未敷蓮花南方赤色入通於心開竅於耳當言舌舌非竅故言耳藏精於心故病在五臟其味苦其類火其畜羊其谷黍其應四時上為熒惑星是以知病之在脈也其音徵其數七其臭焦其味苦其聲言其液汗南方生熱熱生火火生苦苦生心心生血血生脾心主舌其在天為熱在地為火在體為脈在臟為心在色為赤在音為徵在聲為笑在變動為憂在竅為舌在味為苦在志為喜喜傷心恐勝喜苦傷氣咸勝苦心者君主之官也神明出焉心者生之本神之變也其華在面其充在血脈為陽中之太陽通於夏氣心之合脈也其榮色也其主腎也心氣通於舌舌和則知五味矣心氣虛則夢救火陽物得其時同夢燔灼夏三月心色赤欲如帛裹朱不欲如赭素問五臟俱等而肺獨在膈上者何也然心者血肺者氣血為榮氣為衛相隨上下謂之榮衛通行經絡榮周於身故令心肺在膈上也陳氏曰心肺能以血氣生育人身則此身之父母也父母之尊理當居上故曰膈膜之上中有父母心氣絶則脈不通脈不通則血不流血不流則色澤去故面色黑如黎者血先死壬日篤癸日死手少陰心經手少陰之脈起於心中出屬心系下膈絡小腸心系有二一則上與肺相通而入肺兩大葉間一則由肺葉而下曲折向後並脊裡細絡相連貫脊髓與腎相通正當七節之間蓋五臟系皆通於心而心通五臟系也手少陰經起於心循任脈之外屬心系下膈當臍上二寸之分絡小腸其支者從心系上挾咽系目支者從心系出任脈之外上行而挾咽系目也其直者復從心系卻上肺出腋下直者得從心系直上至肺臟之分出循腋下抵極泉也穴在臂內腋下筋間動脈入胸下循臑內後廉行太陰心主之後下肘內廉自極泉下循臑內後廉行太陰心主兩經之後歷青靈穴下肘內廉抵少海循臂內後廉抵掌後兌骨之端入掌內廉循小指之內出其端腕下踝為兌骨自少海而下循臂內後廉歷靈道通里至掌後兌骨之端經陰郤神門入掌內廉至少腑循小指端之少衝而終以交於手太陽也滑氏曰心為君主之官示尊於他臟故其交經授受不假支別云此經多血少氣午時氣血注此受足太陰之交凡九穴左右共一十八穴極泉臂內腋下筋間動脈入胸銅人針三分灸七壯主臂肘厥寒四肢厥心痛乾嘔煩滿脅痛悲愁青靈肘上三寸伸肘舉臂取之銅人灸七壯明堂三壯主目黃頭痛振寒脅痛肩臂不舉不能帶衣少海一名曲節肘內廉節後大骨外去肘端五分屈肘向頭得之心脈所入為合水銅人針三分灸三壯甄權云不宜灸針五分甲乙針二分留三呼瀉五吸不宜灸素注灸五壯資生云數說不同要之非大急不灸主寒熱齒齲痛目眩發狂嘔吐涎沫項不得回顧肘攣腋脅下痛四肢不得舉腦風頭痛氣逆噫噦瘰癧心疼手顫健忘靈道掌後一寸五分心脈所行為經金銅人針三分灸三壯主心痛乾嘔悲恐相引瘛瘲肘攣暴喑不能言通里腕後一寸陷中手少陰心脈之絡別走太陽小腸經銅人針三分灸三壯明堂七壯主目眩頭痛熱病先不樂數日懊憹數缺頻呻悲面熱無汗頭風暴喑不言目痛心悸肘臂臑痛苦嘔喉痹少氣遺溺婦人經血過多崩中實則支滿鬲腫瀉之虛則不能言補之陰郤掌後脈中去腕五分銅人針三分灸七壯主鼻衄吐血灑淅畏寒厥逆氣驚心痛神門一名鋭中一名中都掌後鋭骨端陷中手少陰心脈所注為俞土心實瀉之銅人針三分留七呼灸七壯主瘧心煩甚欲得冷飲惡寒則欲處溫中咽乾不嗜食心痛數噫恐悸少氣不足手臂寒面赤喜笑掌中熱而噦目黃脅痛喘逆身熱狂悲笑嘔血吐血振寒上氣遺溺失音心性癡呆健忘心積伏梁大小人五癇東垣曰胃氣下溜五臟氣皆亂其為病互相出見氣在於心者取之手少陰之俞神門大陵同精導氣以復其本位靈樞經曰少陰無俞心不病乎其外經病而臟不病故獨取其經於掌後鋭骨之端心者五臟六腑之大主精神之所舍其臟堅固邪不能容容邪則身死故諸邪皆在心之包絡包絡者心主之脈也少府小指本節後骨縫陷中直勞宮手少陰心脈所溜為滎火銅人針二分灸七壯明堂三壯主煩滿少氣悲恐畏人掌中熱臂酸肘腋攣急胸中痛手拳不伸㾬瘧久不愈振寒陰挺出陰痛陰癢遺尿偏墜小便不利太息少衝一名經始手小指內廉端去爪甲角如韭葉手少陰心脈所出為井木心虛補之銅人針一分灸三壯明堂一壯主熱病煩滿上氣嗌乾渴目黃臑臂內後廉痛厥心痛痰冷少氣悲恐善驚太息煩滿掌中熱脅痛胸中痛口中熱咽中酸乍寒乍熱手攣不伸引肘腋痛悲驚東垣曰一富者前陰臊臭求先師張潔古也治之曰夫前陰足厥陰之脈絡循陰器出其挺末凡臭者心之所主散入五方為五臭入肝為臊此其一也當於肝經瀉行間是治其本後於心經中瀉少衝是治其標小腸重二斤十四兩長三丈二尺廣二寸半徑八分分之少半左回疊積十六曲盛谷二斗四升水六升三合合之大半胃之下口小腸上口也在臍上二寸水穀於是入焉大腸上口小腸下口也至是而泌別清濁水液入膀胱滓穢入大腸小腸者受盛之官化物出焉小腸為赤腸食下則腸實而胃虛以此推之則知糟粕下於大腸小腸亦虛矣手太陽小腸經手太陽之脈起於小指之端循手外側上腕出踝中臂骨盡處為腕腕下兌骨為踝本經起小指端少澤穴由是循手外側之前谷後溪上腕出踝中歷腕骨陽谷養老穴也直上循臂骨下廉出肘內側兩骨之間上循臑外後廉出肩解繞肩胛交肩上脊兩傍為膂膂上兩角為肩解肩解下成片骨為肩胛自養老穴直上循臂骨下廉支正穴出肘內側兩骨之間歷少海穴上循臑外廉行手陽明少陽之外上肩循肩貞臑俞天宗秉風曲垣肩外俞肩中俞諸穴乃上會大椎因左右相交於兩肩之上入缺盆絡心循咽下膈抵胃屬小腸自交肩上入缺盆循肩向腋下行當膻中之分絡心循胃系下膈過上脘抵胃下行任脈之外當臍上二寸之分屬小腸其支者從缺盆貫頸上頰至目鋭眥卻入耳中目外角為鋭眥支者別從缺盆循頸之天窗天容上頰抵顴髎上至目鋭眥過童子髎卻入耳中循聽宮而終也其支別者別循頰上䪼䪼音拙抵鼻至目內眥目下為䪼目大角為內眥其支者別循頰上䪼抵鼻至目內眥睛明穴以交於足太陽也此經多血少氣未時氣血注此受手少陰之交凡一十九穴左右共三十八穴少澤一名小吉手小指端外側去爪甲角下一分陷中手太陽小腸脈所出為井金素注灸三壯銅人灸一壯針一分留二呼主瘧寒熱汗不出喉痹舌強口乾心煩臂痛瘛瘲咳嗽口中涎唾頸項急不可顧目生膚翳覆瞳子頭痛前谷手小指外側本節前陷中手太陽小腸脈所溜為滎水銅人針一分留三呼灸一壯明堂灸三壯主熱病汗不出痎瘧癲疾耳鳴頸項腫喉痹頰腫引耳後鼻塞不利咳嗽吐衄臂痛不得舉婦人産後無乳後溪手小指外側本節後陷中捏拳取之手太陽小腸脈所注為俞木小腸虛補之銅人針一分留二呼灸一壯主瘧寒熱目赤生翳鼻衄耳聾胸滿頭項強不得回顧癲疾臂肘攣急痂疥腕骨手外側腕前起骨下陷中手太陽小腸脈所過為原小腸虛實皆拔之銅人針三分留三呼灸三壯主熱病汗不出脅下痛不得息頸頷腫寒熱耳鳴目冷淚生翳狂惕偏枯肘不得屈伸痎瘧頭痛煩悶驚風瘛瘲五指掣頭痛陽谷手外側腕中鋭骨下陷中手太陽小腸脈所行為經火素注灸三壯針二分留三呼甲乙留二呼主癲疾狂走熱病汗不出脅痛頸頷腫寒熱耳聾耳鳴齒齲痛臂外側痛不舉吐舌戾頸妄言左右顧目眩小兒瘛瘲舌強不嗍乳養老手踝骨前上一云腕骨後一寸陷中銅人針三分灸三壯主肩臂痠疼肩欲折臂如拔手不能自上下目視不明支正腕後五寸手太陽絡脈別走少陰銅人針三分灸三壯明堂灸五壯主風虛驚恐悲愁癲狂五勞四肢虛弱肘臂攣難屈伸手不握十指盡痛熱病先腰頸酸喜渴強項疣目實則節弛肘廢瀉之虛則生疣小如指痂疥補之小海肘內大骨外去肘端五分陷中屈手向頭取之手太陽小腸脈所入為合土小腸實瀉之素注針二分留七呼灸三壯主頸頷肩臑肘臂外後廉痛寒熱齒根腫風眩頸項痛瘍腫振寒肘腋痛腫小腹痛癇發羊鳴戾頸瘛瘲狂走頷腫不可回顧肩似拔臑似折耳聾目黃頰腫肩貞曲胛下兩骨解間肩髃後陷中銅人針五分素注針八分灸三壯主傷寒寒熱耳鳴耳聾缺盆肩中熱痛風痹手足麻木不舉臑俞挾肩髎手少陽穴後大骨下胛上廉陷中舉臂取之手太陽陽維陽蹺三經之會銅人針八分灸三壯主臂酸無力肩痛引胛寒熱氣腫頸痛天宗秉風后大骨下陷中銅人灸三壯針五分留六呼主肩臂痠疼肘外後廉痛頰頷腫秉風天髎外肩上小髃後舉臂有空手太陽陽明手少陽足少陽四脈之會銅人灸五壯針五分主肩痛不能舉曲垣肩中央曲胛陷中按之應手痛銅人灸三壯針五分明堂針九分主肩痹熱痛氣注肩胛拘急痛悶肩外俞肩胛上廉去脊三寸陷中銅人針六分灸三壯明堂一壯主肩胛痛周痹寒至肘肩中俞肩胛內廉去脊二寸陷中素注針六分灸三壯銅人針三分留七呼灸十壯主咳嗽上氣唾血寒熱目視不明天窗一名窗龍頸大筋間前曲頰下扶突後動脈應手陷中銅人灸三壯針三分素注六分主痔瘻頸痛肩胛引項不得回顧耳聾頰腫齒噤中風天容耳下曲頰後素注灸三壯主癭頸項癰不可回顧不能言胸痛胸滿不得息嘔逆吐沫齒噤耳聾耳鳴顴髎面頄骨下廉鋭骨端陷中手少陽太陽之會素注針三分銅人針二分主口喎面赤眼瞤動不止䪼腫齒痛聽會一名多所聞耳中珠子大如赤小豆手足少陽手太陽三脈之會銅人針三分灸三壯明堂針一分甲乙針三分主失音癲疾心腹痛聤耳耳聾如物填塞無聞耳中嘈嘈憹憹蟬鳴膀胱重九兩二銖縱廣九寸居腎之下大腸之側小腸下口乃膀胱上口水液由是滲入焉盛溺九升九合膀胱者州都之官津液藏焉氣化則能出矣膀胱為黑腸從臟屬北方色也王安道曰或曰靈樞經云水穀者常並居胃中成糟粕而俱下大腸而成下焦滲而俱下濟泌別汁滲入膀胱焉王冰曰水液自回腸泌別汁滲入膀胱之中胞氣化之而為溺以泄出也楊介云水穀自小腸盛受於闌門以分別也其水則滲入於膀胱上口為溲便詳以上三說則小便即泌別之水液滲入膀胱以出者也素問則曰飲食入胃遊溢精氣上輸於脾脾散精上歸於肺通調水道下輸膀胱則小便又似水飲精微之氣上升脾肺運化而後成者也將何所司將何所憑乎余曰憑夫理耳且夫溲溺者果何物耶水而已矣水之下流其性則然也故飲入於胃其精氣雖上升其飲之本體固不能上升也惟其不能上升者必有待於上升者為之先道故素問又曰膀胱者津液藏焉氣化則能出矣且水者氣之子氣者水之母氣行則水行氣滯則水滯或者又謂小便純由泌別不由運化蓋不明此理故也雖然膀胱固曰津液之府至於受盛津液則又有胞而居膀胱之中焉故素問曰胞移熱於膀胱靈樞曰膀胱之胞薄以濡類纂曰膀胱者胞之室且夫胞之居於膀胱也有上口而無下口津液既盛於胞無由自出必因乎氣化而後能漸浸潤於膀胱外積於胞下之空處遂為溺以出於前陰也素問所謂膀胱津液藏焉者蓋舉膀胱以該胞也若曰胞下無空處則人溺急時至廁焉能即出乎夫惟積滿胞下空處而不可再容故急急則至廁即出矣或言胞有上口而無下口或言胞上下皆有口或言胞有小竅而為注泄之路不亦妄歟足太陽膀胱經足太陽膀胱之脈起於目內眥上額交巔上目大角為內眥髮際前為額腦上為巔巔頂也足太陽之脈起目內眥睛明穴上額循攢竹過神庭歷曲差五處承光通天自通天斜行左右相交於頂上百會也其支別者從巔至耳上角支別者從巔至百會抵耳上角過率谷浮白竅陰穴所以散養於經脈也其直行者從巔入絡腦還出別下項腦頭髓也頸上為腦腦後為項此直行者由通天穴循絡卻玉枕入絡腦復出下項抵天柱也循肩膊內挾脊抵腰中入循膂絡腎屬膀胱肩後之下為肩膊椎骨為脊尻上橫骨為腰挾脊為膂自天柱而下過大椎陶道卻循肩膊內挾脊兩傍下行歷大杼風門肺俞厥陰俞心俞鬲俞肝俞膽俞脾俞胃俞三焦俞腎俞大腸俞小腸俞膀胱俞中膂內俞白環俞由是抵腰中入循膂絡腎下屬膀胱也其支別者從腰中下貫臀入膕中臀尻也挾腰臗骨兩傍為機機後為臀腓腸上膝後曲處為膕其支別者從腰中循腰髁下挾脊歷上髎次髎中髎下髎按腰髁即腰監骨人脊椎骨有二十一節自十六椎節而下為腰監骨挾脊附著之處其十七至二十凡四椎為腰監骨所掩附而八髎穴則挾脊第一二空云云也會陽在尾骶骨兩傍則二十一椎乃復見而終焉又按督脈當脊中起於長強在二十一椎下推而上之至第十六椎下為陽關穴其二十椎至十七椎皆無穴乃知為腰監骨所掩明矣會陽下貫臀至承扶殷門浮郤委陽入膕中之委中穴也其支別者從膊內左右別下貫胂挾脊內過髀樞膂肉曰胂挾脊肉也其支別者為挾脊兩傍第三行相去各三寸之諸穴自天柱而下從膊內左右別行下貫胂膂歷附分魄戶膏肓神堂譩嘻膈關魂門陽綱意舍胃倉肓門志室胞肓秩邊下歷尻臀過髀樞也股外為髀楗骨之下為髀樞循髀外後廉下合膕中以下貫腨內出外髁之後循京骨至小指外側端腨腓腸也循髀外後廉髀樞之裡承扶之外一寸五分之間而下與前之入膕中者相合下行循合陽穴下貫腨內歷承筋承山飛揚附陽出外踝後之崑崙僕參申脈金門循京骨束骨通谷至小指外側端之至陰穴以交於足少陰也此經多血少氣申時氣血注此受手太陽之交凡六十三穴左右共一百二十六穴刺深五分留六呼睛明一名淚空目內眥明堂云內眥頭外一分宛宛中手足太陽足陽明陰蹺陽蹺五脈之會銅人針一寸半留三呼雀目者可久留針然後速出針禁灸明堂針一分半資生云面部所針淺者一分深者四分素注亦云一分是銅人誤以一分為一寸也素注針一分留六呼灸三壯主目遠視不明惡風淚出憎寒頭痛目眩內眥赤痛䀮䀮無見眥癢浮膚白翳大眥攀睛胬肉侵睛雀目瞳子生障小兒疳眼按東垣曰刺太陽陽明出血則目愈明蓋此經多血少氣故目翳與赤痛從內眥起者刺睛明攢竹以宣泄太陽之熱然睛明刺一分半攢竹刺一分三分為適淺深之宜今醫家刺攢竹臥針直抵睛明不補不瀉而又久留針非古人意也攢竹一名始光一名員柱一名光明兩眉頭少陷宛宛中素注針三分留六呼灸三壯銅人禁灸針一分留三呼瀉三吸徐徐出針宜以細三稜針刺之宣泄熱氣三度刺目大明明堂宜細三稜針三分出血灸一壯主目䀮䀮視物不明淚出目眩瞳子癢目瞢眼中赤痛及瞼瞤動不得臥頰痛面痛尸厥癲邪神狂鬼魅風眩嚏曲差神庭旁一寸五分入髮際銅人針三分灸三壯主目不明鼽衄鼻塞鼻瘡心煩滿汗不出頭頂痛項腫身體煩熱五處夾上星旁一寸五分銅人針三分留七呼灸三壯明堂灸五壯主脊強反折瘛瘲癲疾頭風熱目眩目不明目上戴不識人承光五處後一寸五分又云一寸銅人針三分禁灸主風眩頭風嘔吐心煩鼻塞不利目生白翳通天承光後一寸半銅人針三分留七呼灸三壯主癭氣鼻衄鼻瘡鼻窒鼻多清涕頭旋尸厥口喎喘息項痛重暫起僵仆癭瘤絡卻一名強陽一名腦蓋通天後一寸五分素注刺三分留五呼銅人灸三壯主頭旋耳鳴狂走瘛瘲恍惚不樂腹脹青盲內障目無所見玉枕絡卻後一寸五分又云七分俠腦戶旁一寸三分起肉枕骨上入髮際二寸銅人灸三壯針三分留三呼主目痛如脫不能遠視內連繫急失枕頭項痛風眩頭寒多汗鼻窒不聞天柱俠項後髮際大筋外廉陷中銅人針五分得氣即瀉明堂針二分留三呼瀉五吸灸不及針日七壯至百壯下經三壯素注針二分留六呼主頭旋腦痛頭風鼻不知香臭腦重如脫項如拔項強不可回顧大杼項後第一椎下兩旁相去脊中各一寸五分陷中正坐取之督脈別絡手足太陽少陽之會難經曰骨會大杼疏曰骨病治此袁氏曰肩能負重以骨會大杼也銅人針五分灸七壯明堂禁灸下經素注針三分留七呼灸三壯資生云非大急不灸主膝痛不可屈伸傷寒汗不出腰脊痛胸中鬱郁熱甚不已頭風振寒項強不可俯仰痎瘧頭旋勞氣咳嗽身熱目眩腹痛僵仆不能久立煩滿裡急身不安筋攣癲疾身踡急東垣曰五臟氣亂在於頭取之天柱大杼不補不瀉以導氣而已風門一名熱府二椎下兩旁相去脊中各一寸五分正坐取之銅人針五分素注三分留七呼明堂灸五壯若頻刺泄諸陽熱氣背永不發癰疽灸五壯主發背癰疽身熱上氣短氣咳逆胸背痛風勞嘔吐傷寒頭項強目瞑胸中熱肺俞第三椎下兩旁相去脊中各一寸五分千金對乳引繩度之甄權以搭手左取右右取左當中指末是正坐取之難經曰陰病行陽故五臟俞皆在陽滑氏曰背為陽俞史記扁鵲傳作輸猶委輸經氣由此而輸彼也甲乙針三分留七呼得氣即瀉甄權針五分留七呼灸百壯明下三壯素問刺中肺三日死其動為咳又曰五日死主癭氣黃疸勞瘵口舌乾勞熱上氣腰脊強痛寒熱喘滿虛煩傳尸骨蒸肺痿咳嗽肉痛皮癢嘔吐支滿不嗜食狂走欲自殺背僂肺中風偃臥胸滿短氣瞀悶汗出百毒病食後吐水小兒龜背仲景曰太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬者當刺太陽肺腧肝腧按素問云刺胸腹者必避五臟中肺者三日死云云銅人乃於背部各俞穴言之則固矣厥陰俞一名闕俞四椎下兩旁相去脊中各一寸五分正坐取之銅人針三分灸七壯主咳逆牙痛心痛胸滿嘔吐留結煩悶或曰臟腑皆有俞在背獨心包絡無俞何也曰厥陰俞即心包絡俞也心俞五椎下兩旁相去脊中各一寸五分正坐取之銅人針三分留七呼得氣即瀉不可灸明堂灸三壯資生云刺中心一日死其動為噫又曰環死豈可妄針千金言中風心急灸心俞百壯當權其緩急可也主偏風半身不遂心氣亂恍惚心中風偃臥不得傾側悶亂冒絶汗出唇赤狂走發癇語悲泣胸悶亂咳吐血黃疸鼻衄目瞤目昏嘔吐不下食丹毒遺精白濁健忘小兒心氣不足數歲不語鬲俞七椎下兩旁相去脊中各一寸五分正坐取之難經曰血會鬲俞疏曰血病治此蓋上則心俞心主血下則肝俞肝藏血故鬲俞為血會又足太陽多血血乃水之象也銅人針三分留七呼灸三壯素問刺中鬲皆為傷中其病難愈不過一歲必死主心痛周痹吐食翻胃骨蒸四肢怠惰嗜臥痃癖咳逆嘔吐鬲胃寒痰食飲不下熱病汗不出身重常溫不能食食則心痛身痛臚脹脅腹滿自汗盜汗肝俞九椎下兩旁相去脊中各一寸五分正坐取之經曰東風傷於春病在肝俞銅人針三分留六呼灸三壯明堂灸七壯素問刺中肝五日死其動為缺主多怒黃疸鼻酸熱病後目暗淚出目眩氣短咳血目上視咳逆口乾寒疝筋寒熱痙筋急相引轉筋入腹將死千金云咳引兩脅急痛不得息轉側難橛肋下與脊相引而反折目上視目眩眉頭痛驚狂鼽衄起則目䀮䀮生白翳咳引胸中痛寒疝小腹痛唾血短氣熱病瘥後食五辛目暗肝中風踞坐不得低頭繞兩目連額上色微青積聚痞痛膽俞十椎下兩旁相去脊中各一寸五分正坐取之銅人針五分留七呼灸三壯明堂針三分下經灸五壯素問刺中膽一日半死主頭痛振寒汗不出腋下腫心腹脹口苦舌乾咽痛乾嘔吐骨蒸勞熱食不下目黃按資生經所載崔知悌平取四花穴上二穴是鬲俞下二穴是膽俞四穴主血故取此以治勞瘵後世誤以四花為斜取非也脾俞十一椎下兩旁相去脊中各一寸五分正坐取之銅人針三分留七呼灸三壯明堂灸五壯素問刺中脾十日死其動為吞又曰五日死主多食身疲瘦吐咸汁痃癖積聚脅下滿泄利痰瘧寒熱水腫氣脹引脊痛黃疸善缺不嗜食胃俞十二椎下兩旁相去脊中各一寸五分正坐取之銅人針三分留七呼灸隨年為壯明堂灸三壯下經七壯主霍亂胃寒腹脹而鳴翻胃嘔吐不嗜食多食羸瘦目不明腹痛胸脅支滿脊痛筋攣小兒羸瘦不生肌膚東垣曰中濕者治在胃俞三焦俞十三椎下兩旁相去脊中各一寸五分正坐取之銅人針五分留七呼灸三壯明堂針三分灸五壯主臟腑積聚脹滿羸瘦不能飲食傷寒頭痛飲食吐逆肩背急腰脊強不得俯仰水穀不化泄注下利腹脹腸鳴目眩頭痛腎俞十四椎下兩旁相去脊中各一寸五分與臍平正坐取之欲知背俞先度其兩乳間中折之更以他草度去半已即以兩隅相拄也乃舉以度其背令其一隅居上齊脊大椎兩隅在下當其下隅者肺之俞也復下一度心之俞也復下一度左角肝之俞也右角脾之俞也復下一度腎之俞也銅人針三分留七呼灸以年為壯明堂灸三壯素問刺中腎六日死其動為嚏又曰五日死主虛勞羸瘦耳聾腎虛水藏久冷心腹䐜滿脹急兩脅滿引小腹急痛脹熱小便淋目視䀮䀮少氣溺血小便濁出精夢泄腎中風踞坐而腰痛消渴五勞七傷虛憊腳膝拘急腰寒如水頭重身熱振栗食多羸瘦面黃黑腸鳴膝中四肢淫濼洞泄食不化身腫如水女人積冷氣成勞乘經交接羸瘦寒熱往來大腸俞十六椎下兩旁相去脊中各一寸五分伏取之銅人針三分留六呼灸三壯主脊強不得俯仰腰痛腹中氣脹繞臍切痛腸鳴引脊痛多食身瘦腹中雷鳴大腸中風而鳴大腸灌沸腸癖泄利白痢食不化小腹絞痛大小便難東垣云中燥治在大腸俞小腸俞十八椎下兩旁相去脊中各一寸五分伏而取之銅人針三分留六呼灸三壯主膀胱三焦津液少大小腸寒熱小便赤不利淋瀝遺溺小腹脹滿㽲痛泄痢膿血五色赤痢下重腫痛腳腫五痔頭痛虛乏消渴口乾不可忍婦人帶下東垣云中暑治在小腸俞膀胱俞十九椎下兩旁相去脊中各一寸五分伏取之銅人針三分留六呼灸三壯明堂灸七壯主風勞脊急強小便赤黃遺溺陰生瘡少氣脛寒拘急不得屈伸腹滿大便難泄利腹痛腳膝無力女子瘕聚中膂內俞一名脊內俞二十椎下兩旁相去脊中各一寸五分俠脊胂起肉伏取之銅人針三分留十呼灸三壯明堂云腰痛俠脊裡痛上下按之應者從項至此穴痛皆宜灸主腎虛消渴腰脊強不得俯仰腸冷赤白痢疝痛汗不出腹脹脅痛白環俞二十一椎下兩旁相去脊中各一寸五分伏取之一云挺伏地端身兩手相重支額縱息令皮膚俱緩乃取其穴素注針五分得氣則先瀉瀉訖多補之不宜灸明堂云灸三壯主手足不仁腰脊痛疝痛大小便不利腰髖疼腳膝不遂溫瘧腰脊冷疼不得久臥勞損虛風腰背不便筋攣痹縮虛熱閉塞上髎第一空腰踝下一寸俠脊陷中足太陽少陽之絡銅人針三分灸七壯主大小便不利嘔逆膝冷痛鼻衄寒熱瘧陰挺出婦人白瀝絶嗣大理趙卿患偏風不能起跪甄權針上髎環跳陽陵泉巨虛下廉即能起跪八髎總治腰痛次髎第二空俠脊陷中銅人針三分灸七壯主大小便不利腰痛不得轉搖背腠寒小便赤心下堅脹疝氣下墜足清不仁陰氣痛腸鳴注泄偏風婦人赤白淋中髎三空俠脊陷中足厥陰少陽所結之會銅人針二分留十呼灸三壯主大小便不利腹脹下利五勞七傷六極大便難小便淋瀝飧泄婦人帶下月事不調下髎四空俠脊陷中銅人針二分留十呼灸三壯主大小便不利腸鳴注瀉寒濕內傷大便下血腰不得轉痛引卵女子下蒼汁不禁中痛引小腸急痛會陽一名利機陰尾尻骨兩旁銅人針八分灸五壯主腹寒熱氣冷氣泄瀉久痔腸癖下血陽氣虛乏陰汗濕承扶一名肉郤一名陰關一名皮部尻臀下股陰上紋中又云尻臀下陷紋中銅人針七分灸三壯主腰脊相引如解久痔尻脽腫大便難陰胞有寒小便不利殷門肉郤下六寸銅人針七分主腰脊不可俯仰舉重惡血泄注外股腫浮郤委陽上一寸展膝得之銅人針五分灸三壯主霍亂轉筋小腸熱大腸結脛外經筋急髀樞不仁小便熱大便堅委陽承扶下一尺六寸屈身取之足太陽之前少陽之後出於膕中外廉兩筋間三焦下輔俞足太陽之別絡素注針七分留五呼灸三壯主腰脊痛不可俯仰引陰中不得小便瘛瘲癲疾小腹堅傷寒熱甚委中一名血郤膕中央約紋動脈陷中令人面挺伏地臥取之足太陽膀胱脈所入為合土素注針五分留七呼銅人針八分留三呼瀉七呼甲乙針五分灸三壯素問刺郤中大脈令人僕脫色主膝痛及拇指腰俠脊沉沉然遺溺腰重不能舉體小腹堅滿風痹髀樞痛可出血痼疹皆愈傷寒四肢熱熱病汗不出取其經血立愈委中者血郤也大風發眉墮落刺之出血附分二椎下附項內廉兩旁相去脊中各三寸正坐取之手足太陽之會銅人針三分素注刺八分灸五壯主肘不仁肩背拘急風冷客於腠理頸痛不得回顧魄戶直附分下三椎下兩旁相去脊中行各三寸正坐取之銅人針五分得氣即瀉又宜久留針日灸七壯至百壯素注灸五壯主背膊痛虛勞肺痿三尸走疰項強急不得回顧喘息咳逆嘔吐煩滿膏肓俞四椎下近五椎上兩旁相去脊中各三寸正坐曲脊伸兩手以臂著膝前令端直手大指與膝頭齊以物支肘毋令搖動取之銅人灸百壯多至五百壯當覺礱礱然似水流之狀亦當有所下若無停痰宿飲則無所下也如病人已困不能正坐當令側臥挽上臂令取穴灸之又當灸臍下氣海丹田關元中極四穴中取一穴又灸足三里以引火氣實下主無所不療羸瘦虛損傳尸骨蒸夢中失精上氣咳逆發狂健忘痰病左傳成公十年晉侯有疾求醫於秦秦使醫緩秦醫名緩為之未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也公曰良醫也厚為之禮而歸之孫思邈曰時人拙不能得此穴所以宿疴難遣若能用心方便求得灸之無疾不愈矣按先儒謂左氏失之誣其所載固未足信而思邈所譏恐未中理何者如使天下無不可醫之疾則思邈所著千金翼方二書具存其方其法豈能百發百中哉以是知鏡川上工十全之論有為而發也又按肓鬲也心下為膏又曰凝者為脂釋者為膏又曰膏連心脂膏也楊文懿文集云周官論醫事以十全為上失一二三為次之十失四為下吾嘗疑之夫疾有淺深則醫有難易淺者雖庸醫可十全也使越人逢若齊侯者三四使和緩逢若晉侯者三四則皆失之矣果孰為上下乎神堂五椎下兩旁相去脊中各三寸陷中正坐取之銅人針三分灸五壯明堂灸三壯素注針五分主腰背脊強急不可俯仰灑淅寒熱胸腹滿氣逆上攻時噎譩嘻肩膊內廉俠六椎下兩旁相去脊中各三寸正坐取之以手重按病人言譩嘻應手素注留七呼銅人針六分留三呼瀉五吸灸二七壯止百壯明堂灸五壯主大風汗不出勞損不得臥溫瘧寒瘧背悶氣滿腹脹氣眩胸中痛引腰背腋拘脅痛目眩目痛鼻衄喘逆臂膊內廉痛不得俯仰小兒食時頭痛五心熱鬲關七椎下兩旁相去脊中行各三寸陷中正坐開肩取之銅人針五分灸三壯主背痛惡寒脊強俯仰難食飲不下嘔噦多涎唾胸中噎悶大便不節小便黃魂門九椎下兩旁相去脊中各三寸陷中正坐取之外臺云十椎下銅人針五分灸三壯主尸厥走疰胸背連心痛食飲不下腹中雷鳴大便不節小便赤黃陽綱十椎下兩旁相去脊中行各三寸正坐開肩取之外臺云十一椎下銅人針五分灸三壯下經灸七壯主腸鳴腹痛飲食不下小便赤澀腹脹身熱大便不節泄痢赤黃不嗜食怠惰意舍十一椎下兩旁相去脊中各三寸正坐取之外臺云九椎下銅人針五分灸五十壯至百壯明堂五十壯下經灸七壯素注二壯甲乙三壯針五分主腹滿虛脹大便滑泄小便赤黃背痛惡風寒食飲不下嘔吐消渴身熱目黃胃倉十二椎下兩旁相去脊中各三寸正坐取之銅人針五分灸五十壯甲乙三壯主腹滿虛脹水腫食飲不下惡寒背脊痛不得俯仰肓門十三椎下兩旁相去脊中行各三寸陷中叉肋間與鳩尾相直正坐取之銅人灸三十壯針五分又云灸二壯主心下痛大便堅婦人乳疾志室十四椎下兩旁相去脊中行各三寸陷中正坐取之銅人針五分灸三壯明堂灸七壯主陰腫陰痛背痛腰脊強直俯仰不得飲食不消腹強直夢遺失精淋瀝吐逆兩脅急痛霍亂胞肓十九椎下兩旁相去脊中行各三寸陷中伏而取之銅人針五分灸五七壯明堂五十壯甲乙三壯主腰脊急痛食不消腹堅急腸鳴淋瀝不得大小便癃閉下腫秩邊二十椎下兩旁相去脊中行各三寸陷中伏取之銅人針五分明堂灸三壯針三分主五痔發腫小便赤腰痛或曰太陽膀胱行背第二行自大杼至白環俞十七穴云第幾椎下兩旁相去各一寸半第三行自附分至秩邊十四穴云某椎下兩旁相去各三寸當除去脊骨一寸外量取之不然不應太近椎也曰旁者指第二第三行髎穴皆在脊之旁也按滑氏云自大杼至白環諸穴並第二行相去脊中各一寸五分歌云自從大杼至白環相去脊中三寸間夫既曰脊中則自脊骨中間量取而非骨外量取明矣又按背部穴共五行督脈在中太陽經四行在兩旁其穴又皆揣摩脊骨各開取之如瘦人骨露易取肥人脊隱難摸取穴多不得其真須先將瘦人量取定將瘦人同身尺寸自某處起至本處是穴然後將肥人同身尺寸若干亦自某處起量至某處是穴假如取膏肓穴先將瘦人揣摸得四椎下五椎上用墨點記卻將稻稈心一條自結喉下圍轉到墨點處截斷稻稈兩頭用瘦人中指兩文角寸法量得此稻稈二十一寸強又別將稻稈一條量取肥人中指節兩文頭寸法二十一寸強截斷自肥人結喉下圍量至稻稈並頭盡處用墨點記即是膏肓矣余仿此或曰素問論五臟俞灸之則可刺之則不可故王燾亦以針能殺生人不能起死人取灸而不取針蓋亦有所據也而銅人明堂千金諸書於五臟俞穴針灸並載何如曰按素問血氣形志論及遺篇俱論臟俞刺法以是知素問非成於一人之手也如背俞止針三四分漢書所載魏樊阿得針法於華他其刺胸背深入二三寸巨闕藏俞乃五寸而病皆瘳是又不以繩墨拘也合陽膝約紋中央下三寸銅人針六分灸五壯主腰脊強引腹痛陰股熱䯒酸腫步履難寒疝陰偏痛女子崩中帶下承筋一名腨腸一名直腸腨腸中央陷中脛後從腳跟上七寸銅人灸三壯禁針明堂針三分千金禁針資生云三說不同不刺可也主腰背拘急大便祕腋腫痔瘡脛痹不仁腨酸腳急跟痛腰痛鼻鼽衄霍亂轉筋承山一名魚腹一名肉柱一名傷山兌腨腸下分肉間陷中一雲腿肚下分肉間針經云取穴須用兩手高托按壁上兩足指離地用足大指尖豎起上看足兌腨腸下分肉間銅人灸一壯針七分明堂針八分得氣即瀉速出針灸不及針止七七壯下經灸五壯主大便不通轉筋痔腫戰栗不能立腳氣膝腫脛酸腳跟痛筋急痛腳氣膝下腫霍亂急食不通傷寒水結飛揚一名厥陽外踝骨上七寸足太陽絡脈別走少陰銅人針三分灸三壯明堂灸五壯主痔腫痛體重起坐不能步履不收腳腨酸腫戰栗不能久立久坐足指不能屈伸目眩目痛歷節風逆氣癲疾寒瘧實則鼽窒頭背痛瀉之虛則鼽衄補之附陽外踝上三寸太陽前少陽後筋骨之間陽蹺脈郤素注針六分留七呼灸三壯明堂灸五壯主霍亂轉筋腰痛不能久立坐不能起髀樞股䯒痛痿厥風痹不仁頭重䪼痛時有寒熱四肢不舉崑崙足外踝後跟骨上陷中細脈動應手足太陽膀胱脈所行為經火素注針五分留十呼銅人針三分灸三壯妊婦刺之落胎主腰尻腳氣足腨腫不得履地鼽衄膕如結踝如裂頭痛肩背拘急咳喘滿腰脊內引痛傴僂陰腫痛目眩目痛如脫瘧多汗心痛與背相接婦人字難包衣不出小兒發癇瘛瘲東垣曰針經云上氣不足腦為之不滿耳為之苦鳴頭為之傾目為之瞑中氣不足溲便為之變腸為之苦鳴下氣不足則為痿厥心悗補足外踝留之僕參一名安邪足跟骨下陷中拱足得之陽蹺之本銅人針三分灸七壯明堂三壯主足痿失履不收足跟痛不得履地霍亂轉筋吐逆尸厥癲癇狂言見鬼腳氣膝腫申脈即陽蹺外踝下五分陷中容爪甲白肉際陽蹺脈所出銅人針三分素注留七呼灸三壯甲乙七呼刺腰痛篇注留七呼主風眩腰腳痛䯒酸不能久立如在舟中勞極冷氣逆氣腰髖冷痹腳膝屈伸難婦人血氣痛潔古曰癇病晝發灸陽蹺金門一名梁關外踝下申脈下一寸足太陽郤陽維別屬銅人針一分灸三壯主霍亂轉筋尸厥癲癇暴疝膝䯒酸身戰不能久立小兒張口搖頭身反折京骨足外側大骨下赤白肉際陷中按而得之小指本節後大骨名京骨其穴在骨下足太陽脈所過為原膀胱虛實皆拔之銅人針三分留七呼灸七壯明堂五壯素注三壯主頭痛如破腰痛不可屈伸身後痛身側痛目內眥赤爛白翳俠內眥起目反白目眩發瘧寒熱喜驚不欲食筋攣足䯒痛髀樞痛頸項強腰背不可俯仰傴僂鼻鼽不止心痛束骨足小指外側本節後赤白肉際陷中足太陽脈所注為俞木膀胱實瀉之銅人灸三壯針三分留三呼主腰脊痛如折髀不可曲膕如結腨如裂耳聾惡風寒頭囟項痛目眩身熱目黃淚出肌肉動項強不可回顧目內眥赤爛腸澼泄痔瘧癲狂發背癰疽背生疔瘡通谷足小指外側本節前陷中足太陽脈所溜為滎水銅人針二分留五呼灸三壯主頭重目眩善驚引鼽衄項痛目䀮䀮留飲胸滿食不化失缺東垣曰胃氣下溜五臟氣亂在於頭取天柱大杼不知深取通谷束骨至陰足小指外側去爪甲角如韭葉足太陽脈所出為井金膀胱虛補之銅人針二分灸三壯素注針一分留五呼主目生翳鼻塞頭重風寒從足小指起脈痹上下帶胸脅痛無常處轉筋寒瘧汗不出煩心足下熱小便不利失精目痛大眥痛太陽根結篇云太陽根於至陰結於命門命門者目也卷一下腎有兩枚重一斤一兩狀如石而附著於脊之十四椎當胃下兩旁北方黑色入通於腎開竅於二陰藏精於腎故病在溪其味鹹其類水其畜彘其應四時上為辰星是以知病之在骨也其音羽其數六其臭腐其液唾其色黑北方生寒寒生水水生咸咸生腎腎生骨髓骨髓生肝腎生耳其在天為寒在地為水在體為骨在臟為腎在色為黑在音為羽在聲為呻在變動為栗在竅為耳在味為咸在志為恐恐傷腎思勝恐寒傷血濕勝寒咸傷血甘勝咸腎者作強之官伎巧出焉腎者主蟄封藏之本精之處也其華在發其充在骨為陰中之少陰通於冬氣腎之合骨也其榮發也其主脾也內經臟各有一腎獨有兩者何也然兩者非皆腎也其左者為腎右者為命門命門者謂精神之所舍原氣之所繫也男子以藏精女子以系胞故知腎有二也程可久曰北方常配二物故易惟坎加習於物為龜為蛇於方為朔為北於太玄為玄為冥滑氏曰腎雖有左右命門之分其氣相通實皆腎也合而觀之謂之五臟五腑可也六臟六腑亦可也七節之旁中有小心心為火腎為相火故曰小心七節自尾骶數上又心胞絡為腎之配腎氣通於耳耳和則知五音矣腎氣虛則夢見舟船溺人得其時則夢伏水中若有所畏恐腎色黑欲如重漆色不欲如炭色腎氣絶即骨枯少陰者冬脈也伏行而溫於骨髓骨髓不溫則肉不著骨骨肉不相親即肉濡而卻故齒長而枯發無潤澤骨先死戊日篤己日死原病式曰仙經云先生左腎則為男先生右腎則為女丹溪曰錢仲陽云腎有補無瀉又曰主閉臟者腎也施疏泄者肝也二臟皆有火而其繫上屬於心心者君火也為物所感則易動心動則相火翕然而隨雖不交會亦暗流而疏泄矣又曰火有二曰君火曰相火以名而言形質相生配於五臟故謂之君以位而言守位稟命故謂之相人有此生而恆於動者以相火助之也見於天者出於龍雷則木之氣出於海則水之氣具於人者寄於肝腎肝屬木而腎屬水人非此火不能以有生天之火出於木而本於地故雷非蟄海非附於地則不能鳴不能飛不能波也鳴也飛也波也動而主火者也肝腎之陰悉具相火人而同乎天也王節齊曰古方滋補藥皆兼補右尺命門相火如八味丸之類不知左腎原虛右腎原王若兩腎平補依舊火勝於水只補其左制其右錢氏六味地黃丸丹溪虎潛補陰之類庶得水火相平也足少陰腎經足少陰之脈起於小指之下斜趨足心趨向也足少陰起小指之下斜趨足心之湧泉出然谷之下循內踝之後別入跟中上腨內出膕內廉跟足根也由湧泉轉出足內踝然谷穴下循內踝太溪穴別入跟中之大鐘照海水泉乃折自大鐘之外上循內踝行厥陰太陰之後經復溜交信過三陰交上腨內循築賓出膕內廉抵陰谷也上股內後廉貫脊屬腎絡膀胱由陰谷上股內後廉貫脊會於脊之長強穴還出於前循橫骨大赫氣穴四滿中注肓俞當肓俞之所臍之左右屬腎下臍過關元中極而絡膀胱也其直行者從腎上貫肝膈入肺中循喉嚨挾舌本直行者從肓俞屬腎處上行循商曲石關陰都通谷諸穴貫肝上循幽門上膈歷步廊入肺中循神封靈墟神藏彧中俞府而上循喉嚨並人迎挾舌本而終也其支者從肺出絡心注胸中兩乳間為胸支者自神藏別出繞心注胸之膻中以交於手厥陰也此經多血少氣酉時氣血注此受足太陽之交凡二十七穴左右共五十四穴刺深二分留二呼湧泉一名地衝足心陷中屈足卷指宛宛中跪取之足少陰脈所出為井木實則瀉之銅人針五分無令出血灸三壯明堂灸不及針素注刺三分留三呼主尸厥面黑如炭色咳吐有血喝而喘坐欲起目䀮䀮無所見善恐惕惕如人將捕之舌乾咽腫上氣嗌乾煩心心痛黃疸腸澼股內後廉痛痿厥嗜臥善悲缺小腹急痛泄而下重足脛寒而逆腰痛大便難心中結熱風疹風癇心病飢不嗜食咳嗽身熱喉閉舌急失音卒心痛喉痹胸脅滿悶頭痛目眩五指端盡痛足不踐地足下熱男子如蠱女子如娠婦人無子轉胞不得尿千金翼云主喜喘脊脅相引忽忽喜忘陰痹腹脹腰痛不欲食喘逆足下清至膝咽中痛不可納食喑不能言小便不利小腹痛風入腸中癲病夾臍痛急衄不止五疝熱病先腰痠喜渴數引飲身項痛而寒且酸足熱不欲言頭痛癲癲然少氣寒厥霍亂轉筋腎積賁豚漢濟北王阿母病患熱厥足熱淳于意刺足心立愈然谷一名龍淵足內踝前起大骨下陷中一云內踝前直下一寸足少陰脈所溜為滎火銅人灸三壯針三分留三呼不宜見血令人立飢欲食刺足下布絡中脈血不出為腫主咽內腫不能內唾時不能出唾心恐懼如人將捕涎出喘呼少氣足跗腫不得履地寒疝小腹脹上搶胸脅咳唾血喉痹淋瀝白濁䯒酸不能久立足一寒一熱舌縱煩滿消渴自汗盜汗出痿厥洞泄心痛如錐刺墜墮惡血留內腹中男子精泄婦人無子陰挺出月事不調陰癢初生小兒臍風口噤太溪一名呂細足內踝後跟骨上動脈陷中男子婦人病有此脈則生無則死足少陰腎脈所注為俞土素注針三分留七呼灸三壯主久瘧咳逆心痛如錐刺心脈沉手足寒至節喘息嘔吐痰實口中如膠善噫寒疝熱病汗不出默默嗜臥溺黃消疸大便難咽腫唾血痃癖寒熱咳嗽不嗜食腹脅痛瘦瘠傷寒手足厥冷東垣曰成痿者以導濕熱引胃氣出行陽道不令濕土克腎水其穴在太溪大鐘足跟後踵中大骨上兩筋間足少陰絡別走太陽銅人灸三壯針二分留七呼素注留三呼主嘔吐胸脹喘息腹滿便難腰脊痛少氣淋瀝灑淅腹脊強嗜臥口中熱多寒欲閉戶而處少氣不足舌乾咽中食饐不得下善驚恐不樂喉中鳴咳唾氣逆煩悶實則閉癃瀉之虛則腰痛補之照海足內踝下陰蹺脈所生素注針四分留六呼灸三壯銅人針三分灸七壯明堂灸三壯主咽乾心悲不樂四肢懈惰久瘧卒疝嘔吐嗜臥大風默默不知所痛視如見星小腹痛婦女經逆四肢淫濼陰暴跳起或癢漉清汁小腹偏痛淋陰莖挺出月水不調潔古曰癇病夜發灸陰蹺照海穴也水泉太溪下一寸內踝下少陰郤銅人灸五壯針四分主目䀮䀮不能遠視女子月事不來來即心下多悶痛陰挺出小便淋瀝腹中痛復溜一名昌陽一名伏白足內踝上二寸筋骨陷中前旁骨是復溜後旁筋是交信二穴止隔一條筋足少陰脈所行為經金腎虛補之素注針三分留七呼灸五壯明堂七壯主腸澼腰脊內引痛不得俯仰起坐目視䀮䀮善怒多言舌乾胃熱蟲動涎出足痿不收履䯒寒不自溫腹中雷鳴腹脹如鼓四肢腫五種水病青赤黃白黑青取井赤取滎黃取俞白取經黑取合血痔泄後重五淋血淋小便如散火骨寒熱盜汗汗注不止齲齒脈微細不見或時無脈交信足內踝骨上二寸少陰前太陰後廉筋骨間陰蹺之郤銅人針四分留十呼灸三壯素注留五呼主氣淋㿉疝陰急陰汗瀉痢赤白氣熱癃股樞膊內痛大小便難淋女子漏血不止陰挺出月水不來小腹偏痛四肢淫濼盜汗出築賓內踝上五寸腨分中陰維之郤銅人針四分留五呼灸三壯素注刺三分灸五壯主㿗疝胎疝癲疾狂易妄言怒罵吐舌嘔吐涎沫足腨痛陰谷膝下內輔骨後大筋下小筋上按之應手屈膝乃得之足少陰脈所入為合水銅人針四分灸三壯主膝痛如錐不得屈伸舌縱涎下煩逆溺難小便急引陰痛陰痿股內廉痛婦人漏下不止腹脹滿不得息小便黃男子如蠱女子如娠橫骨大赫下一寸肓俞下五寸陰上橫骨中宛曲如仰月中央去腹中行各一寸半素注去中行一寸足少陰衝脈之會銅人灸三壯素注針一寸灸五壯主淋小便不通陰器下縱引痛小腹滿目赤痛從內眥始五臟虛竭失精大赫一名陰維一名陰關氣穴下一寸去腹中行各一寸半素注一寸足少陰衝脈之會銅人灸五壯針三分素注針一寸灸三壯主虛勞失精陰痿精溢陰上縮莖中痛目赤痛從內眥始婦人赤沃氣穴一名胞門一名子戶四滿下一寸去腹中行兩旁各一寸半足少陰衝脈之會銅人灸五壯針三分素注針一寸灸五壯主賁豚氣上下引脊痛泄利不止目赤痛從內眥始婦人月事不調四滿一名髓中中注下一寸氣穴上一寸去腹中行各一寸半足少陰脈衝脈之會銅人針三分灸三壯主積聚疝瘕腸澼大腸有水臍下切痛振寒目內眥赤痛婦人月水不調惡血㽲痛奔豚上下無子中注肓俞下一寸去腹中行各一寸半足少陰衝脈之會銅人針一分灸五壯主小腹有熱大便堅燥不利泄氣上下引腰脊痛目內眥赤痛女子月事不調肓俞商曲下一寸去臍中五分素注一寸足少陰衝脈之會銅人針一寸灸五壯主腹切痛寒疝大便燥腹滿響響然不便心下有寒目赤痛從內眥始按諸傢俱以疝主於腎故足少陰經髎穴多兼治疝丹溪以疝本肝經與腎絶無相干足以正千古之訛商曲石關下一寸去腹中行各五分素注一寸足少陰衝脈之會銅人針一寸灸五壯主腹痛腹中積聚時切痛腸中痛不嗜食目赤痛從內眥始石關陰都下一寸去腹中行各五分素注一寸足少陰衝脈之會銅人針一寸灸三壯主噦噫嘔逆腹痛氣淋小便黃大便不通心下堅滿脊強不利多唾目赤痛從內眥始婦人子臟有惡血血上衝腹痛不可忍陰都一名食宮通谷下一寸夾胃脘兩邊相去五分素注一寸足少陰衝脈之會銅人針三分灸三壯主心滿逆氣腸鳴肺脹氣搶脅下熱痛目赤痛從內眥始通谷幽門下一寸夾上脘兩旁相去五分素注一寸十四經發揮云自商曲至通谷去腹中行各五分素注自肓俞至幽門去中行各一寸足少陰衝脈之會銅人針五