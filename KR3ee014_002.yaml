失其旨意遽云無狀有名俾後學承謬不已且名以召實無實奚名果無其形尚何藏精系胞為哉其所謂三焦者何也上焦在膻中內應心中焦在中脘內應脾下焦在臍下即腎間動氣分布人身有上中下之異方人湛寂欲想不興則精氣散在三焦榮華百脈及其想念一起欲火熾然翕撮三焦精氣流溢並於命門輸瀉而去故號此府為三焦耳世承叔和之弊而不悟可為長太息也初甚異其說及為齊從事以下醫說載之龍川志有一舉子徐遁者石守道之壻也少嘗醫療病有精思曰齊嘗大飢群丐相臠而食有一人皮肉盡而骨脈全者視其五臟見右腎之下有脂膜如手大者正與膀胱相對有二白脈自其中出夾脊而上貫腦意此則導引家所謂夾脊雙關者而不悟脂膜如手大者之為三焦也所見默合可以證古人之謬丹溪朱氏曰三焦以焦而下焦司肝腎之分皆陰而主乎下者也天非此火不能以生物人非此火不能以有生手少陽三焦經手少陽之脈起於小指次指之端上出次指之間循手表腕出臂外兩骨之間上貫肘臂骨盡處為腕臑盡處為肘手少陽起小指次指之端關衝穴上出次指之間歷液門中渚循手表腕之陽池出臂外兩骨之間循外關支溝會宗三陽絡四瀆乃上貫肘抵天井穴也循臑外上肩交出足少陽之後入缺盆交膻中散絡心包下膈循屬三焦肩肘之間膊下對腋處為臑從天井上行循臂臑之外歷清冷淵消濼行太陽之裡陽明之外上肩循臂臑會肩髎天髎交出足少陽之後過秉風肩井下入缺盆復由足陽明之外而交會於膻中散布絡繞於心包乃下膈當胃上口以屬上焦於中脘以屬中焦於陰交以屬下焦也其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰至䪼腦戶後為項目下為䪼其支者從膻中而上出缺盆之外上項過大椎循天牖上耳後經翳風瘈脈顱𩔨直上出耳上角至角孫過懸釐頷厭及過陽白睛明屈曲下耳頰至䪼會顴髎之分也其支者從耳後入耳中卻出至目鋭眥此支從耳後翳風穴入耳中過聽宮歷耳門和髎卻出至目鋭眥會童子髎循絲竹空而交於足少陽也此經多血少氣亥時氣血注此受手厥陰之交凡二十三穴左右共四十六穴關衝手小指次指之端去爪甲角如韭葉手少陽三焦脈所出為井金銅人針一分留三呼灸一壯素注三壯主喉痹喉閉舌卷口乾頭痛霍亂胸中氣噎不嗜食臂肘痛不可舉目生翳膜視物不明液門手小指次指間陷中握拳取之手少陽三焦脈所溜為滎水素問銅人針二分留二呼灸三壯主驚悸妄言咽外腫寒厥手臂痛不能自上下痎瘧寒熱目赤澀頭痛暴得耳聾齒齦痛中渚手小指次指本節後間陷中在腋門下一寸手少陽三焦脈所注為俞木三焦虛補之素注針二分留三呼銅人灸三壯針三分明堂灸二壯主熱病汗不出目眩頭痛耳聾目生翳膜久瘧咽腫肘臂痛手五指不得屈伸陽池一名別陽手表腕上陷中從指本節直摸下至腕中心手少陽三焦脈所過為原三焦虛實皆拔之素注針二分留六呼灸三壯銅人禁灸指微云針透抵大陵穴不可破皮不可搖手恐傷針轉曲主消渴口乾煩悶寒熱瘧或因折傷手腕捉物不得肩臂痛不得舉外關腕後二寸兩筋間陽池上一寸手少陽絡別走心主銅人針三分留七呼灸二壯明堂三壯主耳聾渾渾焞焞無聞五指盡痛不能握物實則肘攣瀉之虛則不收補之支溝一名飛虎腕後臂外三寸兩骨間陷中手少陽脈所行為經火銅人針三分灸二七壯明堂五壯素注針二分留七呼灸三壯主熱病汗不出肩臂酸重脅腋痛四肢不舉霍亂嘔吐口噤不開暴喑不能言心悶不已卒心痛鬼擊傷寒結胸瘑瘡疥癬婦人妊脈不通産後血暈不省人事會宗腕後三寸空中一寸銅人灸七壯明堂五壯禁針主五癇肌膚痛耳聾三陽絡一名通門臂上大交脈支溝上一寸銅人灸七壯明堂五壯禁針主暴喑啞耳聾嗜臥四肢不欲動搖四瀆在肘前五寸外廉陷中銅人針六分留七呼灸三壯主暴氣耳聾下齒齲痛天井肘外大骨後肘上一寸輔骨上兩筋叉骨罅中屈肘拱胸取之甄權云曲肘後一寸叉手按膝頭取之兩筋骨罅中手少陽三焦脈所入為合土三焦實瀉之素注針一寸留七呼銅人灸三壯明堂五壯針三分主心胸痛咳嗽上氣短氣不得語唾膿不嗜食寒熱悽悽不得臥驚悸瘛瘲癲疾羊癇風痹耳聾嗌腫喉痹汗出目鋭眥痛頰腫痛耳後臑臂肘痛捉物不得嗜臥撲傷腰髖疼振寒頸項痛大風默默不知所痛悲傷不樂腳氣上攻清冷淵肘上二寸伸肘舉臂取之銅人針三分灸三壯主肩痹痛臂臑不能舉不能帶衣消濼肩下臂外間腋斜肘分下銅人針一分灸三壯明堂針六分素注針五分主風痹頸項強急腫痛寒熱頭痛癲疾臑會一名臑交肩前廉去肩頭三寸宛宛中手少陽陽維之會素注針五分灸五壯銅人針七分留三呼得氣即瀉灸七壯臂痛酸無力痛不能舉寒熱肩腫引胛中痛項癭氣瘤肩髎肩端臑上陷中斜舉臂取之銅人針七分灸三壯明堂五壯主臂痛肩重不能舉天髎肩缺盆中上毖骨際陷中央須缺盆陷處上有空起肉上是穴手足少陽陽維之會銅人針八分灸三壯當缺盆陷上突起肉上針之若誤針陷處傷人五臟氣令人卒死主胸中煩悶肩臂痠疼缺盆中痛汗不出胸中煩滿頸項急寒熱天牖頸大筋外缺盆上天容後天柱前完骨下髮際上銅人針一寸留七呼不宜補不宜灸灸即令人面腫眼合先取譩嘻後取天容天池即瘥若不針譩嘻即難療明堂針五分得氣即瀉瀉盡更留三呼瀉三吸不宜補素注下經灸三壯資生云宜灸一壯三壯主暴聾氣目不明耳不聰夜夢顛倒面青黃無顏色頭風面腫項強不得回顧目中痛翳風耳後尖角陷中按之引耳中痛針經先以銅錢二十文令患人咬之尋取穴中手足少陽之會素注針三分銅人針七分灸七壯明堂三壯刺灸俱令人咬錢令口開主耳鳴耳聾口眼喎斜脫頷頰腫口噤不開不能言口吃牙車急小兒喜缺瘈脈一名資脈耳本後雞足青絡脈銅人刺出血如豆汁不宜多出針一分灸三壯主頭風耳鳴小兒驚癇瘛瘲嘔吐泄利無時驚恐眵瞢目睛不明顱息耳後間青絡脈中銅人灸七壯禁針明堂灸三壯針一分不得多出血多出血殺人主耳鳴痛喘息小兒嘔吐涎沫瘛瘲發癇胸脅相引身熱頭痛不得臥角孫耳廓中間上髮際下開口有空手太陽手足少陽之會銅人灸三壯明堂針八分主目生翳膚齒齦腫唇吻強齒牙不能嚼物齲齒頭項強耳門耳前起肉當耳缺者陷中銅人針三分留三呼灸三壯下經禁灸有病灸不過三壯主耳鳴如蟬聲聤耳膿汁出耳生瘡齒齲唇吻強和髎耳前鋭發下橫動脈手足少陽手太陽三脈之會銅人針七分灸三壯主頭重痛牙車引急頸頷腫耳中嘈嘈鼻涕面風寒鼻準上腫癰痛招搖視瞻瘛瘲口噼絲竹空一名目髎眉後陷中手足少陽脈氣所發素注針三分留六呼銅人禁灸灸之不幸使人目小及盲針三分留三呼宜瀉不宜補主目眩頭痛目赤視物䀮䀮不明惡風寒風癇目戴上不識人眼睫倒毛發狂吐涎沫發即無時偏正頭疼膽重三兩三銖長三寸在肝之短葉間盛精汁三合膽者中正之官喜樂出焉膽為清淨之府諸腑皆傳穢濁獨膽無所傳道故曰清淨膽汁減則目昏又吐傷膽倒則視物倒植膽為青腸足少陽膽經足少陽之脈起於目鋭眥上抵角下耳後足少陽經起目鋭眥之瞳子髎於是循聽會客主人上抵頭角循頷厭下懸顱懸釐由懸釐外循耳上髮際至曲鬢率谷由率谷外折下耳後循天衝浮白竅陰完骨又自完骨外折循本神過曲差下至陽白會睛明復從睛明上行循臨泣目窗正營承靈腦空風池穴此經頭部自瞳子髎至風池凡二十穴作三折向外而行始瞳子髎至完骨是一折又自完骨外折上至陽白會睛明是一折又自睛明上行循臨泣風池是一折緣其穴曲折外多難為科牽故此作一至二十次第該之一瞳子髎二聽會三客主人四頷厭五懸顱六懸釐七曲鬢八率谷九天衝十浮白十一竅陰十二完骨十三本神十四陽白十五臨泣十六目窗十七正營十八承靈十九腦空二十風池循頸行手少陽之前至肩上卻交出手少陽之後入缺盆自風池循頸過天牖穴行手少陽脈之前下至肩上循肩井卻左右交出手少陽之後過大椎大杼秉風當秉風前入缺盆之外其支者從耳後入耳中走耳前至目鋭眥後此一節即手三焦交經同其支者從耳後顳顬間過翳風之分入耳中過聽宮出走耳前復自聽宮至目鋭眥瞳子髎之分也髎廣韻作力嘲切深空之貌即穴隙之謂也江西席弘家針灸書中諸髎字作髎豈窖髎聲相近而然今悉改定雖然所改有不盡者亦不必苦求之也此本注其支者別目鋭眥下大迎合於手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽其支者別自目外瞳子髎而下大迎合手少陽於䪼當顴髎之分下臨頰車下頸循本經之前與前之入缺盆者相合下胸中天池之外貫膈即期門之所絡肝下至日月之分屬於膽也循脅裡出氣沖繞毛際橫入髀厭中脅胠也腋下為脅曲骨之分為毛際毛際兩旁動脈中為氣衝楗骨之下為髀厭即髀樞也自屬膽處循脅內章門之裡出氣沖繞毛際遂橫入髀厭中之環跳也其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉脅骨之下為季脅此直者從缺盆直下腋循胸歷淵液輒筋日月穴過季脅循京門帶脈五樞維道居髎入上髎中髎長強而下與前之入髀厭者相合乃下循髀外行太陽陽明之間歷中瀆陽關出膝外廉抵陽陵泉也下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之間䯒外為輔骨外踝以上為絶骨足面為跗自陽陵泉下外輔骨前歷陽交外丘光明直下抵絶骨之端循陽輔懸鐘而下出外踝之前至丘墟循足面之臨泣五會俠溪乃上入小指次指之間至竅陰而終也其支者別跗上入大指之間循大指岐骨內出其端還貫入爪甲出三毛足大指本節後為岐骨大指爪甲後為三毛其支者自足跗上臨泣穴別行入大指循岐骨內出大指端還貫入爪甲出三毛交於足厥陰也是經多氣少血子時氣血注此受手少陽之交四十三穴左右共八十六穴刺深四分留五呼瞳子髎一名太陽一名前關目外去眥五分手太陽手足少陽三脈之會素注灸三壯針三分主目癢翳膜白青盲無見遠視䀮䀮赤痛淚出多眵䁾內眥癢頭痛喉閉聽會耳微前陷中上關下一寸動脈宛宛中張口得之銅人針七分留三呼得氣即瀉不須補日灸五壯止三七壯十日後依前報灸明堂針三分灸三壯主耳鳴耳聾牙車脫臼相離一二寸牙車急不得嚼物齒痛惡寒狂走瘛瘲恍惚不樂中風口喎斜手足不隨客主人一名上關耳前起骨上廉開口有空張口取之乃得手足少陽陽明之會銅人灸七壯禁針明堂針一分留之得氣即瀉日灸七壯至二百下經灸十壯素注刺三分留七呼灸三壯素問禁深刺深則交脈破為內漏耳聾又缺而不得㰦主唇吻強口眼偏邪青盲眯目䀮䀮惡風寒牙齒齲口噤嚼物鳴痛耳鳴耳聾瘛瘲沫出寒熱痙引骨痛頷厭曲周下顳顬上廉手足少陽陽明之交會銅人灸三壯針七分留七呼深刺令人耳聾主偏頭痛頭風目眩驚癇手拳手腕痛耳鳴目無見目外眥急好嚏頸痛歷節風汗出懸顱曲周上顳顬上廉手足少陽陽明三脈之會銅人灸三壯針三分留三呼明堂針二分素注針七分留七呼刺深令人耳無所聞主頭痛牙齒痛面膚赤腫熱病煩滿汗不出頭偏痛引目外眥赤身熱鼻洞濁下不止傳為鼽目昏瞢瞑目懸釐曲周上顳顬下廉手足少陽陽明四脈之會銅人針三分灸三壯素注針三分留七呼主麵皮赤腫頭偏痛煩心不欲食中焦客熱熱病汗不出目鋭眥赤痛曲鬢一名曲發在耳上髮際曲隅陷中鼓頷有空足太陽少陽之會銅人針三分灸七壯明下灸三壯主頷頰腫引牙車不得開急痛口噤不能言頸項不得顧腦兩角痛為巔風引目眇率谷耳上入髮際寸半陷者宛宛中嚼而取之足太陽少陽之會銅人灸三壯針三分主痰氣鬲痛腦兩角強痛頭重醉後酒風皮膚腫胃寒煩悶嘔吐天衝耳後髮際二寸耳上如前三分足少陽太陽二脈之會銅人灸七壯素注三壯針三分主癲疾風痓牙齦腫善驚恐頭痛浮白耳後入髮際一寸足太陽少陽之會銅人針三分灸七壯明堂灸三壯針三分主足不能行耳聾耳鳴齒痛胸滿不得息胸痛頸項癭癰腫不能言肩臂不舉發寒熱喉痹咳逆痰沫耳鳴嘈嘈無所聞竅陰一名枕骨完骨上枕骨下動搖有空足太陽手足少陽之會陳氏云髓會絶骨髓屬腎主骨於足少陽無所關腦為髓海腦有枕骨穴則當會枕骨絶骨誤也髓病治此按竅陰正足少陽經不知陳氏何以云此豈素問云枕骨二穴者指督脈後頂腦戶而王注誤之歟銅人灸七壯甲乙灸五壯針四分素注針三分灸三壯主四肢轉筋目痛頭項頷痛引耳嘈嘈耳鳴無所聞舌本出血骨勞癰疽發厲手足煩熱汗不出舌強脅痛咳逆喉痹口中惡苦完骨耳後入髮際四分足太陽少陽之會銅人針三分灸七壯素注留七呼灸三壯明堂針二分灸依年為壯主足痿失履不收牙車急頰腫頭面腫頸項痛頭風耳後痛煩心小便赤黃喉痹齒齲口眼喎斜癲疾本神曲差旁一寸五分直耳上入髮際四分陽維脈所止銅人針三分灸七壯主驚癇吐涎沫頸項強急痛目眩胸相引不得轉側癲疾嘔吐涎沫偏風陽白眉上一寸直瞳子手足陽明少陽陽維五脈之會素注針三分銅人針二分灸三壯主瞳子癢痛目上視遠視䀮䀮昏夜無見目痛目眵背腠寒栗重衣不得溫臨泣目上直入髮際五分陷中令患人正睛取穴足太陽少陽陽維之會主目眩目生白翳目淚枕骨合顱痛惡寒鼻塞驚癇反視大風目外眥痛卒中風不識人目窗臨泣後一寸足少陽陽維之會銅人針三分灸五壯三度刺令人目大明主目赤痛忽頭旋目䀮䀮遠視不明頭面浮腫頭痛寒熱汗不出惡寒正營目窗後一寸足少陽陽維之會銅人灸五壯針三分主目眩瞑頭項偏痛牙齒痛唇吻急強齒齲痛承靈正營後一寸五分足少陽陽維之會主腦風頭痛惡風寒鼽衄鼻窒喘息不利腦空一名顳顬承靈後一寸五分俠玉枕骨下陷中足少陽陽維之會素注針四分銅人針五分得氣即瀉灸三壯主勞疾羸瘦體熱頸項強不得回顧頭重痛不可忍目瞑心悸發即為癲風引目眇鼻痛曹操患頭風發即心亂目眩華他針腦空立愈按三國志曹操患頭風久不愈後陳琳草檄操見之喜頓愈蓋喜則氣舒故頭風解也今醫家所載不同豈他愈後復發而然歟風池耳後顳顬後腦空下髮際陷中按之引於耳中手足少陽陽維之會素注針四分甲乙針三分銅人針七分留三呼灸三壯甲乙針一寸二分患大風者先補後瀉少可患者以經取之留五呼瀉七吸灸不及針日七壯至百壯主灑淅寒熱傷寒溫病汗不出目眩苦偏正頭痛痎瘧頸項如拔痛不得回顧目淚出缺氣多鼻鼽衄目內眥赤痛氣發耳塞目不明腰背俱疼腰傴僂引頸筋無力不收大風中風氣塞涎上不語昏危癭氣東垣曰少陽頭痛風寒傷上邪從外入令人振寒頭痛身痛惡寒治在風池風府平安公患偏風甄權針風池肩髃曲池支溝五樞陽陵泉巨虛下廉即瘥仲景曰太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈肩井一名膊井肩上陷中缺盆上大骨前一寸半以三指按取當中指下陷中手足少陽足陽明陽維之會連入五臟甲乙灸五壯素注針五分若刺深令人悶倒如悶倒速於三里下氣補之須臾蘇凡針肩井須補三里否則防後卒中之患明堂針四分先補後瀉不宜灸婦人墮胎微損手足弱者針肩井立瘥日灸七壯止二百壯素注三壯主中風氣塞涎上不語腎虛腰痛九漏上氣短氣逆氣風勞百病撲傷腰髖疼頭項痛五勞七傷頸項不得回顧臂痛兩手不得向頭婦人産難墮胎後手足厥逆淵液一名泉液腋下三寸宛宛中舉臂得之銅人禁灸灸之令人生腫蝕馬瘍內潰者死明堂針三分主寒熱馬瘍輒筋一名神光一名膽募期門下五分陷中第三肋端橫直蔽骨傍二寸五分上直兩乳側臥屈上足取之膽之募足太陽少陽之會銅人灸五壯針五分素注七分主太息善悲小腹熱欲走多唾言語不正四肢不收嘔吐宿汁吞酸京門一名氣俞一名氣府監骨下腰中季肋本俠脊腎之募銅人灸三壯針三分留七呼主腸鳴小腹痛肩背寒痙肩胛內廉痛腰痛不得俯仰久立帶脈季脅下一寸八分陷中足少陽帶脈二脈之會銅人針六分灸五壯明堂灸七壯主腰腹縱溶溶如囊水之狀婦人小腹痛裡急後重瘛瘲月事不調赤白帶下五樞帶脈下三寸水道旁一寸半陷中足少陽帶脈二經之會銅人針一寸灸五壯明下三壯主痃癖小腸膀胱腎余小腹痛陰疝兩睪丸上入腹婦人赤白帶下裡急瘛瘲維道章門下五寸三分足少陽帶脈二經之會銅人針八分留六呼灸三壯主嘔吐不止水腫三焦不調不嗜食居髎章門下八寸三分監骨上陷中素注章門下四寸三分足少陽陽維之會銅人針八分留六呼灸三壯主腰引小腹痛肩引胸臂攣急手臂不得舉以至肩環跳髀樞中側臥伸下足屈上足以右手摸穴左搖撼取之足少陽太陽之會銅人灸五十壯素注針一寸留二呼灸三壯指微云已刺不可搖恐傷針主冷風濕痹不仁風疹遍身半身不遂腰胯痛蹇膝不得轉側伸縮仁壽宮患腳氣偏風甄權奉敕針環跳陽陵泉陽輔巨虛下廉而能起行環跳穴痛恐生附骨疽中瀆髀外膝上五寸分肉間陷中足少陽絡別走厥陰銅人灸五壯針五分留七呼主寒氣客於分肉間攻痛上下筋痹不仁陽關一名陽陵陽陵泉上三寸犢鼻外陷中銅人針五分禁灸主風痹不仁膝痛不可屈伸陽陵泉膝下一寸䯒外廉陷中蹲坐取之膽脈所入為合土難經曰筋會陽陵泉疏曰筋病治此銅人針六分留十呼得氣即瀉又宜久留針灸七壯至七七壯素注三壯明下一壯主膝伸不得屈髀樞膝骨冷痹腳氣膝股內外廉不仁偏風半身不遂腳冷無血色苦嗌中介然頭面腫足筋攣陽交一名別陽一名足髎足外踝上七寸斜屬三陽分肉之間陽維之郤銅人針六分留七呼灸三壯主胸滿腫膝痛足不收寒厥驚狂喉痹面腫外丘外踝上七寸銅人針三分灸三壯主胸脹滿膚痛痿痹頸項痛惡風寒猘犬傷毒不出發寒熱癲疾小兒龜胸光明外踝上五寸足少陽之絡別走厥陰銅人針六分留七呼灸五壯明下七壯主淫濼脛酸䯒疼不能久立熱病汗不出卒狂虛則痿痹坐不能起補之實則足䯒熱膝痛身體不仁善齧頰瀉之陽輔一名分肉足外踝上四寸輔骨前絶骨端三分去丘墟七寸足少陽膽脈所行為經火膽實瀉之難經曰髓會絶骨疏云髓病治此難經本義曰絶骨一名陽輔袁氏曰足能健步以髓會絶骨也諸髓皆屬於腎故為髓會素注針三分又曰針七分留十呼銅人灸三壯針五分留七呼主腰溶溶如坐水中膝下膚腫筋攣百節痠疼實無所知諸節盡痛痛無常處腋下腫痿喉痹馬刀挾癭膝䯒酸風痹不仁厥逆口苦太息心脅痛面塵頭角頷痛目鋭眥痛缺盆中腫痛汗出振寒瘧胸中脅肋髀膝外至絶骨外踝前節痛善潔面青懸鐘一名絶骨足外踝上三寸動脈中針灸經尋摸尖骨者乃是絶骨兩分開足三陽之大絡按之陽明脈絶乃取之前尋摸絶骨間尖如前離三分高一寸許是陽輔穴從尋摸絶骨間尖筋骨縫中是懸鐘穴銅人針六分留七呼灸三壯指微云斜入針二寸許灸七壯或三壯主心腹脹滿胃中熱不嗜食腳氣膝䯒痛筋骨攣痛足不收逆氣虛勞寒損憂恚心中咳逆泄注喉痹頸項強腸痔瘀血陰急鼻衄腦疽大小便澀鼻中干煩滿狂易中風手足不遂丘墟足外踝下如前陷中骨縫中去臨泣三寸又俠溪穴中量上外踝骨前五寸足少陽脈所過為原膽虛實皆拔之銅人灸三壯素注針五分留七呼主胸脅滿痛不得息久瘧振寒腋下腫痿厥坐不能起髀樞中痛目生翳膜腿䯒酸轉筋卒疝小腹堅寒熱頸腫腰胯疼善太息臨泣足小指次指本節後間陷中去俠溪一寸五分足少陽膽脈所注為俞木甲乙針二分留五呼灸三壯主胸中滿缺盆中及腋下馬刀瘍瘻善齧頰天牖中腫淫濼䯒酸目眩枕骨合顱痛灑淅振寒心痛周痹痛無常處厥逆氣喘不能行痎瘧日發婦人月事不利季脅支滿乳癰地五會足小指次指本節後陷中去俠溪一寸銅人針一分禁灸灸之令人羸瘦不出三年卒主腋痛內損唾血足外無膏澤乳癰俠溪足小指次指岐骨間本節前陷中足少陽膽脈所溜為滎水膽實則瀉之素注針三分留三呼灸三壯主胸脅支滿寒熱傷寒熱病汗不出目外眥赤目眩頰頷腫耳聾胸中痛不可轉側痛無常處東垣曰先師潔古病苦頭痛發時兩頰青黃眩暈目不欲開懶言身體沉重兀兀欲吐此厥陰太陰合病名曰風痰灸俠溪服局方玉壺丸愈竅陰足小指次指之端去爪甲角如韭葉足少陽膽脈所出為井金素注針一分留一呼甲乙留三呼灸三壯銅人灸三壯針二分主脅痛咳逆不得息手足煩熱汗不出轉筋癰疽頭痛心煩喉痹舌強口乾肘不可舉卒聾不聞人語魘夢目痛小眥痛少陽根於竅陰結於窗籠窗籠者耳中也又曰少陽為樞樞折即骨繇而不安於地故骨繇者取之少陽視有餘不足骨繇者節緩而不取也所謂繇者搖故也當窮其本也今按病筋痿而顫掉者當取竅陰窗籠但窗籠未有所考恐是太陽小腸聽宮是蓋手足太陽少陽三脈之會否則聽會未可知俟當別考肝重四斤四兩左三葉右四葉共七葉附著於脊之第九椎其治在左其藏在右在腎之前並胃東方青色入通於肝開竅於目藏精於肝其病發驚駭其味酸其類草木其畜雞其穀麥其應四時上為歲星是以知春氣在頭也其音角其數八是以知病之在筋也其臭臊其聲呼其液泣其色青東方生風風生木木生酸酸生肝肝主筋筋生心肝主目其在天為玄在人為道在地為化化生五味道生知玄生神在天為風在地為木在體為筋在臟為肝在色為蒼在音為角在聲為呼在變動為握在竅為目在味為酸在志為怒怒傷肝悲勝怒風傷筋燥勝風酸傷筋辛勝酸肝者將軍之官決斷行焉肝者罷極之本魂之居也其華在爪其充在筋以生血氣此為陽中之少陽通於春氣肝之合筋也其榮在爪其主肺也肝氣通於目目和則知黑白矣知當作見肝氣虛則夢見菌香生草得其時則夢伏樹下不敢起春三月人臥則血歸於肝目受血而能視足受血而能步掌受血而能握指受血而能攝肝色青欲知蒼璧之澤不欲如藍以上俱素問肝青象木木得水而浮肝得水而沉何也然肝者非為純木也乙角也大言陰與陽小言夫與婦釋其微陽而吸其微陰之氣其意樂金又行陰道多故令肝得水而沉妻從夫也肝熟而反浮者乙當歸甲極而反也難經肝有兩葉何也然肝者東方木也春也萬物始生其尚幼小意無所親去太陰尚近冬離太陽不遠夏猶有兩葉亦應木也難經肝氣絶則筋縮引卵與舌卷肝者筋之合也筋者聚於陰器而絡於舌本故脈不榮則筋縮急筋縮急則引卵與舌故舌卷卵縮此筋先死庚日篤辛日死足厥陰肝經足厥陰之脈起於大指聚毛之際上循足跗上廉去內踝一寸足大指爪甲後為三毛三毛後橫紋為聚毛去相去也足厥陰起於大指聚毛之大敦穴循足跗上廉歷行間太衝抵內踝一寸之中封也上踝八寸交出太陰之後上膕內廉自中封上踝過三陰交歷蠡溝中都復上一寸交出太陰之後上膕內廉至膝關曲泉循股入陰中環陰器抵小腹挾胃屬肝絡膽髀內為股臍下為小腹由曲泉上行循股內之陰包五里陰廉遂當衝門府舍之分入陰毛中左右相交環繞陰器抵小腹而上會曲骨中極關元復循章門至期門之所挾胃屬肝下日月之分絡於膽也上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔目內廉深處為目系頏顙咽顙也自期門上貫膈行食竇之外大包之裡散布脅肋上雲門淵液之間人迎之外循喉嚨之後上入頏顙行大迎地倉四白陽白之外連目系上出額行臨泣之裡與督脈相會於巔頂之百會也其支者從目系下頰裡環唇內前此連目繫上出額此支從目系下行任脈之外本經之裡下頰裡交環於唇口之內其支者復從肝別貫膈上注肺此交經之支從期門屬肝處別貫膈行食竇之外本經之裡上注肺下行至中焦挾中脘之分以交於手太陰也是經多血少氣丑時氣血注此受足少陽之交凡一十三穴左右共二十六穴刺深一分留二呼大敦足大指端去爪甲如韭葉及三毛中一云內側為隱白外側為大敦足厥陰肝脈所出為井木銅人針三分留十呼灸三壯主五淋卒疝七疝小便數遺不禁陰頭中痛汗出陰上入小腹陰偏大腹臍中痛悒悒不樂病左取右病右取左腹脹腫病小腹痛中熱喜寐尸厥狀如死人婦人血崩不止陰挺出陰中痛行間足大指縫間動脈應手陷中足厥陰肝脈所溜為滎火肝實則瀉之素注針三分銅人灸三壯針六分留十呼主嘔逆洞泄遺溺癃閉消渴嗜飲善怒四肢滿轉筋胸脅痛小腹腫咳逆嘔血莖中痛腰疼不可俯仰腹中脹小腸氣肝心痛色蒼蒼如死狀終日不得息癲疾短氣便溺難七疝寒疝中風肝積肥氣發痎瘧婦人小腹腫面塵脫色經血過多不止崩中小兒急驚風東垣曰前陰臊臭前陰者足厥陰脈絡循陰器出挺末凡臭心之所主入肝為臊於肝經瀉行間是治本後於心經瀉少衝是治標按難經謂肝臭臊心臭焦脾臭香肺臭腥腎臭腐五臟各有臭而皆心主之故瀉行間為治本次瀉少衝是治標試效方序中治腋臭亦同此法蓋腋下是極泉穴心脈所發腋臭亦屬臊故治法與前陰臊臭不殊藥用柴胡草龍膽車前子黃連以瀉心肝二經也太衝足大指本節後二寸或云一寸半內間動脈應手陷中足厥陰肝脈所注為俞土素問女子二七太衝脈盛月事以時下故能有子又診病人太衝脈有無可以決死生銅人針三分留十呼灸三壯主心痛脈弦馬黃瘟疫肩腫吻傷虛勞浮腫腰引小腹痛兩丸騫縮溏泄遺溺陰痛面目蒼色胸脅支滿足寒肝心痛蒼然如死狀終日不得息大便難便血小便淋小腸疝氣痛㿉疝小便不利嘔血嘔逆發寒嗌乾善渴肘腫內踝前痛淫濼䯒酸腋下馬刀瘍瘻唇腫女子漏下不止小兒卒疝中封一名懸泉足內踝骨前一寸筋里宛宛中素注一寸半仰足取陷中伸足乃得之足厥陰肝脈所行為經金銅人針四分留七呼灸三壯主㾬瘧色蒼蒼發振寒小腹腫痛食怏怏繞臍痛五淋不得小便足厥冷身黃有微熱不嗜食身體不仁寒疝腰中痛或身微熱痿厥失精筋攣陰縮入腹相引痛蠡溝一名交儀內踝上五寸足厥陰絡別走少陽銅人針二分留三呼灸三壯下經灸七壯主疝痛小腹脹滿暴痛如癃閉數噫恐悸少氣不足悒悒不樂咽中悶如有息肉背拘急不可俯仰小便不利臍下積氣如石足脛寒酸屈伸難女子赤白淫下月水不調氣逆則睪丸卒痛實則挺長瀉之虛則暴癢補之中都一名中郤內踝上七寸䯒骨中與少陰相直銅人針三分灸五壯主腸澼㿉疝小腹痛不能行立脛寒婦人崩中産後惡露不絶膝關犢鼻下二寸傍陷中銅人針四分灸五壯主風痹膝內廉痛引臏不可屈伸咽喉中痛曲泉膝股上內側輔骨下大筋上小筋下陷中屈膝橫文頭取之足厥陰肝脈所入為合水肝虛則補之銅人針六分留十呼灸三壯主㿉疝陰股痛小便難腹脅支滿癃閉少氣泄利四肢不舉實則身目眩痛汗不出目䀮䀮膝關痛筋攣不可屈伸發狂衄血下血喘呼小腹痛引咽喉房勞失精身體極痛泄水下痢膿血陰腫陰莖痛䯒腫膝脛冷疼女子血瘕按之如湯浸股內小腹腫陰挺出陰癢陰包膝上四寸股內廉兩筋間踡足取之看膝內側必有槽中銅人針六分灸三壯下經七分主腰尻引小腹痛小便難遺溺婦人月水不調五里氣衝下三寸陰股中動脈應手銅人針六分灸五壯主腹中滿熱閉不得溺風勞嗜臥陰廉羊矢下去氣衝二寸動脈中銅人針八分留七呼灸三壯主婦人絶産若未經生産者灸三壯即有子章門一名長平一名脅髎大橫外直季脅肋端當臍上二寸兩旁九寸側臥屈上足伸下足舉臂取之又云肘尖盡處是穴脾之募足少陽厥陰之會難經藏會章門疏曰藏病治此銅人針六分灸百壯明堂日七壯止五百壯素注針八分留六呼灸三壯主腸鳴盈盈然食不化脅痛不得臥煩熱口乾不嗜食胸脅痛支滿喘息心痛而嘔吐逆飲食卻出腰痛不得轉側腰脊冷疼溺多白濁傷飽身黃瘦賁豚積聚腹腫如鼓脊強四肢懈惰善恐少氣厥逆肩臂不舉東垣曰氣在於腸胃者取之太陰陽明不下取三里章門中脘魏士圭妻徐病疝自臍下上至於心皆脹滿嘔吐煩悶不進飲食滑伯仁曰此寒在下焦為灸章門氣海期門直乳二肋端不容傍一寸五分又曰乳直下一寸半肝之募足厥陰太陰之會銅人針四分灸五壯主胸中煩熱賁豚上下目青而嘔霍亂泄利腹堅硬大喘不得安臥脅下積氣傷寒心切痛喜嘔酸食飲不下食後吐水胸脅痛支滿男子婦人血結胸滿面赤火燥口乾消渴胸中痛不可忍傷寒過經不解熱入血室男子則由陽明而傷下血譫語婦人月水適來邪乘虛而入及産後余疾仲景曰傷寒腹滿譫語寸脈微而緊此肝乘脾也名曰縱刺期門傷寒發熱嗇嗇惡寒大渴欲水其腹必滿自汗出小便利其病欲解肝乘肺也名曰橫刺期門又曰太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語五六日譫語不止當刺期門又曰婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室當刺期門又曰陽明病下血譫語者為熱入血室但頭汗出者刺期門王叔和曰少陰脈不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸陰股與陰相動令身不仁此為尸厥當刺期門巨闕一婦人患熱入血室醫者不識許學士曰小柴胡已遲當刺期門豫不能針請善針者針之如言而愈按傷寒發熱嗇嗇惡寒大渴飲水腹滿至於自汗出則表已解小便利則里自和故仲景曰其病欲解當俟其自愈且肝乘肺為侮所不勝故曰橫今詳文義刺期門三字疑衍故丹溪謂羅成之曰仲景書非全書其間或文有不備或意有未盡吾每思之不能以無疑此之謂歟督脈督脈者起於下極之腧下極之腧兩陰之間屏翳處也屏翳兩筋間為篡篡內深處為下極督脈之所始也並於脊裡上至風府入腦上巔循額至鼻柱屬陽脈之海也脊之為骨凡二十一椎通項骨三椎共二十四椎自屏翳而起歷長強穴並脊裡而上行循腰俞陽關命門懸樞脊中筋縮至陽靈臺神道身柱過風門循陶道大椎啞門至風府入腦循腦戶強間後頂上巔至百會前頂囟會上星神庭循額至鼻柱經素髎水溝兌端至齦交而終焉雲陽脈之海者以人之脈絡周流於諸陽之分譬猶水也而督脈則為之都綱故曰陽脈之海行背中一行凡二十七穴長強一名氣之陰郤一名橛骨脊骶骨端下三分伏地取之乃得足少陰少陽結會督脈別走任脈銅人針三分轉針以大痛為度灸不及針日灸三十壯止二百壯甲乙針二分留七呼明堂灸五壯主腸風下血久痔瘻腰脊痛狂病大小便難頭重洞泄五淋疳蝕下部慝小兒囟陷驚癇瘛瘲嘔血驚恐失精瞻視不正實則脊強瀉之虛則頭重補之腰俞一名背解一名髓孔一名腰柱一名腰戶二十一椎節下間宛宛中以挺身伏地舒身兩手相重支額縱四體後乃取其穴銅人針八分留三呼瀉五吸灸七壯至七七壯甲乙針二分留七呼灸七壯忌房勞舉重強力明堂灸三壯下經灸五壯素注針一分又云二寸主腰髖腰脊痛不得俯仰溫瘧汗不出足清不仁傷寒四肢熱不已婦人月水閉溺赤宋徐秋夫聞鬼斛斯泣腰痛縛草作人令依之針腰俞肩井明日一人謝云蒙君救濟忽不見按秋夫療鬼事涉怪誕然左氏記彭生子産立伯有理或有姑録以博聞見陽關十六椎節下間坐取之銅人針五分灸三壯主膝外不可屈伸風痹不仁筋攣不行命門一名屬纍十四椎節下間伏取之銅人針五分灸二壯主頭痛如破身熱如火汗不出寒熱痎瘧腰腹相引痛骨蒸五臟熱小兒發癇張口搖頭身反折角弓懸樞十三椎下伏取之銅人針三分灸三壯主腰脊強不得屈伸積氣上下行水穀不化下痢腹中留積脊中一名神宗一名脊俞十一椎節下間俯取之銅人針五分得氣即瀉禁灸灸之令人腰傴僂主風癇癲邪黃疸腹滿不嗜食五痔便血溫病積聚下利小兒脫肛素問刺中髓為傴行針宜慎之筋縮九椎節下間俯取之銅人針五分灸三壯明下灸七壯主癲疾狂走脊急強目轉反戴上視目瞪癇病多言心痛至陽七椎節下間俯取之銅人針五分灸三壯明下灸七壯主腰脊痛胃中寒氣不能食胸脅支滿身羸瘦背中氣上下行腹中鳴寒熱解㑊淫濼脛酸四肢重痛少氣難言卒疰忤攻心胸靈臺六椎節下間俯取之銅人缺治病見素問按靈臺一穴諸書缺主治資生經集銅人千金外臺明堂亦無考惟曰見素問考之素問經文無所載王冰注中惟言髎穴所在而已主治亦未之見竊意諸書豈因靈道靈墟名治相混而泯沒歟先儒謂心曰靈臺經謂心者君主之官神明出焉豈主病同手少陰神門而針刺淺深艾壯多寡同至陽神道歟或曰手少陰神門主心矣於督脈何與而六椎節下又屬之心心之所出何多邪曰督為陽脈之都綱猶五臟既有俞在背而督又處太陽之中故太陽有腎俞而督有命門靈臺為心無疑如紫微垣有天皇大帝矣心中星又為帝星大微垣又有帝座天市垣又有帝星蓋心為一身之主如帝王警蹕所至曰行在所也曰論語示闕文春夏存夏吾子何僭妄若此曰安國以郭公為虢公晦庵補格致於大學將以明經也神道五椎節下間俯取之銅人灸七七壯止百壯明下灸三壯針五分千金灸五壯主傷寒發熱頭痛進退往來痎瘧恍惚悲愁健忘驚悸失缺牙車蹉張口不合小兒風癇身柱三椎節骨下間俯取之銅人針五分灸七七壯止百壯明堂灸五壯下經三壯主腰脊痛癲病狂走瘛瘲怒欲殺人身熱妄言見鬼小兒驚癇難知云治洪長伏三脈風癇驚癇發狂惡人與火灸三椎九椎陶道大椎下間俯取之足太陽督脈之會銅人灸五壯針五分主痎瘧寒熱灑淅脊強煩滿汗不出頭重目瞑瘛瘲恍惚不樂大椎一椎上陷者宛宛中手足三陽督脈之會銅人針五分留三呼瀉五吸灸以年為壯主肺脹脅滿嘔吐上氣五勞七傷乏力溫瘧痎瘧氣注背膊拘急頸項強不得回顧風勞食氣骨熱前板齒燥仲景曰太陽與少陽並病頸項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間啞門一名舌厭一名舌橫一名喑門在項風府後一寸入髮際五分項中央宛宛中仰頭取之督脈陽維之會入系舌本素注針四分銅人針三分可繞針八分留三呼瀉五吸瀉盡更留針取之禁灸灸之令人啞主舌急不語重舌諸陽熱氣盛衄血不止寒熱風啞脊強反折瘛瘲癲疾頭痛風汗不出風府一名舌本項後入髮際一寸大筋內宛宛中疾言其肉立起言休立下足太陽督脈陽維之會銅人針三分禁灸灸之使人失音明堂針四分留三呼素注針四分主中風舌緩不語振寒汗出身重惡寒頭痛項急不得回顧偏風半身不遂鼻衄咽喉腫痛傷寒狂走欲自殺目妄視頭中百病馬黃黃疸仲景曰太陽病初服桂枝湯反煩不解先刺風池風府岐伯曰巨陽者諸陽之屬也其脈連府故為諸陽主氣資生云風府者傷寒所自起北人以毛裹之今之護風領南人怯弱者亦以帛護其項今護項乃云蔽垢膩實存名亡矣瘧論曰邪客於風府循膂而下衛氣一日夜大會於風府明日日下一節故其作晏每至於風府則腠理開腠理開則邪氣入邪氣入則病作以此日作稍益晏也其出於風府日下一節二十五日下至骶骨二十六日入於脊內故日作益晏也東垣曰少陽頭痛治在風池風府按風府禁灸矣項疽發於腦之下項之上此正風府穴分也東垣先用火攻之策以大炷艾如兩核許者攻之至百壯豈瘡家與諸病異治歟腦戶一名合顱枕骨上強間後一寸半足太陽督脈之會銅人禁灸灸之令人啞或灸七壯妄灸令人喑明堂針三分素注針四分素問刺腦戶入腦立死主面赤目黃面痛頭重腫痛癭瘤按腦戶一穴資生明堂素問所論深針妄灸醫家當知所戒矣強間一名大羽後頂後一寸半銅人針二分灸七壯明堂灸五壯主頭痛目眩腦旋煩心嘔吐涎沫項強狂走不臥後頂一名交沖百會後一寸半枕骨上銅人灸五壯針二分明堂針四分素注三分主頭項強急惡風寒風眩目䀮䀮額顱上痛歷節汗出狂走癲疾不臥癇發瘛瘲頭偏痛百會一名三陽五會一名巔上一名天滿前頂後一寸五分頂中央旋毛中可容豆直兩耳尖性理北溪陳氏曰略退些子猶天之極星居北手足三陽督脈之會素注針二分銅人灸七壯止七七壯凡灸頭頂不得過七壯緣頭頂皮薄灸不宜多針二分得氣即瀉又素注刺四分主頭風中風言語謇澀口噤不開偏風半身不遂心煩悶驚悸健忘忘前失後心神恍惚無心力痎瘧脫肛風癇青風心風角弓反張羊鳴多哭語言不擇發時即死吐沫汗出而嘔飲酒面赤腦重鼻塞頭痛目眩食無味百病皆治虢太子尸厥扁鵲取三陽五會有間太子蘇唐高宗頭痛秦鳴鶴曰宜刺百會出血武后曰豈有至尊頭上出血之理已而刺之微出血立愈前頂囟會後一寸半骨間陷中銅人針一分灸三壯止七七壯素注刺四分主頭風目眩面赤腫水腫小兒驚癇瘛瘲腫痛囟會上星後一寸陷中銅人灸二七壯至七七壯初灸不痛病去即痛痛止灸針二分留三呼得氣即瀉八歲以下不得針緣囟門未合刺之恐傷其骨令人夭素注針四分主腦虛冷或飲酒過多腦疼如破衄血面赤暴腫頭皮腫生白屑風頭眩顏青目眩鼻塞不聞香臭驚悸目戴上不識人上星一名神堂神庭後入髮際一寸陷中容豆素問針三分留六呼灸五壯銅人針四分以細三稜針宜泄諸陽熱氣無令上衝頭目主面赤腫頭風頭皮腫面虛鼻中息肉鼻塞頭痛痎瘧振寒熱病汗不出目眩目睛痛不能遠視口鼻出血不止神庭直鼻上入髮際五分足太陽督脈之會素注灸三壯銅人灸二七壯止七七壯禁針針則發狂目失精主登高而歌棄衣而走角弓反張吐舌癲疾風癇戴目上視不識人頭風目眩鼻出清涕不止目淚出驚悸不得安寢嘔吐煩滿寒熱頭痛喘渴張子和曰目痛目腫目翳針神庭上星囟會前頂翳者可使立退腫者可使立消素髎一名面正鼻柱上端準頭外臺不宜灸針一分素注三分主鼻中息肉不消多涕生瘡鼻窒喘息不利鼻喎噼鼽衄水溝一名人中鼻柱下人中近鼻孔陷中督脈手足陽明之會素注針三分留六呼灸三壯銅人針四分留五呼得氣即瀉灸不及針日灸三壯明堂日灸三壯至二百壯下經灸五壯主消渴飲水無度水氣遍身腫失笑無時癲癇語不識尊卑乍哭乍喜中風口噤牙關不開面腫唇動狀如蟲行卒中惡鬼擊喘渴目不可視黃疸馬黃瘟疫通身黃口喎噼兌端唇上端銅人針二分灸三壯主癲疾吐沫小便黃舌乾消渴衄血不止唇吻強齒齦痛鼻塞痰涎口噤鼓頷齦交唇內齒上齦縫中任督足陽明之會銅人針三分灸三壯主鼻中息肉蝕瘡鼻塞不利額頞中痛頸項強目淚眵汁內眥赤癢痛生白翳面赤心煩馬黃黃疸寒暑溫疫二十九難曰督之為病脊強而厥又曰其受邪氣畜則腫熱砭射之也任脈任脈者起於中極之下以上毛際循腹裡上關元至喉嚨屬陰脈之海也任之為言妊也行腹部中行為婦人生養之本奇經之一脈也任與督一源而二岐督則由會陰而行背任則由會陰而行腹夫人身之有任督猶天地之有子午也人身之任督以腹背言天地之子午以南北言可以分可以合者也分之以見陰陽之不雜合之以見渾淪之無間一而二二而一者也任脈起於中極之下會陰之分也由是循曲骨上毛際至中極行腹裡上循關元石門氣海陰交神闕水分下脘建里中脘上脘巨闕鳩尾中庭膻中玉堂紫宮華蓋璇璣天突廉泉上頤循承漿環唇上至齦交分行系兩目下之中央會承泣而終也云陰脈之海者亦以人之脈絡周流於諸陰之分譬猶水也而任脈則為之總會焉故曰陰脈之海行腹中一行凡二十四穴會陰一名屏翳兩陰間任督沖三脈所起督由會陰而行背任由會陰而行腹沖由氣衝行足少陰銅人灸三壯指微禁針主陰汗陰頭疼陰中諸病前後相引痛不得大小便陰端寒衝心竅中熱皮疼痛穀道瘙癢久痔相通女子經水不通陰門腫痛卒死者針一寸補之溺死者令人倒馱出水針補尿屎出則活余不可針曲骨橫骨上中極下一寸毛際陷中動脈應手足厥陰任脈之會銅人灸七壯至七七壯針二寸素注針六分留七呼又云針一寸主失精五臟虛弱虛乏冷極小腹脹滿小便淋瀝不通㿉疝小腹痛婦人赤白帶下中極一名玉泉一名氣原關元下一寸臍下四寸膀胱之募足三陰任脈之會銅人針八分留十呼得氣即瀉灸百壯明堂灸不及針日三七壯下經灸五壯主冷氣積聚時上衝心腹中熱臍下結塊賁豚搶心陰汗水腫陽氣虛憊小便頻數失精絶子疝瘕婦人産後惡露不行胎衣不下月事不調血結成塊子門腫痛不端小腹苦寒陰癢而熱陰痛恍惚尸厥飢不能食臨經行房羸瘦寒熱轉脬不得尿婦人斷緒四度針即有子關元臍下三寸小腸之募足三陰任脈之會下紀者關元也素注刺一寸二分留七呼灸七壯又云針二寸銅人針八分留三呼瀉五吸灸百壯止三百壯明堂娠婦禁針若針而落胎胎多不出針外崑崙立出主積冷虛乏臍下絞痛漸入陰中發作無時冷氣結塊痛寒氣入腹痛失精白濁溺血暴疝風眩頭痛轉胞閉塞小便不通黃赤勞熱石淋五淋泄利奔豚搶心婦人帶下月經不通絶嗣不生胞門閉塞胎漏下血産後惡露不止石門一名利機一名精露一名丹田一名命門臍下二寸三焦募也銅人灸二七壯止二百壯甲乙針八分留三呼得氣即瀉千金針五分下經灸七壯素注刺六分留七呼婦人禁針禁灸犯之終身絶子主傷寒小便不利泄利不禁小腹絞痛陰囊入小腹賁豚搶心腹痛堅硬卒疝繞臍氣淋血淋小便黃嘔吐血不食谷穀不化水腫水氣行皮膚小腹皮敦敦然氣滿婦人因産惡露不止結成塊崩中漏下氣海一名脖䕔一名下肓臍下一寸半宛宛中男子生氣之海銅人針八分得氣即瀉瀉後宜補之明下灸七壯主傷寒飲水過多腹腫脹氣喘心下痛冷病面赤藏虛氣憊真氣不足一切氣疾久不瘥肌體羸瘦四肢力弱賁豚七疝小腸膀胱腎余癥瘕結塊狀如覆杯腹暴脹按之不下臍下冷氣痛中惡脫陽欲死大便不通小便赤卒心痛婦人臨經行房羸瘦崩中赤白帶下月事不調産後惡露不止繞臍㽲痛閃著腰疼小兒遺尿浦江鄭義宗患滯下昏僕目上視溲注汗泄脈大此陰虛陽暴絶得之病後酒色丹溪為灸氣海漸蘇服人參膏數斤愈陰交一名橫戶臍下一寸當膀胱上口三焦之募任脈少陰衝脈之會銅人針八分得氣即瀉瀉後宜補灸百壯明堂灸不及針日三七壯止百壯主氣痛如刀攪腹䐜堅痛下引陰中不得小便兩丸騫疝痛陰汗濕癢腰膝拘攣臍下熱鬼擊鼻出血婦人血崩月事不絶帶下産後惡露不止繞臍冷痛絶子陰癢賁豚上䐜小兒陷囟神闕一名氣舍當臍中素注禁針針之使人臍中惡瘍潰矢出者死不治灸三壯銅人灸百壯主中風不蘇久冷傷敗臟腑泄利不止水腫鼓脹腸鳴腹痛繞臍小兒奶利不絶脫肛風癇角弓反張徐伻中風不蘇桃源簿為灸臍中百壯始蘇不起再灸百壯水分下脘下一寸臍上一寸穴當小腸下口至是而泌別清濁水液入膀胱渣滓入大腸故曰水分素注針一寸銅人針八分留三呼瀉五吸水病灸大良又云禁針針之水盡即死明堂水病灸七七壯止四百壯針五分留三呼資生云不針為是主水病腹堅腫如鼓轉筋不嗜食腸胃虛脹繞臍痛衝心腰脊急強腸鳴狀如雷聲上衝心鬼擊鼻出血小兒陷囟下脘建里下一寸臍上二寸穴當胃下口小腸上口水穀於是入焉足太陰任脈之會銅人針八分留三呼瀉五吸灸二七壯止二百壯主臍下厥氣動腹堅硬胃脹羸瘦腹痛六腑氣寒谷不轉化不嗜食小便赤癖塊連臍上厥氣動日漸瘦脈厥動翻胃建里中脘下一寸臍上三寸銅人針五分留十呼灸五壯明堂針一寸二分主腹脹身腫心痛上氣腸中疼嘔逆不嗜食中脘一名太倉上脘下一寸臍上四寸居心蔽骨與臍之中胃之募手太陽少陽足陽明任脈之會上紀者中脘也胃之募也難經曰腑會中脘腑病治此銅人針八分留七呼瀉五吸疾出針灸二七壯止二百壯明堂日灸二七壯止四百壯素注針一寸二分灸七壯主五膈喘息不止腹暴脹中惡脾疼飲食不進翻胃赤白痢寒癖氣心疼伏梁心下如覆杯心膨脹面色痿黃天行傷寒熱不已溫瘧先腹痛先瀉霍亂泄出不知食飲不化心痛身寒不可俯仰氣發噎東垣曰氣在於腸胃者取之足太陰陽明不下取三里章門中脘又曰胃虛而致太陰無所稟者於足陽明募穴中導引之上脘一名胃脘巨闕下一寸當一寸五分去蔽骨三寸臍上五寸上脘中脘屬胃絡脾足陽明手太陽任脈之會素注銅人針八分先補後瀉風癇熱病先瀉後補立愈日灸二七壯至百壯未愈倍之明下三壯主腹中雷鳴相逐食不化腹㽲刺痛霍亂吐利腹痛身熱汗不出翻胃嘔吐食不下腹脹氣滿心忪驚悸時嘔血痰多吐涎奔豚伏梁三蟲卒心痛風癇熱病馬黃黃疸積聚堅大如盤虛勞吐血五毒疰不能食巨闕鳩尾下一寸心之募銅人針六分留七呼得氣即瀉灸七壯止七七壯主上氣咳逆胸滿短氣背痛胸痛痞塞數種心痛冷痛蛔蟲痛蠱毒貓鬼胸中痰飲先心痛先吐霍亂不識人驚悸腹脹暴痛恍惚不止吐逆不食傷寒煩心喜嘔發狂少氣腹痛黃疸急疽急疫咳嗽狐疝小腹脹滿煩熱鬲中不利五臟氣相干卒心痛尸厥妊娠子上衝心昏悶刺巨闕下針令人立蘇不悶次補合谷瀉三陰交胎應針而落如子手掬心生下手有針痕頂母心向前人中有針痕向後枕骨有針痕是驗按十四經發揮云凡人心下有膈膜前齊鳩尾後齊十一椎周圍著脊所以遮隔濁氣不使上熏心肺是心在膈上也難産之婦若子上衝至膈則止兒之在腹指未能執物尚堅握而不伸者又有胞衣裹之豈能破鬲掬心哉心為一身之主神明出焉不容小有所犯豈有被沖掬而不死哉蓋以其上衝近心故云爾如胃脘痛曰心痛之類是也學者不可以辭害意鳩尾一名尾翳一名𩩲骬蔽骨之端在臆前蔽骨下五分人無蔽骨者從岐骨際下行一寸曰鳩尾者言其骨垂下如鳩尾形任脈之別銅人禁灸灸之令人永世少心力大妙手方可針不然針取氣多令人夭針三分留三呼瀉五吸肥人倍之明堂灸三壯素注不可刺灸主息賁熱病偏頭痛引目外眥噫喘喉鳴胸滿咳嘔喉痹咽腫水漿不下癲癇狂走不擇言語心中氣悶不喜聞人語咳唾血心驚悸精神耗散少年房多短氣少氣又靈樞經云膏之原出於鳩尾中庭膻中下一寸六分陷中銅人灸五壯針三分明堂灸三壯主胸脅支滿噎塞食飲不下嘔吐食出小兒吐奶膻中一名元兒玉堂下一寸六分橫量兩乳間陷中仰臥取之主氣以分布陰陽故為臣使之官難經曰氣會三焦陳氏曰三焦當作上焦一筋直兩乳間疏曰氣病治此銅人禁針針之令人夭明堂灸七壯止七七壯氣府論注針三分灸五壯主上氣短氣咳逆噎氣鬲氣喉鳴喘嗽不下食胸中如塞心胸痛風痛咳嗽肺癰唾膿嘔吐涎沫婦人乳汁少玉堂一名玉英紫宮下一寸六分陷中銅人灸五壯針三分主胸膺疼痛心煩咳逆上氣胸滿不得息喘急嘔吐寒痰紫宮華蓋下一寸六分陷中仰而取之銅人灸五壯針三分明下灸七壯主胸脅支滿胸膺骨痛飲食不下嘔逆上氣煩心咳逆吐血唾如白膠華蓋璇璣下一寸陷中仰而取之銅人針三分灸五壯明下灸三壯主喘急上氣咳逆哮嗽喉痹咽腫水漿不下胸皮痛璇璣天突下一寸陷中仰頭取之銅人灸五壯針三分主胸脅支滿痛咳逆上氣喉鳴喘不能言喉痹咽癰水漿不下胃中有積天突一名天瞿在頸結喉下四寸宛宛中陰維任脈之會銅人針五分留三呼得氣即瀉灸亦得不及針若下針當直下不得低手即五臟之氣傷人短壽明堂灸五壯針一分素注針一寸留七呼灸三壯主麵皮熱上氣咳逆氣暴喘咽腫咽冷聲破喉中生瘡喉猜猜咯膿血喑不能言身寒熱頸腫哮喘喉中鳴翕翕如水雞聲胸中氣梗梗俠舌縫青脈舌下急心與背相控而痛五噎黃疸醋心多唾嘔吐癭瘤許氏曰此穴一針四效凡下針後良久先脾磨食覺針動為一效次針破病根腹中作聲為二效次覺流入膀胱為三效然後覺氣流行入腰後腎堂間為四效矣廉泉一名舌本頸下結喉上四寸中央仰面取之陰維任脈之會素注低針取之針一寸留七呼銅人灸三壯針三分得氣即瀉明堂針二分主咳嗽上氣喘息嘔沫舌下腫難言舌根縮急不食舌縱涎出口瘡承漿一名懸漿唇稜下陷中開口取之大腸脈胃脈督脈任脈之會素注針二分留五呼灸三壯銅人灸七壯止七七壯明堂針三分得氣即瀉留三呼徐徐引氣而出日灸七壯過七七停四五日後灸七七壯若一向灸恐足陽明脈斷其病不愈停息復灸令血脈通宣其病立愈主偏風半身不遂口眼喎斜面腫消渴口齒疳蝕生瘡暴喑不能言難經曰任之為病其內苦結男子為七疝女子為瘕聚陽蹺脈陽蹺脈者起於跟中循外踝上行入風池其為病也令人陰緩而陽急兩足蹺脈本太陽之別合於太陽其氣上行氣並相還則為濡目氣不營則目不合男子數其陽女子數其陰當數者為經不當數者為絡也蹺脈長八尺所發之穴生於申脈以附陽為郤本於僕參與足少陽會於居髎又與手陽明會於肩髃及巨骨又與手足太陽陽維會於臑俞與手足陽明會於地倉又與手足陽明會於巨髎又與任脈足陽明會於承泣凡二十穴申脈外踝下屬足太陽經附陽外踝上僕參跟骨上居髎章門下肩髃肩端巨骨肩端臑俞肩髎後胛骨上廉地倉口吻旁巨髎鼻兩旁承泣目下七分以上諸穴陽蹺脈病者宜刺之陰蹺脈陰蹺脈者亦起於跟中循內踝上行至咽喉交貫衝脈此為病者令人陽緩而陰急故曰蹺脈者少陰之別別於然谷之後上內踝之上直上陰循陰股入陰上循胸裡入缺盆上出人迎之前入鼻屬目內眥合於太陽女子以之為經男子以之為絡兩足蹺脈長八尺而陰蹺之郤在交信陰蹺病者取此照海足內踝下交信內踝上陰蹺脈病取之二穴刺之衝脈衝脈者與任脈皆起於胞中上循脊裡為經絡之海其浮於外者循腹上行會於咽喉別而絡唇口故曰衝脈者起於氣衝並足少陰之經俠臍上行至胸中而散此為病令人逆氣而裡急難經則曰並足陽明之經以穴考之足陽明俠臍左右各二寸而上行足少陰俠臍左右各五分而上行針經所載沖任與督脈同起於會陰其在腹也行乎幽門通谷陰都石關商曲肓俞中注四滿氣穴大赫橫骨凡二十二穴皆足少陰之分也然則衝脈並足少陰之經明矣幽門巨闕旁通谷上脘兩旁陰都通谷下石關陰都下商曲石關下肓俞商曲下中注肓俞下四滿中注下氣穴四滿下大赫氣穴下橫骨大赫下逆氣裡急者取諸此陽維脈陽維維於陽其脈起於諸陽之會與陰維皆維絡於身若陽不能維於陽則溶溶不能自收持其脈氣所發別於金門以陽交為郤與手足太陽及蹺脈會於臑俞與手足少陽會於天髎又會於肩井其在頭也與足少陽會於陽白上於本神及臨泣上至正營循於腦空下至風池其與督脈會則在風府及啞門難經云陽維為病苦寒熱此陽維脈氣所發凡二十四穴金門足外踝下陽交外踝上七寸臑俞肩後胛上廉天髎缺盆上肩井肩頭上陽白眉上本神眉上臨泣眉上正營目窗後腦空缺盆上風池顳顬後風府髮際啞門風府後以上穴苦寒熱者刺之陰維脈陰維維於陰其脈起於諸陰之交若陰不能維於陰則悵然失志其脈氣所發者陰維之郤名曰築賓與足太陰會於腹哀大橫又與足太陰厥陰會於府舍期門與任脈會於天突廉泉難經云陰維為病苦心痛此陰維脈氣所發凡十二穴築賓內踝上腹哀日月下大橫腹哀下府舍腹結下期門乳下天突結喉下廉泉結喉上以上穴苦心痛者刺之帶脈帶脈者起於季脅回身一周其為病也腰腹縱容如囊水之狀其脈氣所發在季脅下一寸八分正名帶脈以其回身一周如帶也又與足少陽會於維道此帶脈所發凡四穴帶脈在季脅下一寸八分維道以上穴病如上證者刺之十五絡脈手太陰之別名曰列缺實則手鋭掌熱瀉之虛則缺㰦小便遺數補之手少陰之別名曰通里實則支滿瀉之虛則不能言補之手心主之別名曰內關實則心痛瀉之虛則頭強補之手太陽之別名曰支正實則節弛肘廢瀉之虛則生疣小如指痂疥補之手陽明之別名曰偏歷實則齲聾瀉之虛則齒寒痹隔補之手少陽之別名曰外關實則肘攣瀉之虛則不收補之足太陽之別名曰飛揚實則鼽窒頭背痛瀉之虛則鼽衄補之足少陽之別名曰光明實則厥瀉之虛則痿躄坐不能起補之足陽明之別名曰豐隆氣逆則喉痹卒喑實則狂癲瀉之虛則足不收脛枯補之足太陰之別名曰公孫厥氣上逆則霍亂實則腸中切痛瀉之虛則鼓脹補之足少陰之別名曰大鐘其病氣逆則煩悶實則閉癃瀉之虛則腰痛補之足厥陰之別名曰蠡溝其病氣逆則睪丸卒痛實則挺長瀉之虛則暴癢補之任脈之別名曰尾翳實則腹皮痛瀉之虛則癢瘙補之督脈之別名曰長強實則脊強瀉之虛則頭重補之脾之大絡名曰大包實則身盡痛瀉之虛則百節盡皆縱補之凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脈異所別也又按胃之大絡名曰虛里其動應衣脈宗氣也而不繫於補瀉之列蓋中焦之氣盛衰而宗氣為之盈縮取之三里以下其氣而宗氣之盈者消調之三里以補其所而宗氣之耗者滋則其氣未嘗不補瀉也特以非別走他經故不在諸絡之例此所以舉豐隆而不屬虛里也歟十二原穴三焦行於諸陽故置一俞曰原又曰三焦者水穀之道路原氣之別使也主通行三氣經歷五臟六腑原者三焦之尊號故所至輒為原也太淵肺大陵心包太衝肝太白脾太溪腎神門心陽池三焦京骨膀胱丘墟膽衝陽胃合谷大腸腕骨小腸按難經云五臟六腑之有病者皆取其原王海藏曰假令補肝經於本經原穴補一針太衝穴是如瀉肝經於本經原穴亦瀉一針余仿此自太淵至神門皆為俞自陽池至腕骨為原海藏皆為十二原者豈五臟無原以俞為原六腑有原取原而不取俞耶五臟募穴中府肺之募巨闕心之募章門脾之募期門肝之募中脘胃之募按難經云陽病行陰故令募在陰腹曰陰募皆在腹東垣曰凡治腹之募皆為原氣不足從陰引陽勿誤也又曰六淫客邪及上熱下寒筋骨皮肉血脈之病錯取於胃之合及諸脈之募者必危五臟俞穴俞猶委輸之輸言經氣由此而輸於彼也肺俞三椎下各開寸半心俞五椎下各開寸半肝俞九椎下各開寸半脾俞十一椎下各開寸半腎俞十四椎下各開寸半按難經云陰病行陽背為陽故令俞在陽人之俞皆在背東垣曰天外風寒之邪乘中而入在人之背上腑俞臟俞是人之受天外風邪亦有二說中於陽則流於經此病始於外寒終歸外熱以故治風寒之邪治其各臟之俞八會穴腑會中脘臟會章門筋會陽陵泉髓會絶骨血會鬲俞骨會大杼脈會太淵氣會亶中難經云熱病在內者取會之氣穴也五臟六腑井滎俞原經合
