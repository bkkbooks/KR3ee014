body:
  text: 引扁鵲有言疾在腠理尉焫之所及在血脈針石之所及其在腸胃酒醪之所及是針灸藥三者得兼而後可與言醫可與言醫者斯周官之十全者也曩武謬以活人之術止於藥故棄針與灸而莫之講每遇傷寒熱入血室閃挫諸疾非藥餌所能愈而必俟夫刺者則束手無策自愧技窮因悟治病猶對壘攻守奇正量敵而應者將之良針灸藥因病而施者醫之良也思得師指而艱其人求之遠近以針鳴者各出編集標幽玉龍肘後流注神應等書其於捻針補瀉尚戾越人從衛取氣從榮置氣之說復取素難而研精之旁究諸家又知素難為醫之鼻祖猶易為揲蓍求卦之原諸家醫流如以錢擲甲子起卦勾陳玄武螣蛇龍虎斷吉凶似易而亂易也後世針灸亦若是爾嗚呼不溯其原則昧夫古人立法之善故嘗集節要一書矣不窮其流則不知後世變法之弊此聚英之所以纂也安故狃近者猶曰易窮則變變則通通則久是以詩變而騷君子取之郡縣者封建之變租庸者井田之變後人因之固足以經國治世奚怪於針灸之變法哉奚是古非今為哉豈知封建井田變而卒莫如周之延祚八百針灸變而卒莫如古之能收功十全如使弊法而可因則彼放蕩逾閒者可以為禮以之安上治民妖淫愁怨者可以為樂以之移風易俗哉夫易謂窮斯變通久素難者垂之萬世而無弊不可謂窮不容於變而自通且久也周子謂不復古禮不變今樂而欲至治者遠然則不學古醫不變今俗而欲收十全之功者未之有也茲續編諸家而折衷以素難之旨夫然後前人之法今時之弊司命者知所去取矣時嘉靖己丑夏六月六日四明梅孤子高武識凡例一諸書於素問難經多異少同今取其同議其異故以聚英名一此書以經絡髎穴類聚為一卷各病取穴治法為二卷諸論針艾法為三卷各歌賦為四卷間或發揮一二一周身尺寸已詳於前集素難節要今止繪圖各分寫於上以便准量取穴一經絡俱屬於五臟六腑今繪其圖於經絡之前者知外有是經則內屬是臟腑也一明堂針灸銅人千金翼諸書拘頭面腹手足分列髎穴殊無經絡起止次序今以滑氏十四經發揮金蘭循經經絡繪圖每經自始至終某穴主某病以便考究一資生經立諸病目以各髎穴分屬似難於閲今以各經髎穴為主以主某病分屬之仿神農本草例以穴名在前藥性隨於後一各經髎穴或有原缺者仍舊一標幽玉龍肘後諸歌賦今醫家皆謂其易於記誦然專事於此則針灸亦狹矣姑集於末卷以備參閲一奇經八脈十二絡脈八會脈原募穴雖備於本經絡復表章於後以便分別一前人著取穴捷法治病而不明言穴名者今考明之一取穴法有未明者竊議一二一針灸書惟明堂銅人千金濟生拔萃竇氏流注子午盡好其餘愈出愈下不合素問難經者多各附以發揮一東垣針法深得素問之旨人多忽之各書亦不能載今於脾胃論中表章於此一素難井滎俞經合主病人多不明五行生剋故不能行今以諸經是動所生病補瀉生克細為制定以便針刺一各書有關於論針灸備録於卷末一濟生拔萃於十二經井滎俞經合穴萃集各書主治病證其餘髎穴則未之及故今仿其例亦據銅人千金明堂外臺而補輯之一經絡悉依十四經發揮流注交接次第髎穴亦依之比之銅人等書有繁雜空穴皆不增入一各空穴下分寸針淺深艾壯多少俱備録以便四時取用明堂經則曰明堂資生經則曰資生千金翼則曰千金明堂下經則曰明下或曰下經外臺祕要則曰外臺俱省文爾一世俗喜歌賦以其便於記誦也今類聚各書歌賦置之末卷
