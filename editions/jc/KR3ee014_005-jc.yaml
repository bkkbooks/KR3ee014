呼之為補退後右轉吸之為瀉提針為熱插針為寒女子者大指退後右轉吸之為補進前左轉呼之為瀉插針為熱提針為寒左與右有異胸與背不同午前者如此午後者反之是故爪而切之下針之法搖而退之出針之法動而進之催針之法循而攝之行氣之法搓則去病彈則補虛肚腹盤旋捫為穴閉重沉豆許曰按輕浮豆許曰提一十四法針要所備補者一退三飛真氣自歸瀉者一飛三退邪氣自避補則補其不足瀉則瀉其有餘有餘者為腫為痛曰實不足者為癢為麻曰虛氣速效速氣遲效遲死生貴賤針下皆知賤者硬而貴者脆生者澀而死者虛候之不至必死無疑且夫下針之法先須爪按重而切之次令咳嗽一聲隨咳下針凡補先呼氣初針至皮內乃曰天才少停進針至肉內是曰人才又停進針至於筋骨之間名曰地才此為極處就當補之再停良久卻須退針至人之分待氣沉緊倒針朝病進退往來飛經走氣盡在其中矣凡瀉者吸氣初針至天少停進針直至於地得氣瀉之再停良久卻須退針復至於人得氣沉緊倒針朝病法同前矣其或暈針者神氣虛也以針補之以袖掩之口鼻氣回熱湯與之略停少頃依前再施及夫調氣之法下針至地之後復人之分欲氣上行將針右捻欲氣下行將針左捻欲補先呼後吸欲瀉先吸後呼氣不至者以手循攝以爪切掐以針搖動進捻搓彈直待氣至以龍虎升騰之法按之在前使氣在後按之在後使氣在前運氣走至疼痛之所以納氣之法扶針直插復向下納使氣不回若關節阻澀氣不過者以龍虎龜鳳通經接氣大段之法驅而運之仍以循攝爪切無不應矣此通仙之妙況夫出針之法病勢既退針氣微松病未退者針氣始根推之不動轉之不移此為邪氣吸拔其針乃真氣未至不可出之出之者其病即復再須補瀉停以待之直待微松方可出針豆許搖而停之補者吸之去疾其穴急捫瀉者呼之去徐其穴不閉欲令腠密然後吸氣故曰下針貴遲大急傷血出針貴緩大急傷氣以上總要於斯盡矣方夫治病其法有八一曰燒山火治頑麻冷痹先淺後深用九陽而三進三退慢提緊按熱至緊閉插針除寒之有準二曰透天涼治肌熱骨蒸先深後淺用六陰而三出三入緊提慢按寒至徐徐舉針退熱之可憑皆細細搓之退熱準繩三曰陽中引陰先寒後熱自淺而深以九六之法先補後瀉也四曰陰中引陽先熱後寒自深而淺以九六之方則先瀉後補也補者直須熱至瀉者務待寒侵猶如搓線慢慢轉針法在淺則用淺法在深則用深二者不可兼而紊之也五曰子午搗臼水蠱鬲氣落穴之後調氣均勻針行上下九入六出左右轉之十遭自平六曰進氣之訣腰背肘膝痛渾身走注疼刺九分行九補臥針五七吸待氣上下亦可龍虎交戰左捻九而右捻六是亦住痛之針七曰留氣之訣痃癖癥瘕刺七分用純陽然後乃直插針氣來深刺提針再停八曰抽添之訣癱瘓瘡癩取其要穴使九陽得氣提按搜尋大要運氣周遍扶針直插復向下納回陽倒陰指下玄微胸中活法一有未應反復再施若夫過關過節催運氣以飛經走氣其法有四一曰青龍擺尾如扶船舵不進不退一左一右慢慢撥動二曰白虎搖頭似手搖鈴退方進圓兼之左右搖而振之三曰蒼龜探穴如入土之象一退三進鑽剔四方四曰赤鳳迎源展翅之儀入針至地提針至天候針自搖復進其原上下左右四圍飛旋病在上吸而退之病在下呼而進之至夫久患偏枯通經接氣之法已有定息寸數手足三陽上九而下十四過經四寸手足三陰上七而下十二過經五寸在乎搖動出納呼吸同法驅運氣血頃刻周流上下通接可使寒者暖而熱者涼痛者止而脹者消若開渠之決水立時見功何傾危之不起哉雖然病有三因皆從氣血針分八法不離陰陽蓋經脈晝夜之循環呼吸往來之不息和則身體康健否則疾病競生譬天下國家地方山海田園江河溪谷值歲時風雨均調則水道疏利民安物阜其或一方一所風雨不均遭以旱潦使水道湧竭不通災傷遂至人之氣血受病三因亦猶方所之於旱潦蓋針砭所以通經脈均血氣蠲邪扶正故曰捷法最奇者哉子午流注逐日按時定穴歌甲日戌時膽竅陰丙子時中前谷滎戊寅陷谷陽明俞返本丘墟木在寅庚辰經注陽谿穴壬午膀胱委中尋甲申時納三焦水滎合天干取液門乙日酉時肝大敦丁亥時滎少府心己丑太白太衝穴辛卯經渠是肺經癸巳腎宮陰谷合乙未勞宮水穴滎丙日申時少澤當戊戌內庭治脹康庚子時在三間俞本原腕骨可祛黃壬寅經水崑崙上甲辰陽陵泉合長丙午時受三焦火中渚之中仔細詳丁日未時心少衝己酉大都脾土逢辛亥太淵神門穴癸丑復溜腎水通乙卯肝經曲泉合丁巳包絡大陵中戊日午時厲兌先庚申滎穴二間遷壬戌膀胱尋束骨衝陽土穴必還原甲子膽經陽輔是丙寅小海穴安然戊辰氣納三焦脈經火支溝刺必痊己日巳時隱白始辛未時中魚際取癸酉太谿太白原乙亥中封內踝比丁丑時合少海心己卯間使包絡止庚日辰時商陽居壬午膀胱通谷之甲申臨泣為俞木合谷金原返本歸丙戌小腸陽谷穴戊子時居三里宜庚寅氣納三焦合天井之中不用疑辛日卯時少商本癸巳然谷何須忖乙未太衝原太淵丁酉心經靈道引己亥脾合陰陵泉辛丑曲澤包絡准壬日寅時起至陰甲辰膽脈俠谿滎丙午小腸後谿俞返求京骨本原尋三焦寄在陽池穴反本還原是的親戊申時註解谿胃大腸庚戌曲池真壬子氣納三焦寄井穴關衝一片金關衝屬金壬屬水子母相生恩義深癸日亥時井湧泉乙丑行間穴必然丁卯俞穴神門是本尋腎水太谿原包絡大陵原並過己巳商丘內踝邊辛未肺經合尺澤癸酉中衝包絡連子午截時安定穴留傳後學莫忘言上流注歌徐氏所撰還原化本之理血氣所納之穴斯昭昭矣孫