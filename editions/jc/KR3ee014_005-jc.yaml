body:
  text: 卷四上十四經穴歌手太陰十一穴中府雲門天府列俠白尺澤孔最存列缺經渠太淵涉魚際少商如韭葉手陽明起商陽二間三間合谷藏陽谿偏歷歷溫溜下廉上廉三里長曲池肘髎迎五里臂臑肩髃巨骨當天鼎扶突禾髎接終以迎香二十穴四十五穴足陽明承泣四白巨髎經地倉大迎頰車峙下關頭維人迎對水突氣舍連缺盆氣戶庫房屋翳屯膺窗乳中延乳根不容承滿梁門起關門太乙滑肉門天樞外陵大巨存水道歸來氣衝次髀關伏兔走陰市梁丘犢鼻足三里上巨虛連條口位下巨虛位及豐隆解谿衝陽陷谷中內庭厲兌經穴終二十一穴太陰脾隱白大都太白隨公孫商丘三陰交漏谷地機陰陵坳血海箕門衝門開府舍腹結大橫排腹哀食竇連天谿胸鄉周榮大包隨九穴手少陰極泉青靈少海深靈道通里陰郄邃神門少府少衝尋手太陽穴一十九少澤前谷後谿隅腕骨陽谷可養老支正小海肩貞走臑俞天宗及秉風曲垣肩外復肩中天窗天容上顴髎卻入耳中循聽宮足太陽六十三睛明攢竹曲差參五處承光上通天絡卻玉枕天柱嶄大杼風門引肺俞厥陰心俞鬲俞注肝俞膽俞脾俞合胃俞三焦腎俞中大腸小腸膀胱俞中膂白環兩俞輸自從大杼至白環相去脊中三寸間上髎次髎中復下會陽承扶殷門亞浮郄委陽委中罅膊內夾脊附分當太陽行背第三行魄戶膏肓與神堂噫嘻鬲關魂門旁陽綱意舍仍胃倉肓門志室胞之肓二十椎下秩邊藏合膕以下合陽是承筋承山居其次飛揚附陽泊崑崙僕參申脈連金門京骨束骨又通谷小指外側至陰續足少陰穴二十七湧泉然谷太谿溢大鐘照海通水泉復溜交信築賓連陰谷橫骨大赫聯氣穴四滿中注立肓俞商曲石關蹲陰都通谷幽門僻步廊神封靈墟位神臟彧中俞府既九穴手厥陰天池天泉曲澤深郄門間使內關對大陵勞宮中衝備二十三穴手少陽關衝液門中渚旁陽池外關支溝會會宗三陽四瀆配天井上合清冷淵消濼臑會肩髎偏天髎天牖同翳風瘈脈顱息角孫通耳門和髎絲竹空少陽足經童子髎四十三穴行迢迢聽會客主頷厭集懸顱懸釐曲鬢翹率谷天衝浮白次竅陰完骨本神企陽白臨泣開目窗正營承靈及腦空風池肩井淵液長輒筋日月京門當帶脈五樞維道續居髎環跳下中瀆陽關陽陵復陽交外丘光明陽輔高懸鐘丘墟足臨泣地五俠谿竅陰畢足肝經十三穴大敦行間太衝列中封蠡溝及中都膝關曲泉膝內徹陰包五里上陰廉章門期門貫上鬲督脈背中行二十七穴始長強腰俞陽關命門當懸樞脊中走筋縮至陽靈臺神道長身柱陶道大椎俞啞門風府腦戶俱強間後頂百會前前頂囟會上星圓神庭素髎水溝裡兌端齦交斯已矣任脈分三八起於會陰上曲骨中極關元到石門氣海陰交神闕立水分下脘循建里中脘上脘巨闕起鳩尾中庭亶中萃玉堂紫宮樹華蓋璇璣天突廉泉清上頤還以承漿承上十四經穴歌順經編葉有起止次序滑氏所撰者比之徐廷瑞周身經穴賦過之遠矣十四經步穴歌太陰肺兮出中府雲門之下一寸許雲門氣戶旁二寸人迎之下二骨數天府腋下三寸求俠白肘上五寸主尺澤肘中約紋論孔最腕中七寸取列缺腕側一寸半經渠寸口陷中是太淵掌後橫紋頭魚際節後大指本節後散脈舉少商大指內側端此穴若針疾減愈手陽明經屬大腸食指內側起商陽本節前取二間定本節後取三間強岐骨陷中尋合谷陽谿腕中上側詳腕後三寸是偏歷五寸之中溫溜當下廉上廉各一寸上廉此下一寸方屈肘曲中曲池得池下二寸三里場肘髎大骨外廉陷五里肘上三寸量臂臑髃下一寸取肩髃肩端兩骨當巨骨肩端叉骨內天鼎缺盆之上針扶突曲頰下一寸禾髎五分水溝旁鼻孔兩旁各五分左右二穴皆迎香胃之經兮足陽明承泣目下七分尋四白一寸不可深巨髎鼻孔傍八分地倉夾吻四分近大迎曲頰前寸三頰車耳下八分針下關耳前動脈者頭維本神寸五取人迎喉傍大脈真水突在頸大筋下直至氣舍上人迎氣舍迎下挾天突缺盆橫骨陷中親氣戶俞府傍二寸至乳六寸又四分庫房屋翳膺窗近乳中正在乳頭心次有乳根出乳下各一寸六不相侵穴夾幽門一寸五是穴不容依法數其下承滿至梁門關門太乙從頭舉節次續排滑肉門各各一寸為君數天樞穴在夾臍傍外陵樞下一寸當二寸大巨五水道歸來七寸以尋將氣衝曲骨傍三寸來下氣衝脈中央髀關兔後六寸分伏兔市上三寸強陰市膝上三寸許梁丘二寸得共場膝臏䯒上尋犢鼻膝下三寸求三里里下三寸上廉地條口上廉下一寸下廉條下一寸系豐隆下廉外一寸上踝八寸分明記解谿衝陽後寸半衝陽陷上二寸系陷谷內庭後二寸內庭次指外間是厲兌大指次指端去爪如韭胃所起拇指內側隱白位大都節後陷中起太白核骨下陷中公孫節後一寸至商丘有穴屬經金踝下微前陷中是內踝三寸三陰交漏谷一寸有次第膝下五寸為地機陰陵內側膝輔際血海分明膝臏上內廉內際二寸地箕門血海上六寸筋間動脈須詳諦衝門五寸大橫下三寸三分尋府舍腹結橫下寸三分大橫挾臍非比假腹哀寸半去日月直與食竇相連亞食竇天谿及胸鄉周榮各一寸六者大包淵腋下三寸出九肋間當記也少陰心起極泉中腋下筋間脈入胸青靈肘節上三寸少海肘內節後容靈道掌後一寸半通理腕後一寸同陰郄五分取動脈神門掌後兌骨隆少府節後勞宮直小指內側取少衝手小指端為少澤前谷外側節前索節後陷中尋後谿腕骨陷前看外側腕中骨下陽谷討腕上一寸名養老支正腕後量五寸小海肘端五分好肩貞胛下兩骨解臑俞大骨之下保天宗骨下有陷中秉風髎後舉有空曲垣肩中曲胛陷外俞胛後一寸從肩中二寸大杼傍天窗頰下動脈詳天容耳下曲頰後顴髎面頄兌端量聽宮耳端大如菽此為小腸手太陽足太陽兮膀胱經目眥內角始睛明眉頭陷中攢竹名曲差二穴神庭伴五處挨排夾上星承光五處後寸半通天絡卻亦停勻玉枕橫夾於腦戶尺寸當準銅人經天柱夾項後髮際大筋外廉陷中是夾脊相去寸五分大杼大椎二風門肺俞三椎厥陰四心俞五椎之下論更有膈俞相梯級第七椎下隱然立第八椎下穴無有肝俞數椎當第九十椎膽俞脾十一十二椎下胃俞取三焦腎俞次第下十三十四兩椎主大腸俞在十六椎小腸十八椎下止十九椎下尋膀胱中膂內俞椎二十白環二十一椎當上髎次髎中與下一空二空夾腰胯並同夾脊四個髎載在千金君勿訝會陽陰尾兩旁分尺寸須看督脈分第二椎下外附分夾脊相去古法云先從脊後量三寸不是灸狹能傷筋魄戶三椎膏肓四四五三分分明是第五椎下索神堂第六譩譆兩穴出膈關第七魂門九陽綱意舍十十一胃倉肓門屈指彈椎看十二與十三志室次之為十四包肓十九合詳參秩邊二十椎下詳承扶臀陰紋中央殷門承扶六寸直浮郄一寸上委陽委陽卻與殷門並膕中外廉兩筋鄉委中膝膕約紋里此下三寸尋合陽承筋腨腸中央是承山腨下分肉傍飛陽外踝上七寸附陽踝上三寸量金門正在外踝下崑崙踝後跟骨中僕參跟骨下陷是申脈分明踝下容京骨外側大骨下束骨本節後陷中通谷本節前陷是至陰小指外側逢腎經起處有其所湧泉屈足卷指取然谷踝前大骨下踝後跟上太谿府谿下五分尋大鐘照海踝下陰蹺生踝上二寸復溜名溜前筋骨取交信亦曰踝上二寸行築賓六寸腨分處陰谷膝內著骨輔橫骨有陷如仰月大赫氣穴四滿據中注肓俞正夾臍六穴五寸各一數商曲石關上陰都通谷幽門一寸居幽門半寸挾巨闕步廊神封過靈墟神藏彧中至俞府各一寸六不差殊欲知俞府居何分璇璣之傍各二寸厥陰心包何處得乳後一寸天池索天泉腋下二寸求曲澤內紋尋動脈郄門去腕五寸通間使腕後三寸逢內關去腕才二寸大陵掌後兩筋中勞宮屈中名指取中指之末取中衝三焦名指外關衝小次指間名液門中渚次指本節後陽池表腕上陷存腕上二寸外關絡支溝腕上三寸約會宗腕後三寸空須詳一寸毋令錯肘前五寸臂大脈外廉陷中三陽絡四瀆骨外並三陽天井肘上一寸側肘上二寸清冷淵消濼臂外肘分索臑會肩頭三寸中肩髎肩端臑上通天髎盆上毖骨際天牖傍頸後天容翳風耳後當骨陷瘈脈耳後雞足逢顱𩔨耳後青絡脈角孫其廓開有空絲竹眉後陷中看和髎耳前兌發同耳門耳珠當耳缺此穴禁灸分明說少陽膽經髎起外耳前陷中尋聽會上關耳前開口空懸釐懸顱下廉揣懸顱正在曲角端頷厭懸顱上廉看曲鬢偃正尖上邊率谷曲鬢半寸安本神耳上入髮際四分平橫向前是曲鬢之旁各一寸陽白眉上一寸記臨泣有穴當兩目直入髮際五分屬目窗正營各一寸承靈營後寸五錄天衝耳上二寸居浮白髮際一寸符竅陰枕下動有穴完骨耳後四分通腦空正夾玉枕骨風池後髮際陷中肩井大骨前寸半淵液腋下三寸按輒筋平前卻一寸期門在肋第二端日月期下五分斷京門監骨腰間看帶脈季肋寸八分五樞帶下三寸間維道五寸三分得居髎八寸三分尋環跳髀樞宛宛論膝上五寸中瀆搜陽關陽陵上三寸陽陵膝下一寸求陽交外踝針七寸踝上七寸尋外丘光明除踝上五寸陽輔髁上四寸收懸鐘三寸即絕骨丘墟踝前陷中出臨泣寸半後夾谿地五會穴一寸求夾谿小次岐骨間竅陰足小次指端大敦拇指看毛聚行間縫尖動脈處節後有絡亙五會太衝之脈堪承據中封正在內踝前蠡溝踝上五寸注中都正在復溜宮陰陵膝尖兩折中內踝之上七寸詳少陰相直䯒骨中膝關犢鼻下二寸曲泉紋頭兩筋逢陰包四寸膝臏上內廉筋間索其當五里氣衝內寸半直下三寸陰股向陰廉穴在橫紋胯章門臍上二寸量橫取八寸看兩傍期門乳旁各一寸直下二寸二肋詳此足厥陰肝經鄉督脈齦交唇上鄉兌端正在唇中央水溝鼻下溝中索素髎宜向鼻端詳頭形北高面南下先以前後髮際量分為一尺有二寸發上五分神庭當庭上五分上星位囟會星上一寸強上至前頂上寸半寸半百會頂中央後頂強間腦戶三相去各是一寸五後發五分定啞門門上五分是風府上有大椎下尾骶分為二十有一椎古來自有折量法靈樞分明不可欺九寸八分分之七二之七節如是推大椎第一節上是二椎節下陶道知身柱第三椎節下神道第五不須疑靈臺第六至陽七筋縮第九椎下思脊中懸樞命門穴十一十三十四節陽關鎮住十六椎二十一下腰俞窺其下長強伏地取此穴針之痔根愈任脈會陰兩陰間曲骨臍下毛際安中極臍下四寸取三寸關元二石門氣海臍下一寸半陰交臍下一寸論分明臍內號神闕水分一寸復上列下脘建里中上脘各各一寸為君說巨闕上脘上寸半鳩尾蔽骨五分按中庭膻中寸六分膻中兩乳中間看玉堂紫宮及華蓋相去各寸六分算華蓋璇璣一寸量璇璣突下一寸當天突結下宛宛取廉泉頷下骨尖傍承漿頤前唇稜下任脈之部宜審詳上十四經步穴歌原用銅人穴編葉今以十四經發揮為主有繁多者皆去之如督俞風市羊矢之類是也十二經脈歌手太陰肺中焦生下絡大腸出賁門上鬲屬肺從肺系系橫出腋臑中行肘臂寸口生魚際大指內側爪甲根支絡還從腕內出接次指屬陽明經此經多氣而少血是動則病咳與嗽肺脹膨膨缺盆痛兩手交瞀為臂厥所生病者為氣嗽喘咳煩心胸滿結臑臂之外前廉痛小便頻數掌中熱氣虛肩背痛而寒氣盛亦疼風汗出欠伸少氣不足息遺失無度溺色赤陽明之脈手大腸次指內側起商陽循指上連出合谷兩筋岐骨循臂肪入肘外廉循臑外肩端前廉柱骨旁從肩下入缺盆內絡肺下鬲屬大腸支從缺盆直上頸斜貫頰前下齒當環出人中交左右上夾鼻孔注迎香此經氣盛血亦盛是動䪼腫並齒痛所生病者為鼽衄目黃口乾喉痹生大指次指難為用肩前臑外痛相仍氣有餘兮脈熱腫虛則寒慄病偏增胃足陽明交鼻起下循鼻外下入齒還出夾口繞承漿頤後大迎頰車裡耳前髮際至額顱支下人迎缺盆底下鬲入胃絡脾宮直者缺盆下乳內一支幽門循腹中下行直合氣沖逢遂由髀關抵膝臏䯒跗中指內關同一支下膝注三里前出中指外關通一支別走足跗指大指之端經盡矣此經多氣復多血是動欠伸面顏黑悽悽惡寒畏見人忽聞木音心驚惕登高而歌棄衣走甚則腹脹乃賁響凡此諸疾皆骭厥所生病者為狂瘧溫淫汗出鼻流血口喎唇裂又喉痹膝臏疼痛腹脹結氣膺伏兔䯒外廉足跗中指俱痛徹有餘消穀溺色黃不足身前寒振慄胃房脹滿食不消氣盛身前皆有熱太陰脾起足大指上循內側白肉際核骨之後內髁前上腨循䯒脛膝里股內前廉入腹中屬脾絡胃與鬲通俠喉連舌散舌下支絡從胃注心宮此經氣盛而血衰是動其病氣所為食入即吐胃脘痛更兼身體痛難移腹脹善噫舌本強得後與氣快然衰所生病者舌亦痛體重不食亦如之煩心心下仍急痛泄水溏瘕寒瘧隨不臥強立股膝腫疸發身黃大指痿手少陰脈起心中下鬲直與小腸通支者還從肺系走直上喉嚨系目瞳直者上肺出腋下臑後肘內少海從臂內後廉抵掌中兌骨之端注少衝多氣少血屬此經是動心脾痛難任渴欲飲水咽乾燥所生脅痛目如金脅臂之內後廉痛掌中有熱向經尋手太陽經小腸脈小指之端起少澤循手外廉出踝中循臂骨出肘內側上循肘外出後廉直過肩解繞肩胛交肩下入缺盆內向腋絡心循咽嗌下鬲抵胃屬小腸一支缺盆貫頸頰至目兌眥卻入耳復從耳前仍上頰抵鼻外至目內眥斜絡於顴別絡接此經少氣還多血是動則病痛咽嗌頷下腫兮不可顧肩如拔兮臑似折所生病兮主肩臑耳聾目黃腫腮頰肘臂之外後廉痛部分猶當細分別足太陽經膀胱脈目內眥上起額尖支者巔上至耳角直者從巔腦後懸絡腦還出別下項仍循肩膊俠脊邊抵腰膂腎膀胱內一支下與後陰連貫臀斜入委中穴一支膊內左右別貫胛夾脊過髀樞臀內後廉膕中合下貫腨內外踝後京骨之下指外側是經血多氣少也是動頭疼不可當項如拔兮腰似折髀樞痛徹脊中央膕如結兮腨如裂是為髁厥筋乃傷所生瘧痔小指廢頭囟項痛目色黃腰尻膕腳疼連背淚流鼻衄及癲狂足經腎脈屬少陰小指斜趨湧泉心然谷之下內踝後別入跟中腨內侵出膕內廉上股內貫脊屬腎膀胱臨直者屬腎貫肝鬲入肺循喉舌本尋支者從肺絡心內仍至胸中部分深此經多氣而少血是動病飢不欲食喘嗽唾血喉中鳴坐而欲起面如垢目視䀮䀮氣不足心懸如飢常惕惕所生病者為舌乾口熱咽痛氣賁逼股內後廉並脊疼心胸煩痛疸而澼痿厥嗜臥體怠惰足下熱痛皆腎厥手厥陰心主起胸屬包下鬲三焦宮支者循胸出脅下脅下連腋三寸同仍上抵腋循臑內太陰少陰兩經中指透中衝支者別小指次指絡相通是經少氣原多血是動則病手心熱肘臂攣急腋下腫甚則胸脅支滿結心中淡淡或大動善笑目黃面赤色所生病者為心煩心痛掌熱病之則手經少陽三焦脈起自小指次指端兩指岐骨手腕表上出臂外兩骨間肘後臑外循肩上少陽之後交別傳下入缺盆膻中分散絡心包膈里穿支者膻中缺盆上上項耳後耳角旋屈下至頤仍注頰一支出耳入耳前卻從上關交曲頰至目外眥乃盡焉斯經少血還多氣是動耳鳴喉腫痹所生病者汗自出耳後痛兼目銳眥肩臑肘臂外皆疼小指次指亦如廢足脈少陽膽之經始從兩目銳眥生抵頭循角下耳後腦空風池次第行手少陽前至肩上交少陽右上缺盆支者耳後貫耳內出走耳前銳眥循一支銳眥大迎下合手少陽抵項根下加頰車缺盆合入胸貫膈絡肝經屬膽仍從脅裡過下入氣衝毛際榮橫入髀厭環跳內直者缺盆下腋膺過季脅下髀厭內出膝外廉是陽陵外輔絕骨踝前過足跗小指次指分一支別從大指去三毛之際接肝經此經多氣而少血是動口苦善太息心脅疼痛難轉移面塵足熱體無澤所生頭痛連銳眥缺盆腫痛並兩腋馬刀挾癭生兩傍汗出振寒㾬瘧疾胸脅髀膝至䯒骨絕骨踝痛及諸節厥陰足脈肝所終大指之端毛際叢足跗上廉太衝分踝前一寸入中封上踝交出太陰後循膕內廉陰股沖環繞陰器抵小腹夾胃屬肝絡膽逢上貫膈里布脅肋俠喉頏顙目系同脈上巔會督脈出支者還生目系中下絡頰裡還唇內支者便從膈肺通是經血多氣少焉是動腰疼俯仰難男疝女人小腹腫面塵脫色及咽乾所生病者為胸滿嘔吐洞泄小便難或時遺溺並狐疝臨證還須仔細看奇經八脈歌督脈起自下極俞並於脊裡上風府過腦額鼻入齦交為陽脈海都綱要任脈起於中極底上腹循喉承漿里陰脈之海任所謂衝脈出包循脊中從腹會咽絡口唇女人成經為血室脈並少陰之腎經與任督本於陰會三脈並起而異行陽蹺起足之跟里循外踝上入風池陰蹺內踝循喉嗌本足陽陰脈別支諸陰交起陰維脈發足少陰築賓郄諸陽會起陽維脈太陽之郄金門是帶脈周迴季脅間會於維道足少陽所謂奇經之八脈維繫諸經乃順常流注指微賦疾居榮衛扶救者針觀虛實與肥瘦辨四時之淺深取穴之法但分陰陽而谿谷迎隨逆順須曉血氣而升沉原夫指微論中賾義成賦知本時之氣開說經絡之流注每披文而參其法篇篇之旨審尋覆按經而察其言字字之功明諭疑隱皆知實虛總附移疼住痛之有神針下獲安暴疾沉疴至危篤刺之勿誤詳夫陰日血引值陽氣留口溫針陽日氣引逢陰血暖牢寒濡深求諸經十二作數絡脈十五為周陰俞六十藏主陽穴七二府收刺陽經者可臥針而取奪血絡者先俾指而柔逆為迎而順為隨呼則瀉而吸則補淺恙新疴用針之因淹疾延患著灸之由躁煩藥餌而難拯必取八會癰腫奇經而畜邪殲馘砭瘳況乎甲膽乙肝丁火壬水生我者號母我生者名子春井夏滎乃邪在秋經冬合方刺矣犯禁忌而病復用日衰而難已孫絡在於肉分血行出於支里悶昏針運經虛補絡須然疼實癢虛瀉子隨母要指想夫先賢迅效無出於針今人愈疾豈難於醫徐文伯瀉孕於苑內斯由甚速範九思療咽於江夏聞見言希大抵古今遺蹟後世皆師王纂針魅而立康獺從彼出秋夫療鬼而獲效魂免傷悲既而感指幽微用針真訣孔竅詳於筋骨肉分刺要察於久新腑臟寒熱接氣通經短長依法裡外之絕羸盈必別勿刺大勞使人氣亂而神隳慎妄呼吸防他針昏而閉血又以常尋古義由有臧機遇高賢真趣則超然得悟逢達人示教則表我扶危男女氣脈行分時合度養子時刻注穴須依今詳定療病之宜神針法式廣搜難素之秘密文辭深考諸家之肘函妙臆故稱廬江流注之指微以為後學之模規上流注指微賦竇桂芳撰次今自子午流注針經輯錄於此標幽賦拯救之法妙用者針察歲時於天道定形氣於予心春夏瘦而刺淺秋冬肥而刺深不窮經絡陰陽多逢刺禁既論臟腑虛實須向經尋原夫起自中焦水初下漏太陰為始至厥陰而方終穴出雲門抵期門而最後正經十二別絡走三百餘支正側仰伏氣血有六百餘候手足三陽手走頭而頭走足手足三陰足走腹而胸走手要識迎隨須明逆順況乎陰陽氣血多少為最厥陰太陽少氣多血太陰少陰少血多氣而又氣多血少者少陽之分氣盛血多者陽明之位先詳多少之宜次察應至之氣輕滑慢而未來沉澀緊而已至既至也量寒熱而留疾未至也據虛實而候氣氣之至也如魚吞鉤餌之浮沉氣未至也如閒處幽堂之深邃氣速至而速效氣遲至而不治觀夫九針之法毫針最微七星上應眾穴主持本形金也有蠲邪扶正之道短長水也有決凝開滯之機定刺象木或邪或正口藏比火進陽補羸循機捫塞以象土實應五行而可知然是三寸六分包含妙理雖細楨於毫髮同貫多岐可平五臟之寒熱能調六腑之虛實拘攣閉塞遣八邪而去矣寒熱痛痹開四關而已之凡刺者使本神朝而後入既刺也使本神定而氣隨神不朝而勿刺神已定而可施定腳處取氣血為主意下手處認水木是根基天地人三才也湧泉同璇璣百會上中下三部也大包與天樞地機陽蹺陽維並督帶主肩背腰腿在表之病陰蹺陰維任衝脈主心腹脅肋在裡之疑二陵二蹺二交似續而交五大兩間兩商兩井相依而別兩支足見取穴之法必有分寸先審自意次觀肉分伸屈而得之或平直而安定在陽部筋骨之側陷下為真在陰分郄膕之間動脈相應取五穴用一穴而必端取三經用一經而可正頭部與肩部詳分督脈與任脈異一作易定明標與本論刺深刺淺之經住痛移疼取相交相貫之徑豈不聞臟腑病而求門海俞募之微經絡滯而求原別交會之道更窮四根三結依標本而刺無不痊但用八法五門分主客而針無不效八脈始終連八會本是紀綱十二經絡十二原是謂樞要一日取六十六穴之法方見幽微一時取一十二經之原始知要妙原夫補瀉之法非呼吸而在手指速效之功要交正而識本經交經繆刺左有病而右畔取瀉絡遠針頭有病而腳上針巨刺與繆刺各異微針與妙刺相通觀部分而知經絡之虛實視浮沉而辨臟腑之寒溫且夫先令針耀而慮針損次藏口內而欲針溫目無外視手如握虎心無內慕如待貴人左手重而多按欲令氣散右手輕而徐入不痛之因空心恐怯直立側而多暈背目沉掐坐臥平而沒昏推於十干十變知孔穴之開闔論其五行五臟察時日之旺衰伏如橫弩應若發機陰交陽別而定血暈陰蹺陽維而下胎衣痹厥偏枯迎隨俾經絡接續漏崩帶下溫補使氣血依歸靜以久留停針待之必准者取照海治喉中之閉塞端的處用大鐘治心內之呆癡大抵疼痛實瀉癢麻虛補體重節痛而俞居心下痞滿而井主心脹咽痛針太衝而必除脾冷胃疼瀉公孫而立愈胸滿腹痛刺內關脅疼肋痛針飛虎筋攣骨痛而補魂門體熱勞嗽而瀉魄戶頭風頭痛刺申脈與金門眼癢眼疼瀉光明於地五瀉陰郄止盜汗治小兒骨蒸刺偏歷利小便醫大人水蠱中風環跳而宜刺虛損天樞而可取由是午前卯後太陰生而疾溫離左酉南月朔死而速冷循捫彈怒留吸母而堅長爪下伸提疾呼子而噓短動退空歇迎奪右而瀉涼推內進搓隨濟左而補暖慎之大患危疾色脈不順而莫針寒熱風陰飢飽醉勞而切忌望不補而晦不瀉弦不奪而朔不濟精其心而窮其法無灸艾而壞其皮正其理而求其原免投針而失其位避灸處而加四肢四十有九禁刺處而除六腧二十有二抑又聞高皇抱疾未瘥李氏刺巨闕而復甦太子暴死為厥越人針維會而復醒肩井曲池甄權刺臂痛而復射懸鐘環跳華佗刺躄足而立行秋夫針腰俞而鬼免沉疴王纂針交俞而妖精立出取肝俞與命門使瞽士視秋毫之末刺少陽與交別俾聾夫聽夏蚋之聲嗟夫去聖愈遠此道漸墜或不得意而散其學或愆其能而犯禁忌愚庸智淺難契於玄言至道淵深得之者有幾偶述斯言不敢示諸明達者焉庶幾乎童蒙之心啟上標幽賦竇漢卿所撰今自針經指南表錄於此通玄指要賦必欲治病莫如用針巧運神機之妙工開聖理之深外取砭針能蠲邪而輔正中含水火善回陽而倒陰原夫絡別支殊經交錯綜或溝渠谿谷以岐異或山海丘陵而隙共斯流派以難揆在條綱而有統理繁而昧縱補瀉以何功法捷而明自迎隨而得用且如行步難移太衝最奇人中除脊膂之強痛神門去心性之呆癡風傷項急始求於風府頭暈目眩要覓於風池耳閉須聽會而治也眼痛則合谷以推之胸結身黃取湧泉而即可腦昏目赤瀉攢竹以便宜但見兩肘之拘攣仗曲池而平掃四肢之懈惰憑照海以消除牙齒痛呂細堪治頸項強承漿可保太白宣導於氣衝陰陵開通於水道腹䐜而脹奪內庭以休遲筋轉而疼瀉承山而在早大抵腳腕痛崑崙解愈股膝痛陰市能醫癇發癲狂兮憑後谿而療理瘧生寒熱兮仗間使以扶持期門罷胸滿血膨而可已勞宮退胃翻心痛以何疑稽夫大敦去七疝之偏墜王公謂此三里卻五勞之羸瘦華佗言斯固知腕骨祛黃然谷瀉腎行間治膝腫腰疼尺澤去肘疼筋緊目昏不見二間宜取鼻窒無聞迎香可引肩井除兩胛難任絲竹空療偏頭疼不忍咳嗽寒痰列缺堪憑眵䁾冷淚臨泣尤准髖骨將腿疼以祛殘腎俞把腰疼而瀉盡以見越人治屍厥於維會隨手而蘇文伯瀉死胎於三陰應針而隕所謂諸痛為實但麻曰虛實則自外而入也虛則自內而出歟是故濟母而裨其不足奪子而平其有餘觀二十七之經絡一一明辨據四百四之疾證件件皆除故得夭枉都無躋斯民於壽域幾微以判彰往古之玄書抑又聞心胸病求掌後之大陵肩背疼責肘前之三里冷痹腎敗取足陽明之土連臍腹痛瀉足少陰之水脊間心後者針中渚而立痊脅下肋邊者刺陽陵而即止頭項痛擬後谿以安然腰腳疼在委中而已矣夫用針之士於此理苟能明焉收祛邪之功而在乎捻指上流注指要賦羅謙甫謂竇子聲裁就今自衛生寶鑑表錄於此所可疑者舊注牙齒痛呂細堪治云呂細膀胱經一名太谿今按資生經千金銅人俱無太谿為呂細別名而太谿為足少陰腎經非膀胱經也靈光賦黃帝岐伯針灸訣依他經里分明說三陰三陽十二經更有兩經分八脈靈光典注極幽深偏正頭疼瀉列缺睛明治眼胬肉攀耳聾氣否聽會間兩鼻鼻翁衄針禾髎鼻窒不聞迎香間治氣上壅足三里天突宛中治喘痰心疼手顫針少海少澤應除心下寒兩足拘攣覓陰市五般腰痛委中安脾俞不動瀉丘墟復溜治腫如神醫犢鼻治療風邪疼住喘腳痛崑崙愈後跟痛在僕參求承山筋轉並久痔足掌下去尋湧泉此法千金莫妄傳此穴多治婦人疾男蠱女孕兩病痊百會鳩尾治痢疾大小腸俞大小便氣海血海療五淋中脘下脘治腹堅傷寒過經期門愈氣刺兩乳求太淵大敦二穴主偏墜水溝間使治邪癲吐血定喘補尺澤地倉能止兩流涎勞宮醫得身勞倦水腫水分灸即安五指不伸中渚取頰車可針牙齒愈陰蹺陽蹺兩踝邊腳氣四穴先尋取陰陽陵泉亦主之陰蹺陽蹺與三里諸穴一般治腳氣在腰玄機宜正取膏肓豈止治百病灸則玄切病須愈針灸一穴數病除學者尤宜加仔細悟得明師流注法頭目有病針四肢針有補瀉明呼吸穴應五行順四時悟得人身中造化此歌依舊是筌蹄上靈光賦總靈光典注而成不知誰氏所作今自針灸大全表錄於此席弘賦凡欲行針須審穴要明補瀉迎隨訣胸背左右不相同呼吸陰陽男女別氣刺兩乳求太淵未應之時瀉列缺列缺頭疼及偏正重瀉太淵無不應耳聾氣否聽會針迎香穴瀉功如神誰知天突治喉風虛喘須尋三里中手連肩脊痛難忍合谷針時要太衝曲池兩手不如意合谷下針宜仔細心疼手顫少海間若要除根覓陰市但患傷寒兩耳聾金門聽會疾如風五般肘痛尋尺澤太淵針後卻收功手足上下針三里食癖氣塊憑此取鳩尾能治五般癇若下湧泉人不死胃中有積刺璇璣三里功多人不知陰陵泉治心胸滿針到承山飲食思大杼若連長強尋小腸氣痛即行針委中專治腰間痛腳膝腫時尋至陰氣滯腰疼不能立橫骨大都宜救急氣海專能治五淋更針三里隨呼吸期門穴主傷寒患六日過經猶未汗但向乳根二肋間又治婦人生產難耳內蟬鳴腰欲折膝下明存三里穴若能補瀉五會間且莫向人容易說睛明治眼未效時合谷光明安可缺人中治癲功最高十三鬼穴不須饒水腫水分兼氣海皮內隨針氣自消冷嗽先宜補合谷卻須針瀉三陰交牙疼腰痛並咽痹二間陽谿疾怎逃更有三間腎俞妙善除肩背浮風勞若針肩井須三里不刺之時氣未調最是陽陵泉一穴膝間疼痛用針燒委中腰痛腳攣急取得其經血自調腳痛膝腫針三里懸鐘二陵三陰交更向太衝須引氣指頭麻木自輕飄轉筋目眩針魚腹承山崑崙立便消肚疼須是公孫妙內關相應必然瘳冷風冷痹疾難愈環跳腰俞針與燒風府風池尋得到傷寒百病一時消陽明二日尋風府嘔吐還須上脘療婦人心痛心俞穴男子痃癖三里高小便不禁關元好大便閉澀大敦燒腕骨腿疼三里瀉復溜氣滯便離腰從來風府最難針卻用工夫度淺深倘若膀胱氣未散更宜三里穴中尋若是七疝小腹痛照海陰交曲泉針又不應時求氣海關元同瀉效如神小腸氣撮痛連臍速瀉陰交莫在遲良久湧泉針取氣此中玄妙少人知小兒脫肛患多時先灸百會次鳩尾久患傷寒肩背痛但針中渚得其宜肩上痛連臍不休手中三里便須求下針麻重即須瀉得氣之時不用留腰連胯痛急必大便於三里攻其隘下針一瀉三補之氣上攻噎只管住噎不住時氣海灸定瀉一時立便瘥補自卯南轉針高瀉從卯北莫辭勞逼針瀉氣令須吸若補隨呼氣自調左右捻針尋子午抽針行氣自迢迢用針補瀉分明說更用搜窮本與標咽喉最急先百會太衝照海及陰交學者潛心宜熟讀席弘治病最名高上席弘賦自針灸大全中表錄於此按席弘江西人家世以針灸相傳者玉龍賦夫參博以為要輯簡而舍煩總玉龍以成賦信金針以獲安原夫卒暴中風頂門百會腳氣連延里絕三交頭風鼻淵上星可用耳聾腮腫聽會偏高攢竹頭維治目疼頭痛乳根腧府療氣嗽痰哮風市陰市驅腿腳之乏力陰陵陽陵除膝腫之難熬二白醫痔漏間使剿瘧疾大敦去疝氣膏肓補虛勞天井治瘰癧癮疹神門治呆癡笑咷咳嗽風痰太淵列缺宜刺尫羸喘促璇璣氣海當知期門大敦能治堅痃疝氣勞宮大陵可療心悶瘡痍心悸虛煩刺三里時疫㾬瘧尋後谿絕骨三里陰交腳氣宜此睛明太陽魚尾目證憑茲老者便多命門兼腎俞而著艾婦人乳腫少澤與太陽之可推身柱蠲嗽能除膂痛至陽卻疸善治神疲長強承山灸痔最妙豐隆肺腧痰嗽稱奇風門主傷冒寒邪之嗽天樞理感患脾泄之危風池絕骨而療乎傴僂人中曲池可治其痿傴期門刺傷寒未解經不再傳鳩尾針癇癲已發慎其妄施陰交水分三里蠱脹宜刺商丘解谿丘墟腳痛堪追尺澤理筋急之不用腕骨療手腕之難移肩脊痛兮五樞兼於背縫肘攣疼兮尺澤合於曲池風濕搏於兩肩肩髃可療壅熱盛乎三焦關衝最宜手臂紅腫中渚液門要辨脾虛黃疸腕骨中脘何疑傷寒無汗攻復溜宜瀉傷寒有汗取合谷當隨欲調飽滿之氣逆三里可勝要起六脈之沉匿復溜稱神照海支溝通大便之秘內庭臨泣理小腹之䐜天突膻中醫喘嗽地倉頰車療口喎迎香攻鼻窒為最肩井除臂痛如拿二間治牙疼中魁理翻胃而即瘥百勞止虛汗通里療心驚而即瘥大小骨空治眼爛能止冷淚左右太陽醫目疼善除血翳心俞腎俞治腰腎虛乏之夢遺人中委中除腰脊痛閃之難制太谿崑崙申脈最療足腫之迍湧泉關元豐隆為治屍勞之例印堂治其驚搐神庭理乎頭風大陵人中頻瀉口氣全除帶脈關元多灸腎敗堪攻腿腳重疼針髖骨膝關膝眼行步艱楚刺三里中封太衝取內關於照海醫腹疾之塊搐迎香於鼻內消眼熱之紅肚痛秘結大陵合外關於支溝腿風濕痛居髎兼環跳於委中上脘中脘治九種之心痛赤帶白帶求中極之異同又若心虛熱壅少衝明於濟奪目昏血溢肝俞辨其實虛當心傳之玄要究手法之疾徐或值挫閃疼痛之不定此為難擬定穴之可祛輯管見以便誦讀幸高明而無哂諸俗以玉龍歌為扁鵲所撰蓋後人依託為之者玉龍賦又總輯其要旨爾攔江賦擔截之中法數何有擔有截起沉疴我今作此攔江賦何用三車五幅歌先將八法為定例流注之中分次第心胸之病內關擔臍下公孫用法攔頭部須還尋列缺痰涎壅塞及咽乾噤口喉風針照海三稜出血刻時安傷寒在表並頭痛外關瀉動自然安眼目之證諸疾苦更用臨泣使針擔後谿專治督脈病癲狂此穴治還輕中脈能除寒與熱頭風偏正及心驚耳鳴鼻衄胸中滿好用金針此穴尋但遇癢麻虛即補如逢疼痛瀉而迎更有傷寒真妙訣三陰須要刺陽經無汗更將合谷補復溜穴瀉好用針倘若汗多流不絕合谷補收效如神四日太陰宜細辨公孫照海一般行再用內關施截法七日期門可用針但治傷寒皆用瀉要知素問坦然明流注之中分造化常將木火土金平水數虧兮宜補肺水之氾濫土能平春夏井滎宜刺淺秋冬經合更宜深天地四時同此數三才常用記心胸天地人部次第入仍調各部一般勻夫弱婦強亦有克婦弱夫強亦有刑皆在本經擔與截瀉南補北亦須明經絡明時知造化不得師傳枉用心不遇至人應不授天寶豈可付非人按定氣血病人呼重搓數十把針扶戰提搖起向上使氣自流行病自無上攔江賦不知誰氏所作今自淩氏所編集寫本針書表錄於此肘後歌頭面之疾針至陰腿腳有疾風府尋心胸有病少府瀉臍腹有病曲泉針肩背諸疾中渚下腰膝強痛交信憑脅肋腿痛後谿妙股膝腫起瀉太衝陰核發來如升大百會妙穴真可駭頂心頭痛眼不開湧泉下針定安泰鶴膝腫勞難移步尺澤能舒筋骨疼更有一穴曲池妙根尋源流可調停其患若要便安愈加以風府可用針更有手臂拘攣急尺澤刺深去不仁腰背若患攣急風曲池一寸五分攻五痔原因熱血作承山須下病無蹤哮喘發來寢不得豐隆刺入三分深狂言盜汗如見鬼惺惺間使便下針骨寒髓冷火來燒靈道妙穴分明記瘧疾寒熱真可畏須知虛實可用意間使宜透支溝中大椎七壯合聖治連日頻頻發不休金門刺深七分是瘧疾三日得一發先寒後熱無他語寒多熱少取復溜熱多寒少用間使或患傷寒熱未休牙關風壅藥難投項強反張目直視金針用意列缺求傷寒四肢厥逆冷脈氣無時仔細看神奇妙穴真有二復溜半寸順骨行四肢回還脈氣浮須曉陰陽倒換求寒則須補絕骨是熱則絕骨瀉無憂脈若浮洪當瀉解沉細之時補便瘳百合傷寒最難醫妙法神針用意推口噤眼合藥不下合谷一針效甚奇狐惑傷寒滿口瘡須下黃連犀角湯蟲在臟腑食肌肉須要神針刺地倉傷寒腹痛蟲尋食吐蛔烏梅可難攻十日九日必定死中脘回還胃氣通傷寒痞氣結胸中兩目昏黃汗不通湧泉妙穴三分許速使周身汗自通傷寒痞結脅積痛宜用期門見深功當汗不汗合谷瀉自汗發黃復溜憑飛虎一穴通痞氣祛風引氣使安寧剛柔二痓最乖張口噤眼合面紅妝熱血流入心肺府須要金針刺少商中滿如何去得根陰包如刺效如神不論老幼依法用須教患者便抬身打撲傷損破傷風先於痛處下針攻後向承山立作效甄權留下意無窮腰腿疼痛十年春應針不了便惺惺大都引氣探根本服藥尋方枉費金腳膝經年痛不休內外踝邊用意求穴號崑崙並呂細應時消散即時瘳風痹痿厥如何治大杼曲泉真是妙兩足兩脅滿難伸飛虎神針七分到腰軟如何去得根神妙委中立見效百證賦百證俞穴再三用心囟會連於玉枕頭風療以金針懸顱頷厭之中偏頭痛止強間豐隆之際頭痛難禁原夫面腫虛浮須仗水溝前頂耳聾氣閉全憑聽會翳風面上蟲行有驗迎香可取耳中蟬噪有聲聽會堪攻目眩兮支正飛揚目黃兮陽綱膽俞攀睛攻少澤肝俞之所淚出刺臨泣頭維之處目中漠漠即尋攢竹三間目覺䀮䀮急取養老天柱觀其雀目肝氣睛明行間而細推審他項強傷寒溫溜期門而主之廉泉中衝舌下腫疼堪取天府合谷鼻中衄血宜追耳門絲竹空住牙疼於頃刻頰車地倉穴正口喎於片時喉痛兮液門魚際云療轉筋兮金門丘墟來醫陽谷俠谿頷腫口噤並治少商曲澤血虛口渴同施通天去鼻內無聞之苦復溜祛舌乾口燥之悲啞門關衝舌緩不語而要緊天鼎間使失音囁嚅而休遲太衝瀉唇喎以速愈承漿瀉牙疼而即移項強多惡風束骨相連於天柱熱病汗不出大都更接於經渠且如兩臂頑麻少海就傍於三里半身不遂陽陵遠達於曲池建里內關掃盡胸中之苦悶聽宮脾俞祛殘心下之悲悽久知脅肋疼痛氣戶華蓋有靈腹內腸鳴下脘陷谷能平胸脅支滿何療章門不容細尋膈疼飲蓄難禁亶中巨闕便針胸滿更加噎塞中府意舍所行胸膈停留瘀血腎俞巨髎宜徵胸滿項強神藏璇璣已試背連腰痛白環委中曾經脊強兮水道筋縮目瞤兮顴髎大迎痓病非顱𩔨而不愈臍風須然谷而易醒委陽天池腋腫針而速散後谿環跳腿疼刺而即輕夢魘不寧厲兌相諧於隱白發狂奔走上脘同起於神門驚悸怔忡取陽交解谿勿誤反張悲哭仗天衝大橫須精癲疾必身柱本神之令發熱仗少衝曲池之津歲熱時行陶道復求肺俞理風癇常發神道還須心俞寧濕寒濕熱下髎定厥寒厥熱湧泉清寒慄惡寒二間疏通陰郄暗煩心嘔吐幽門開徹玉堂明行間湧泉主消渴之腎竭陰陵水分去水腫之臍盈癆瘵傳屍趨魄戶膏肓之路中邪霍亂尋陰谷三里之程治疸消黃諧後谿勞宮而看倦言嗜臥往通里大鐘而明咳嗽連聲肺俞須迎天突穴小便赤澀兌端獨瀉太陽經刺長強於承山善主腸風新下血針三陰於氣海專司白濁久遺精且如肓俞橫骨瀉五淋之久積陰郄後谿治盜汗之多出脾虛谷以不消脾俞膀胱俞覓胃冷食而難化魂門胃俞堪責鼻痔必取齦交癭氣須求浮白大敦照海患寒疝而善蠲五里臂臑生癧瘡而能治至陰屏翳療癢疾之疼多肩髃陽谿消癮風之熱極抑又論婦人經事改常自有地機血海女子少氣漏血不無交信合陽帶下產崩衝門氣衝宜審月潮違限天樞水泉細詳肩井乳癰而極效商丘痔瘤而最良脫肛趨百會尾翠之所無子搜陰交石關之鄉中脘主乎積痢外丘收乎大腸寒瘧兮商陽太谿驗痃癖兮衝門血海強夫醫乃人之司命非志士而莫為針乃理之淵微須至人之指教先究其病源後攻其穴道隨手見功應針取效方知玄里之玄始達妙中之妙此篇不盡略舉其要右肘後百證二賦不知誰氏所作辭頗不及於指微標幽曰百證者宜其曲盡百般病證針刺也而病名至多亦有所遺焉天元太乙歌先師秘傳神應經太乙通玄法最靈句句言辭多典妙萬兩黃金學也輕每每不忘多效驗治病如神記在心口內將針多溫暖便觀患者審浮沉陰病用陽陽用陰分明便取陰陽神虛則宜補實宜瀉氣應真時病絕根氣至如擺獨龍尾未至停針宜待氣凡用行針先得訣席弘玄妙分明說氣刺兩乳求太淵未應之時列缺針列缺頭疼及偏正重瀉太淵無不應耳聾氣閉翳風穴喘綿綿尋三里中手攣腳背疼難忍合骨仍須瀉太衝曲池主手不如意合谷針時宜仔細心疼手顫少海間欲要除根針陰市若是傷寒兩耳聾耳門聽會疾如風五般肘疼針尺澤冷淵一刺有神功手三里兮足三里食痞氣塊兼能治鳩尾獨治五般癇若刺湧泉人不死大凡痃痞最宜針穴法從來著意尋以手按痃無轉動隨深隨淺向中心胃中有積取璇璣三里功深人不知陰陵泉主胸中滿若刺承山飲食宜大權若連長強取小腸氣疼立可愈氣衝妙手要推尋管取神針人見許委中穴主腰疼痛足膝腫時尋至陰乾溼風毒並滯氣玄機如此更尤深氣攻腰痛不能立橫骨大都宜救急流血攻註解若遲變為風證從此得氣海偏能治五淋若補三里效如神冷熱兩般皆治得便濁痼疾可除根期門穴主傷寒患七日過經尤未汗但於乳下雙肋間刺入四分人力健耳內蟬鳴腰欲折膝下分明三里穴若能補瀉五會中切莫逢人容易說牙風頭痛孰能調二間妙穴莫能逃更有三間神妙穴若治肩背感風勞合谷下針順流注脾內隨針使氣朝冷病還須針合谷只宜腳下瀉陰交背脊俱疼針肩井不瀉三里令人悶兩臂並胛俱疼痛金針一刺如聖神腳膝疼痛委中宜更兼攣急鋒針施陰陵泉穴如尋得輕行健步疾如飛腰腹脹滿治何難三里腨肚針承山更向太衝行補瀉指頭麻木一時安頭痛轉筋魚腹肚又治背疽及便毒再有妙穴陽陵泉腿轉筋急如神取腸中疼痛陰陵沃耳內蟬鳴聽會招更尋妙穴太谿是醫門行瀉實為高浮沉腹脹水分瀉氣喘息粗瀉三里更於膝中陰谷針小便淋漓皆消盡環跳能除腿股風冷風膝痹瘧疾同最好風池尋的穴間使雙刺有神功傷寒一日調風府少陽二穴風池取三五七日病過經依此針之無不應心疼嘔吐上脘宜豐隆兩穴更無疑蛔蟲並出傷寒病金針宜刺顯明醫男子痃癖取少商女人血氣陰交當虛盜二汗須宜補委中妙穴可傳揚項強腫痛屈伸難更兼體重腰背癱宜向束骨三里取教君頃刻便開顏閃挫脊膂腰難轉舉步多難行重蹇遍體遊氣生虛浮復溜一刺人健羨久患腰痛背胛勞但尋中注穴中調行針用心須尋覓管取從今見識高腰背連臍痛不休手中三里穴堪求神針未出急須瀉得氣之時不用留小腹便澼最難醫氣海中極間使宜三里更須明補瀉下針斷不失毫釐上天元太乙歌臞仙所撰今自神應經表錄於此銅人指要賦行針之士要辨浮沉脈明虛實針別淺深經脈絡脈之別巨刺繆刺之分經絡閉塞須用砭針疏導臟腑寒溫必明淺深補瀉經氣之正自有常數漏水百刻五十度周經絡流注各應其時先脈訣病次穴蠲疴左手掐穴右手置針刺榮無傷衛刺衛無傷榮氣悍則針小而入淺氣澀則針大而入深氣滑出疾氣澀出遲深則欲留淺則欲疾候其氣至必辨於針徐而疾者實實而遲者虛虛則實之滿則泄之菀陳則除之邪勝則虛之刺虛者須其實刺實者須其虛經氣已至慎守勿失謹守其法勿更變也賊邪新客未有定處推之則前引之則止其來不可逢其往不可追損其有餘補其不足先去血脈而後調之無問其病以平為期若有若無若得若失五臟以定九候以備診脈病明行針病愈眾脈不見眾凶不聞外內相得無以形先可玩往來乃施於人手動若務針耀而勻伏如橫弩起如發機見其鳥鳥見其稷稷從見其飛不知其誰靜意是義觀適之變是謂冥冥莫知其形如臨深淵手如握虎如待所貴不知日暮其氣已至適而自護五虛勿近五實不遠捫而循之切而散之推而按之彈而怒之爪而下之通而取之陰募在腹陽俞在背藏病取原府病取合藏俞治臟病府募治腑病出入導氣補瀉同精善行水者不能注水善穿水者不能鑿凍權衡以平氣口成寸以決死生飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱食氣入胃散精於肝淫氣於筋食氣入胃濁氣歸心淫精於肺五勞五痹九氣七情六淫六腑九竅九州四氣三因傷風傷寒雜病奇病婦人小兒盛則瀉之虛則補之不盛不虛以經取之上銅人指要賦多取內經詞語末後權衡以平文不相屬禁針穴歌禁針穴道要先明腦戶囟會及神庭絡卻玉枕角孫穴顱𩔨承泣隨承靈神道靈臺膻中忌水分神闕並會陰橫骨氣衝手五里箕門承筋並青靈更加臂上三陽絡一十二穴不可針孕婦不宜針合谷三陰交內亦通論石門針灸應須忌女子終身無妊娠外有云門並鳩尾缺盆客主人莫深肩井深時人悶倒三里急補人還平禁灸穴歌禁灸之穴四十五承光啞門及風府天柱素髎臨泣上睛明攢竹迎香數和髎顴髎絲竹空頭維下關與脊中肩貞心俞白環俞天牖人迎共乳中周榮淵液並鳩尾腹哀少商魚際位經渠天府及中衝陽關陽池地五會隱白漏谷陰陵泉伏兔髀關委中穴殷門申脈承扶忌行針指要歌或針風先向風門氣海中或針水水分夾臍臍邊取或針結針著大腸瀉水穴或針勞須向風門及膏肓或針虛氣海丹田委中奇或針氣亶中一穴分明記或針嗽肺俞風門須用灸或針痰先針中脘三里間或針吐中脘氣海膻中補翻胃吐食一般針針中有妙少人知補瀉雪心歌行針補瀉分寒熱瀉寒補熱須分別捻針向外瀉之方捻針向內補之訣瀉左須將大指前瀉右大指當後拽補左大指向前搓補右大指往下搣如何補瀉有兩般蓋是經絡兩邊發補瀉又要識迎隨隨則為補迎為泄古人補瀉左右分今人乃為男女別男女經脈一般生晝夜循環無暫歇兩手陽經上走頭陰經胸走手指輟兩足陽經頭走足陰經足走腹中結隨則針頭隨經行迎則針頭迎經奪更有補瀉定呼吸吸瀉呼補真奇絕補則呼出卻入針要知針用三飛法氣至出針吸氣入疾而一退急捫穴瀉則吸氣方入針要知阻氣通身達氣至出針呼氣出徐而三退穴開禁莫向人前容易說經脈交會八穴歌公孫衝脈胃心胸內關陰維下總同臨泣膽經連帶脈陽維目銳外關逢後谿督內連眥頸申脈蹺絡亦相通列缺肺任行肺系陰蹺照海膈喉嚨十五絡穴歌人身絡穴一十五我今逐一從頭舉手太陰絡為列缺手少陰絡即通里手厥陰絡為內關手太陽絡支正是手陽明絡偏歷當手少陽絡外關位足太陽絡號飛陽足陽明絡豐隆記足少陽絡為光明足太陰絡公孫寄足少陰絡名大鐘足厥陰絡蠡溝配陽督之絡號長強陰任之絡號尾翳脾之大絡為大包十五絡脈君須記十二經脈晝夜流注歌肺寅大卯胃辰經脾巳心午小未中申膀酉腎心包戌亥三子膽醜肝通十二原穴歌甲出丘墟乙太衝丙歸腕骨是原中丁出神門原內過戊胃衝陽氣可通己出太白庚合谷辛緣本出太淵同壬歸京骨期中過癸出太谿原穴逢三焦壬是陽池穴包絡大陵癸又重八會穴歌府會中脘臟章門筋會陽陵髓絕骨骨會大杼氣膻中血會膈俞太淵脈臟腑七募穴歌肝募期門脾章門腎募京門心巨闕天樞關元大小腸膽募當記在日月薛真人天星十二穴歌馬丹陽歌三里內庭穴曲池合谷截委中配承山太衝崑崙穴環跳及陽陵通里並列缺合擔用法擔合截用法截擔截常記取非人莫浪說三百六十五不出十二穴此法少人知金鎖都開徹治病顯奇功有如湯潑雪學者細推尋神功無盡竭三里在膝下三寸兩筋間能通心腹脹善治胃中寒腸鳴並泄瀉腿脛膝腫酸傷寒羸瘦損氣蠱及諸般年過三旬後針灸眼有光內庭次指外本屬足陽明能治四肢厥喜靜惡聞聲癮疹咽喉痛數欠及牙疼氣虛不能食針著便惺惺曲池拱手取屈肘骨邊求善治肘中痛偏風手不收挽弓開不得筋緩莫梳頭喉痹從欲死發熱更無休遍身風癬癩針著即時瘳合谷在虎口兩指岐骨間骨痛並面腫瘧病熱還寒齒齲鼻衄血口噤不開言針入五分深令人即便安委中曲瞅里橫紋脈中央腰痛不能舉沉沉引脊梁痠疼筋莫展風痹發無常膝頭難伸屈針入即安康承山名魚腹腨腿分肉間善治腰疼痛痔疾大便難腳氣並膝腫展轉戰疼酸霍亂及轉筋穴中刺便安太衝足大指節後二寸中動脈知生死能醫驚癇風咽喉腹心脹兩足不能動七疝偏墜腫眼目似云蒙亦能療腰痛針下有神功崑崙足外踝跟骨上邊尋轉筋腰尻痛暴喘滿衝心舉步行不得一動即呻吟若欲求安穩須於此穴針環跳在髀樞側臥屈足取腰折莫能顧冷風並濕痹腿胯連腨痛轉則重嗟吁若人針灸後頃刻痛消除陽陵歸膝下外廉一寸中膝重並麻木冷痹及偏風舉足不能起坐臥似衰翁針入六分止醫功妙不窮通里腕骨後一寸五分