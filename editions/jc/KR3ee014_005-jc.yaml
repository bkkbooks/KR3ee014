八穴必是前谷與肝俞風生卒生翳膜引兩目痛兮不可忍睛明穴及手中指本節間尖三壯准眼睫毛倒絲竹空青盲無見肝俞中並及商陽通二穴患左患右左右攻眼眥急痛三間醫假如目昏治頭維攢竹睛明目窗穴百會風府與風池合谷肝俞絲竹空再兼一穴是腎俞目眩臨泣風府中風池陽谷中渚同通前通後共八穴液門魚際絲竹空目痛陽谿二間精次及三間與大陵前後總算六穴治須兼前谷與上星目眶爛見風淚流宜治頭維顴髎頭眼癢眼痛光明瀉兼治五會癢痛休目生翳者治肝俞命門童子髎穴宜外眥五分得氣瀉再兼合谷商陽醫小兒雀目不見物手拇指甲後一寸宜在內廉外紋頭白肉際各一壯穩鼻口鼻有息肉治迎香衄血風府風池良合谷二間三間穴後谿前谷委中強申脈崑崙並厲兌兼治上星隱白長鼽衄風府與二間再兼一穴是迎香鼻塞上星臨泣燒百會前谷厲兌高通前通後共七穴兼治合谷迎香焦鼻流清涕治人中上星風府三穴攻腦瀉鼻中臭涕出曲差上星治有功鼻衄上星二七壯兼治絕骨囟會康又法灸項後髮際兩肋中間宛宛央久病流涕出不禁百會灸之病絕根口乾尺澤與曲澤大陵二間少商穴再兼一穴是商陽仔細治之效自獲咽乾太淵魚際中消渴水溝承漿通金津玉液曲池穴太衝行間與勞宮商丘然谷隱白穴百日以上不可攻唇乾有涎治下廉舌乾涎出復溜尖唇乾飲食又不下三間少商治之痊假如唇動如蟲行水溝一穴治之寧唇腫宜治迎香穴口喎眼斜頰車精水溝列缺太淵穴合谷二間絲竹空兼治地倉極有效感應最速如神靈口噤頰車與支溝外關列缺內庭頭再兼厲兌通六穴次第治之病自瘳失口不語治間使支溝靈道兼魚際合谷陰谷復溜穴再治然谷病即愈舌緩太淵合谷中衝陽內庭風府同通前通後共七穴三陰交穴崑崙攻舌強啞門少商穴魚際二間與中衝再兼陰谷然谷等七穴治之為有功假如舌黃治魚際齒寒少海實為貴齒痛商陽一穴醫齒齲惡風合谷利再兼厲兌二穴攻醫者尋趁須仔細齒齲厲兌少海宜小海陽谷合谷奇液門二間內庭等齦痛角孫少海居舌齒腐兮承漿穴須兼勞宮二穴醫牙疼少海與曲池陽谷二間與陽谿更兼內庭與呂細並及液門與頰車上牙疼兮治人中太淵呂細三穴通臂上起肉中五炷灸之立待有神功下牙疼者龍玄穴側腕交叉脈是斯並及承漿合谷穴腕上五寸兩筋間灸至五壯病必痊不能嚼物角孫強牙疳蝕爛至生瘡炷如小箸頭樣大七壯須灸在承漿胸背脅胸滿經渠與陽谿後谿三間間使宜陽陵三里曲泉穴足臨泣等九穴醫假如胸痹治太淵胸膊悶兮肩井痊胸脅痛者天井穴支溝間使太白連三里大陵丘墟等陽輔八穴實為便胸中淡者間使宜胸滿支腫治膈俞再兼內關通二穴得效最速定不遲胸脅引滿腹下廉丘墟俠谿腎俞連假如胸煩期門穴胸中煩者亶中安肩背痠疼治風門肩井中渚支溝焚後谿腕骨委中穴次第治之病不存心胸痛者治尺澤內關大陵三穴著胸滿血膨有積塊霍亂腸鳴喜噫帶三里期門向外針二寸不補亦不瀉假如脅滿章門奇脅痛陽谷腕骨宜支溝膈俞及申脈缺盆腫足臨泣醫脅與脊引肝俞燒背膊項急大椎焦腰背強直難轉側腰俞肺俞二穴高腰脊痛楚委中頭再兼一穴是復溜腰背傴僂風池穴並治肺俞病即瘳背拘急者治經渠肩背相引二間宜商陽委中崑崙穴假如偏脅背痹痛須治魚際委中穴可保此病無根株背痛魚際與經渠崑崙京骨及丘墟脊膂強痛委中穴腰背俱疼治風池天牖合谷崑崙等四穴善治身不疲脊肉牽疼難屈伸合谷復溜崑崙真胸連脅痛期門穴宜於此處先入針章門穴與丘墟穴行間湧泉須細尋肩痹痛者治肩髃宜兼天井與曲池並治關衝與陽谷五穴仔細疾不居手足腰腋女人手臂痛難舉曲池須兼尺澤與肩髃三里少海太淵等陽池陽谷與陽谿前谷合谷液門穴外關腕骨次第醫臂寒曲澤與神門臂內廉痛太淵焚臂腕側痛治陽谷手腕搖動曲澤存腋痛少海間使宜少府陽輔與丘墟須兼申脈足臨泣腕勞天井治曲澤間使中渚與陽谿陽谷太淵腕骨等列缺液門十穴醫手腕無力列缺中肘臂痛者肩髃攻曲池通里手三里四穴能除肘臂疼肘攣曲澤及肩髃少海間使與後谿復兼大陵魚際等七穴馴治病自除肩背痠重治支溝肘臂手指難屈憂曲池三里外關等兼治中渚病即瘳手臂麻木天井宜外關支溝與曲池陽陵腕骨上廉等再兼合谷與經渠手臂冷痛肩井中曲池下廉三穴攻手指拘攣並筋緊曲池陽谷合谷同手熱曲池與內關曲澤列缺經渠間太淵中衝少衝等勞宮九穴病必安臂腫經渠曲池中通里中渚合谷同併兼液門手三里治之立待有神功風痹手攣不舉證尺澤曲池合谷應差點拘攣皆不安偏風癮疹喉痹等胸脅䐜滿及筋緩無力皮膚枯燥病曲池先瀉後補宜肩髃手三里為證肩膊煩疼治肩髃兼帶肩井與曲池五指皆疼外關穴手攣皆疼少商醫掌中熱者列缺巔宜兼經渠與太淵腋肘腫兮治曲澤小海間使大陵痊腋下腫者陽輔宜足臨泣兮與丘墟腰痛肩井環跳穴陰市三里委中煨承山陽輔崑崙穴復兼腰俞與腎俞兩腿如水陰市中挫閃腰疼脅肋疼尺澤曲池合谷穴三陰交穴與陰陵行間三里手三里腰疼難動風市攻再兼委中行間穴三穴治之誠有功腰脊強痛治腰俞委中湧泉小腸俞膀胱俞穴宜兼治腰腳痛者環跳宜風市陰市委中等承山崑崙申脈醫腰膝內痛治委中三里三陰交穴同腿膝痠疼環跳穴陽陵丘墟三穴攻腳膝痛者委中燒三里曲泉陽陵焦風市崑崙解谿等以上七穴最為高膝胻股腫治委中三里陽輔解谿同再及承山通五穴腰如坐水陽輔攻足痿不收治復溜風痹腳胻麻木憂宜治環跳風市攻足麻痹等環跳丘陰陵陽輔太谿穴兼治至陰五穴瘳腳氣肩井膝眼中風市三里承山同太衝丘墟行間穴髀樞痛者環跳攻陽陵丘墟共三穴病者治此為有功足寒熱兮治三里委中陽陵復溜底然谷委中置骨焦下廉風市共七穴足寒如水腎俞高渾身戰慄及䯒疼承山金門二穴觀足胻寒者復溜穴兼治申脈厲兌端足攣腎俞陽陵燒陽輔絕骨皆宜焦月事不利治中極再兼一穴三陰交過時不止隱白巔下經冷來治關元假如女人漏不止太衝三陰交為便血崩氣海與大敦陰谷太衝然谷焚三陰交穴與中極七穴治之病不存瘕聚關元病必除赤白帶治白環俞帶脈關元氣海等間使三陰交為宜小腹堅治帶脈中絕子商丘中極攻因產惡露或不止氣海關元必有功產後諸病期門宜乳癰下廉三里醫魚際少澤委中穴足臨泣兮與俠谿乳腫痛治足臨泣難產合谷補無失再瀉一穴三陰交兼治太衝期為畢橫生死胎治太衝合谷三陰交穴同假如橫生手先出右足小指尖上攻三壯五壯為灸數炷如小麥大有功子上逼心氣欲絕這難須當攻巨闕三陰交瀉合谷補產婦端的無險跌假如子手掬母心生下男女左右痕或在手心或腦後不在腦後人中尋產後血暈不識人支溝三里三陰交墮胎手足如冰厥肩井五分針病消覺悶急針三里穴胎衣不下中極高兼治一穴是肩井陰挺出者曲泉焦照海大敦共三穴無乳亶中少澤燒血塊曲泉復溜中三里氣海丹田同復帶三陰交一穴醫人須當仔細攻婦人經事若正行與夫交感瘦漸形寒熱往來精血競此病若把虛勞名宜治百勞腎俞等風門中極氣海並再兼三陰交在內如此治之功必成諸節皆疼治陽輔假如婦人腨腓病承山崑崙穴相應足緩陽陵衝陽中絕骨丘墟四穴定乃若腳弱治委中三里承山三穴同兩腳紅腫更疼痛膝關委中三里攻再兼陰市通四穴次第治之極有功若患穿跟草鞋風崑崙丘墟商丘紅並及照海通四穴如此妙術醫者通足不能行治曲泉三里委中陽輔巔復溜衝陽然谷等申脈行間脾俞連三陰交穴帶在內十一治之病即痊腳腕酸者委中臨再兼一穴是崑崙足心疼痛取崑崙腳筋短急足重沉鶴膝歷節風腫侵惡發不能起床枕此等宜於風市尋假如腰重不可忍轉側起臥不便窘冷痹腳筋又攣急如此復兼難屈伸兩腳曲瞅兩紋頭四處三壯一同灸兩人兩邊用同次待至火滅效可候午時若灸挨至曉聽得臟腑或鳴吼不鳴或行一二次此病痊愈時可守腰痛不能舉僕參二穴跟骨下陷尋拱足取之三壯灸指日可保病不侵膝以上病灸環跳再兼一穴風市療膝下病者灸犢鼻膝關三里陽陵效足踝上灸三陰交絕骨崑崙三穴高足踝以下灸照海再兼申脈病絕苗假如腿痛置骨康腳氣風市或五壯或五十壯百壯灸次及伏兔針為臟針止三分切忌灸三四犢鼻膝眼當地五三里百壯灸數至第六上廉央惟有第七今已闕終至第八絕骨良腳筋轉時不可忍宜於腳踝灸為準內筋急兮灸在內外筋急兮灸外穩腳筋多年不愈者如此灸之病即泯婦人月脈不調氣海中三陰交穴中極攻帶脈一壯不可過再及肩俞斯有功女子月事若不來面黃嘔吐身無胎三陰交兮曲池穴支溝三里治無災經脈過多通里高行間穴與三陰交欲斷產兮治合谷右足內踝上寸燒臍下二寸三分灸灸至三壯陽氣消復有肩井帶在內從此妊孕絕根苗一切冷憊灸關元不時漏下三陰交月水不調結成塊用針關元水自調小兒大小五癇水溝存百會神門與金門須帶崑崙及巨闕驚風腕骨最為真瘛瘲五指掣陽谷兼治腕骨與崑崙風癇目戴上百會復兼崑崙絲竹空脫肛百會長強穴假如卒病治太衝角弓反張百會穴大凡瀉痢神闕攻赤遊風者治百會兼治委中誠有功秋深冷痢灸臍穴二寸三寸動脈中假如吐乳灸中庭一寸六分下亶中羊癇豬癇灸巨闕灸至三壯收全功假如口有瘡蝕齦穢臭沖人難看管勞宮二穴各一壯用心仔細須尋篡卒患肚痛皮青黑肚臍四邊各半寸各灸三壯皆安全鳩尾一寸三壯益驚癇頂上旋毛中須於此處三壯攻耳後青絡三壯灸炷如小麥大有功風癇屈指如數物鼻上髮際治之不一二歲者目赤眥大指小指間後尋一寸半灸三壯沒夜啼百會灸三壯囟門不合各有方臍上臍下各五分三穴各灸止三壯灸瘡未發囟門合患者誠之必然康肩腫偏墜是關元灸止三壯誠宜然大敦七壯真果便若此治之病即痊豬癇如屍厥吐沫巨闕三壯不可忽寒熱灑淅食癇發鳩尾上至五分突宜灸三壯身即安不灸三壯病不痊羊癇九椎下節間灸至三壯如服丹又法大椎上三壯可保小兒無災難中間三壯鳩尾穴大椎三壯透過間馬癇治之自有方僕參二穴各三壯風府臍中各三灸依此妙法得安康假如犬癇兩手心足太陽與肋戶尋各灸一壯病必愈雞癇足諸陽三壯牙疳舌爛治之強或針或灸須承漿遍身生瘡曲池穴合谷三里絕骨良通前通後共五穴須兼膝眼二七壯假如腋腫馬刀瘍要知此是頭中瘡宜治陽輔太衝穴熱風癮疹肩髃臧曲池曲澤環跳等須帶合谷湧泉康瘍腫振寒少海中疥癬瘡兮曲池攻支溝陽谿陽谷等大陵合谷後谿同委中三里陽輔穴崑崙穴與行間通三陰交穴百蟲窠十四穴治為有功疔瘡溺死犬傷蛇傷脈絕癰疽疔生面上與口角須灸合谷瘡即落若生手上灸曲池若生背上肩井索三里委中臨泣中八穴灸之不可錯行間通里少海兼復帶太衝無病惡假如瘰癧少海尋此穴皮上宜先針三十六息椎針入入內須當定淺深追核大小勿出核三上三下乃出針天池章門臨泣等支溝陽輔百壯真復兼肩井手三里肩井隨年壯為吟癰疽發背肩井攻再兼一穴是委中以蒜片貼瘡上灸如不疼兮灸至疼愈多愈好是此病若疼宜灸至不疼溺水死者雖經宿細按神經亦可救即解死人衣帶開速急把他臍中灸假如人被狂犬傷當時須灸咬處瘡凡人若是蛇傷者亦把咬處灸三壯仍以蒜片貼咬處灸在蒜上即安康人脈微細不見臨或時無有不可尋少陰經兮復溜穴此穴宜刺圓利針針至骨處順針去下刺候回陽脈臨陽脈生時方穩當方乘此際可出針癰疽瘡毒實難醫患人須將竹馬騎薄篾用量患人手尺澤頭紋橫比齊起循手臂至中指尖上截斷斯為宜竹槓兩頭置凳上患人去衣方可騎須當以足微點地比篾頭安竹槓皮循內直上篾盡處醫者須當墨點記只是取中非灸區更以薄篾量中指中節兩紋為一寸將篾以墨點為主點上兩傍各一寸是穴各灸五七炷或五或七不可多此法灸之無不愈附辨或問睛明迎香承泣絲竹空皆禁灸何也曰四穴近目目畏火故禁灸也以是推之則知睛明可灸王注誤矣或問迎而奪之隨而濟之此固言補瀉也然其義何如曰迎者逢其氣之方來如寅時氣來注於肺卯時氣來注大腸此時肺大腸氣方盛而奪瀉之也隨者隨其氣之方去如卯時氣去注大腸辰時氣去注於胃肺與大腸此時正虛而補濟之也余仿此或問髎穴針入幾分留幾呼之說曰愚以為初不如是相拘蓋肌肉有淺深病去有遲速若肌肉厚實處則可深淺薄處則宜淺病去則速出針病滯則久留針為可耳故曰刺虛者須其實刺實者須其虛也或問孫氏以灸為閉門趕賊何如曰夫以火瀉者疾吹其火則火氣與邪氣去矣此內經火瀉法也又胡為而閉其門乎至於氣針雖微妄加無病則氣之瀉若河決下流不可以其微而輕之也孫氏之云特歸重於火針耳要之言不能無弊故曰立言難或問人神隨年歲巡歷於身尻神逐日坐臨於人若人死此神與之俱死乎抑出於人之身飄流於天地間而失所依乎抑別求人而附之乎若別欲依人則人人自有神矣將飄流天地間無人可依神亦離散矣既曰神則靈變莫測者也何必求人而附之乎人之心為君主之官神明出焉胡不驅此神使身安而不為針灸所犯乎曰人神尻神後世術家之言素難未有也何足信哉或問胃之大絡名曰虛里其動應衣脈宗氣也而不繫於補瀉之列豈以偏穴而廢之歟曰此固氣之所聚血之盛會灸刺之禁地也其過與不及自有其道焉蓋中焦之氣盛衰而宗氣為之盈縮取之三里以下其氣而宗氣之盈者消調之三里以補其氣而宗氣之耗者滋則其氣未嘗不補瀉也特以非別走他經故不在諸絡之例此所以舉豐隆而不屬虛里也歟或問素問難經論針之旨何如曰素問博而詳難經精而約其道則一而已孟子謂博學詳說將以反說約二書不可偏廢也或問古人補瀉在井滎俞經合然睛明瞳子髎治目疼聽宮絲竹空聽會治耳聾迎香治鼻地倉治口喎風池頭維治頭項不繫井滎俞經合何也曰以其病在上取之上其高者因而越之之意也素問補遺注云動氣至而即出針今針入穴邪氣吸拔推之不前引之不後轉之不移必俟氣衰然後退針豆許如此者三而可出也若僅能轉針而遽出之則血隨針瀉在於多氣少血之經尤所當忌吾嘗謂遺篇之補出於後人之託其經注一律出於一人之手由是觀之豈特注說未當而已邪十二經絡髎穴各有流注衰王之時按時補瀉固是今病在各經絡者或按時亦能去病蓋病著於經其經自有虛實補虛瀉實亦自中病也病有一針而愈有數針始愈蓋病有新故淺深新且淺一針可愈若深痼者必數針可去如服藥然有一二劑病退有多服至四五十劑或累百而愈或問針形至微何以能瀉有餘補不足曰如氣球然方其未有氣也則靨塌不堪蹴踢及從竅吹之則氣滿起胖此虛則補之之義也去其竅之所塞則氣從竅出復靨塌矣此實則瀉之之義也或問素難長沙東垣竇肥卿竇桂芳針法何如曰素問猶五經之載道難經猶易之十翼發明素問長沙東垣則如濂洛關閩之精思力踐二竇猶老列荀揚文雖曰體道不能無偏倚駁雜要之素問長沙東垣如美玉而二竇誠為有瑕之璧也或問醫經小學云出針不可猛出必須作三四次徐徐轉而出之則無血若猛出必見血也素問補遺篇注云動氣至而即出針此猛出也二說將孰從哉曰經絡有凝血與欲大瀉者當猛出若尋常補瀉必當從醫經小學也或問銅人千金等書空穴多十四經發揮所載空穴少如風市督俞金津玉液等彼有此無不同何也曰十四經發揮據素問骨空篇論及王注若銅人千金纂皆偏書非岐黃正經也
