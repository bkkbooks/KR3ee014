body:
  text: 卷三鐵針本草云馬銜鐵無毒日華子云古舊鋌者好或作醫工針也武按本草柔鐵即熟鐵有毒故用馬銜則無毒以馬屬午屬火火剋金解鐵毒故用以作針古曰金針者貴之也又金為總名銅鐵金銀之屬皆是也煮針危氏書云烏頭巴豆各一兩硫黃麻黃各五錢木鱉子十個用烏梅藥同入磁石器內水煮一日洗擇之再用止痛沒藥乳香當歸花乳石各半兩又如前水煮一日取出用皂角水洗再於犬肉內煮一日仍用瓦屑打磨淨端直松子油塗常近人氣為妙按煮針非素問意今依法煮之以解鐵毒此有益無害也火針經曰焠針者以麻油滿盞燈草令多如大指許叢其燈火燒針頻以麻油蘸其針燒令通紅用方有功若不紅者反損於人不能去病燒時令針頭低下恐油熱傷手先令他人燒針醫者臨時用之以免致手熱才覺針紅醫即取針先以針安穴上自然干針之亦佳凡行針點灸相似以墨記之使針時無差穴道差則無功火針甚難須有屠兒心劊子手方可行針先以左手按定其穴然後針之切忌太深深則反傷經絡不可太淺淺則治病無功但消息取中也凡大醉之後不可行針不適淺深有害無利凡行火針必先安慰病人令勿驚心較之火針及灸灸則直守艾灼燒過痛則久也火針雖則視之畏人其針下快疾一針便去疼不久也以此則知灸壯候數滿足疼之久也火針止是一針不再則痛過也凡行火針一針之後疾速便去不可久留尋即以左手速按針孔上則疼止不按則疼甚凡下針先以手按穴令端正頻以眼視無差方可下針燒針之人委令定心燒之恐視他處針冷治病無功亦不入內也人身諸處皆可行針面上忌之凡季夏大經血盛皆下流兩腳切忌妄行火針於兩腳內及足則潰膿腫疼難退其如腳氣多發於夏血氣濕氣皆聚兩腳或誤行火針則反加腫疼不能行履也當夏之時腳氣若發藥治無效不免灸之每一穴上但可灸三壯劫其病退壯數之年亦不苦潰腫膿瘡亦易平火針者宜破癰毒發背潰膿在內外皮無頭者但按腫軟不堅者以潰膿闊大者按頭尾及中以點記宜下三針決破出膿一針腫上不可按之即以指從兩旁捺之令膿隨手而出或腫大膿多針時須側身迴避恐膿射出汙身孫氏曰凡下火針須隔一日報之報之後當膿水大出疾則效矣凡癥塊結積之病甚宜火針此非萬效之功火針甚妙於結塊之上須停針慢出仍轉動其針以發出汙滯凡下火針經一宿身上發熱惡寒此為中病無害事也火針亦行氣火針惟假火力無補瀉虛實之害惟怕太深有害余則無妨氣針者有淺有深有補有瀉候氣候邪之難不可誤行恐虛者反瀉實者不宣又以為害世之制火針者皆用馬銜鐵思之令喜意也此針惟是要久受火氣鐵熟不生為上莫如火爐中用廢火箸制針為佳也初制火針必須一日一夜不住手以麻油燈火頻頻蘸燒如是終一日一夜方可施用凡治癱瘓尤宜火針易獲功效蓋火針大開其孔穴不塞其門風邪從此而出若氣針微細一出其針針孔即閉風邪不出故功不及火針灸者亦閉門趕賊其門若閉邪無出處故也若風濕寒三者在於經絡不出者宜用火針以外發其邪針假火力故功效勝氣針也破癰堅積結瘤等皆以火針猛熱可用又如川僧多用煨針其針大於鞋針火針以火燒之可用即九針之中之大針是也其針大於氣針故曰大針者其功能治風邪入舍於筋骨間不出者宜用之火針之次也孫曰三針者是鋒針鈹針火針也火針即煨針也按燒針法仲景以前多用之以致禍故傷寒書屢言之如曰用燒針必驚燒針令汗針處被寒核起發奔豚加燒針因胸煩之類今世或用以出癰膿為便溫針王節齋曰近有為溫針者乃楚人之法其法針於穴以香白芷作圓餅套針上以艾蒸溫之多以取效然古者針則不灸灸則不針未有針而加灸者此後人俗法也此法行於山野貧賤之人經絡受風寒致病者或有效只是溫針通氣而已於血宜衍於疾無與也古針法最妙但今無傳恐不得精高之人誤用之則危拙出於頃刻唯灸得穴有益無害日後宜行之折針本草云醫工針人而針折在肉中不出杵牡鼠肝及腦塗之又象牙主諸針及雜物入肉刮取屑細研入水和敷上立出肘後方針折肉中象牙屑水和敷上立出寶鑑湧針膏取針刺入肉並箭頭鼠糞頭十個螻蛄四十九個土消蟲十個芫青馬肉中蛆醬內蛆俱焙蜣螂巴豆信砒硇砂夏枯草磁石黃丹蘇木地骨皮各一兩石腦油三兩蒿柴灰汁三升上將灰汁石腦油以文武火熬成膏次下諸藥令勻瓷器內收貯臨用時看創大小點藥良久自然湧出萬聖神應丹出針並箭頭莨菪根今天仙子苗是也於端午前一日尋上項科取酌中一科要根枝葉實全用柴灰自東南為頭圍了用木篦撅取子根下土次日端午日未出用鑺只一下取出用淨水洗了於靜室中石臼中搗如泥丸如彈子大黃丹為衣紙袋內封了懸高處陰乾針箭不出者以緋絹袋盛一丸放在臍下用綿裹肚繫了先用象牙末屑於傷處貼了後用此藥若創口生合用刀子微割開以象牙末貼之神聖膏取針入皮膚車脂不拘多少成膏子好攤紙上如錢大貼之二日一換三五次針自出大有神效烏翎散取針鐵入皮膚烏翎三五枝火炙焦為末好醋調成膏塗創上紙蓋一兩次其針自出按素問云針耀而勻示人臨病當檢視其針令光耀滑澤勻直而無曲損也能守此訓自不致折矣又磁石能引針出肉古人療折針法雖多今備錄於此宜隨輕重選用之暈針濟生拔萃云有隨針而暈者何曰一則不知刺禁如刺中心一日死之類也二則不明脈候如下利其脈忽大者死之類凡針灸者先須審詳脈候觀察病證然後知其刺禁其經絡穴道遠近氣候息數深淺分寸金針賦云其或暈針者神氣虛也以針補之以袖掩之口鼻氣回熱湯與之略停少頃依前再施按以針補之以所內之針施補也以袖掩之掩其口毋令氣泄掩其面毋令迎風也指微賦注云醫人深明氣血往來取穴部分不瘥補瀉得宜必無暈針昏倒之疾或匆忙之際畏刺之人多感此壯者氣行自已怯者當速救療假令針肝經感氣暈以補肝經曲泉穴之絡假令針肝絡血暈以補本經曲泉穴之絡針入復甦效如起死余皆仿此劉宗厚曰暈針者奪命穴救之男左女右取之不回卻再取右女亦然此穴正在手膊上側筋骨陷中蝦蟆兒上自肩至肘正在當中按暈針三法指微賦有理劉氏止言奪命穴而不言何經何絡今按此穴分是肺大腸脈分而古亦無奪命穴之名也針灸傷危氏書云治針灸傷經絡膿血不止黃耆八兩當歸三兩肉桂木香乳香別研沉香各一兩為末用綠豆粉四兩堇汁糊丸梧桐子大每服五十丸不拘時候熟水下暖針素問遺篇注云用圓利針長針未刺時先口溫針暖而用之又曰先以口銜針令溫又曰毫針於人近體暖針至溫又曰著身溫之按口體溫針欲針入經穴氣得溫而易行也今或投針於熱湯中亦此意耳口溫與體溫微有不同口溫者針頭雖熱而柄尚寒不若著身溫之則針通身皆熱矣呼吸素問注云按經云皆先補真氣乃瀉其邪也何以言之補法呼盡內針靜以久留此段瀉法吸則內針又靜以久留然呼則次其吸吸至則不兼呼內針之候既同久留之理復一則先補之義昭然可知拔萃云呼不過三吸不過五明堂云當補之時候氣至病更用生成之息數令病人鼻中吸氣出自覺熱矣當瀉之時候氣至病更用生成之息數令病人鼻中出氣口中吸氣按所病臟腑之數自覺清涼矣補瀉素問遺篇補腎俞注曰用圓利針臨刺時咒曰五帝上真六甲玄靈氣符至陰百邪閉理念三遍先刺二分留六呼次入針至三分動氣至而徐徐出針以手捫之令受針人嚥氣三次又可定神魂者也瀉脾俞注曰欲下針時咒曰帝扶天形護命成靈誦之三遍乃刺三分留七呼動氣至而急出其針按咒法非素問意補註又王氏輩為之未足信但針工唸咒則一心在針故曰如待所貴不知日暮也濟生拔萃云瀉法先以左手揣按得穴以右手置針於穴上令病人咳嗽一聲捻針入腠理得穴令病人吸氣一口針至六分覺針沉澀復退至三四分再覺沉澀更退針一豆許仰手轉針頭向病所以手循經絡捫循至病所以合手以回針引氣過針三寸隨呼徐徐出針勿閉其穴命之曰瀉補法先以左手揣按得穴以右手置針於穴上令病人咳嗽一聲捻針入腠理得穴令病人呼氣一口將盡納針至八分覺針沉緊復退一分許如更覺沉緊仰手轉針頭向病所依前循捫其病所氣至病已隨吸而走出針速按其穴命之曰補又曰夫行針者當刺之時口溫針暖先以左手揣按所針滎俞之處彈而怒之爪而下之捫而循之通而取之隨病人咳嗽一聲右手持針而刺之春夏二十四息秋冬三十六息徐出徐入氣來如動脈之狀補者隨經脈推而內之左手閉針孔徐出針而疾按之瀉者迎經脈動而伸之左手開針孔疾出針而徐按之虛羸氣弱癢麻者補之豐肥堅硬疼痛者瀉之按素問云候呼內針又曰候呼引針候伺候也言醫工持針等候病人之呼吸而用針也今令病人呼吸是以呼吸候針矣又曰令病人吹氣一口吸氣一口又是非鼻中呼吸矣謬之甚也此補瀉尚得素難意明堂注云寒熱補瀉假令補冷先令病人咳嗽一聲得入腠理復令吹氣一口隨吹下針至六七分漸進腎肝之部停針徐徐良久復退針一豆許乃捻針問病人覺熱否然後針至三四分及心肺之部又令病人吸氣內針捻針使氣下行至病所卻外捻針使氣上行直過所針穴一二寸乃吸而外捻針出以手速按其穴此為補夫病熱者治之以寒何如須其寒者先刺入陽之分候得氣推內至陰之分後令病人地氣入而天氣出謹按生成之息數足其病人自覺清涼矣夫病惡寒者治之以熱也何如須其熱者先刺入陰之分候得氣徐引針至陽之分後令病人天氣入而地氣出亦謹按生成之息數足其病自覺和暖矣十四法動者如氣不行將針伸提而已退者為補瀉欲出針時各先退針一豆許然後卻留針方可出之搓者凡令病人覺熱向外臥針似搓線之狀勿轉太緊治寒而里臥針前轉法以為搓也進者凡不得氣男外女內者及春夏秋冬各有進退之理盤者凡如針腹部於穴內輕盤搖而已搖者凡瀉時欲出針必須動搖而後出彈者凡補時用指甲輕彈針使氣疾行也如瀉不可用捻者以手指捻針也務要記夫左右左為外右為內循者凡下針於部分經絡之處用手上下循之使氣血往來經云推之則行引之則止捫者凡補者出針時用手捫閉其穴也攝者下針時得氣澀滯隨經絡上用大指甲上下切其氣血自得通行也按者以手按針無得進退如按切之狀爪者凡下針用手指作力置針有準也切者凡下針必先用大指甲左右於穴切之令氣血宣散然後下針是不使傷於榮衛也按此十四法所謂進退動搖彈捫攝循切按爪皆素問針法搓捻非素問法也八法金針賦云一曰燒山火治頑麻冷痹先淺後深用九陽而三進三退慢提緊按熱至緊閉插針除寒之有準也二曰透天涼治肌熱骨蒸先深後淺用六陰而三出三入緊提慢按寒則徐徐舉針退熱之可憑皆細細搓之去病準繩三曰陽中之陰先寒後熱淺而深以九六之法則先補後瀉也四曰陰中之陽先熱後寒深而淺以九六之法則先瀉後補也補者直須熱至瀉者務待寒侵猶如搓線慢慢轉針在淺則用淺法在深則用深法二者不可兼而紊之也五曰子午搗臼水蠱隔氣落穴之後調氣均勻針行上下九入六出左右轉之千遭自平六曰進氣之訣腰背肘膝痛渾身走注疼刺九分行九補臥針五七吸待氣上行亦可龍虎交戰左捻九而右捻六是亦住痛之針七曰留氣之訣痃癖癥瘕刺七分用純陽然後乃直插針氣來深刺提針再停八曰抽添之訣癱瘓瘡癩取其要穴使九陽得氣提按搜尋大要運氣周遍扶針直插復向下納回陽倒陰指下玄微胸中活法一有未應反復再施按此八法巧立名色非素難意也四法金針賦云過關過節催運氣以飛經走氣其法有四一曰青龍擺尾如扶船舵不進不退一左一右慢慢撥動二曰白虎搖頭似手搖鈴退方進圓兼之左右搖而振之三曰蒼龜探穴如入土之象一退三進鑽剔四方四曰赤鳳迎源展翅之儀入針至地提針至天候針自搖復進其穴上下左右四圍飛旋病在上吸而退之病在下呼而進之按此法亦巧立名色而已求針之明為針之晦下針法金針賦云先須爪按重而切之次令咳嗽一聲隨咳下針凡補先呼氣初針刺至皮肉乃曰天才少停進針刺至肉內是曰人才又停進針刺至筋骨之間名曰地才此為極處就當補之再停良久卻須退針至人之分待氣沉緊倒針朝病進退往來飛經走氣盡在其中矣凡瀉者吸氣初針至天少停進針直至於地得氣瀉之再停良久卻須退針復至於人待氣沉緊倒針朝病法同前矣及夫調氣之法下針至地之後復人之分欲氣上行將針右捻欲氣下行將針左捻欲補先呼後吸欲瀉先吸後呼氣不至者以手循攝以爪切掐以針搖動進捻搓彈直待氣至以龍虎升騰之法按之在前使氣在後按之在後使氣在前運氣走至疼痛之所以納氣之法扶針直插復向下納使氣不回若關節沮澀氣不過者以龍虎龜鳳通經接氣大段之法馳而運之仍以循攝爪切無不應矣此通仙之妙按素問有淺深法而此曰天地人三才者是亦九針論意也醫經小學云先說平針法含針口內溫按揉令氣散掐穴放教深持針安穴上令他嗽一聲隨嗽歸天部停針再至人再停歸地部待氣候針沉氣若不來至指甲切其經次提針向病針退天地人補必隨經刺令他吹氣頻隨吹隨左轉逐歸天地人待氣停針久三彈更熨溫出針口吸氣急急閉其門瀉欲迎經取吸則納其針吸則須右轉他次進天人轉針仍復吸依法再停針出針吹出氣搖動大其門出針法金針賦云病勢既退針氣微松病未退者針氣始根推之不動轉之不移此為邪氣吸拔其針乃真氣未至不可出之出之者其病即復再須補瀉停以待之直候微松方可出針豆許搖而停之補者吸之去疾其穴急捫瀉者呼之去徐其穴不閉欲令腠密然後吸氣故曰下針貴遲太急傷血出針貴緩太急傷氣劉宗厚曰出針不可猛出必須作三四次徐徐轉而出之則無血若猛出必見血也人身左右補瀉不同神應經曰人身左邊右手以大指進前捻針為補大指退後捻針為瀉右邊以右手大指退後捻針為補進前捻針為瀉捻針左右已非素問意矣而人身左右不同謬之甚也男女氣血金針賦云男子之氣早在上而晚在下取之必明其理女子之氣早在下而晚在上用之必識其時午前為早屬陽午後為晚屬陰男女上下平腰分之按針灸當隨經絡氣至十二時候如寅肺卯大腸經之類男女所同男女氣血上下之分固非素難意亦不必然也古人不行針知針理一婦人患熱入血室醫者不識用補血藥數日成結胸證許學士曰小柴胡湯已遲不可行也可刺期門予不能針請善針者針之如言而愈針灸藥皆醫家分內事後世分門專科之醫出而各有所長矣艾葉本草云艾味苦氣微溫陰中之陽無毒主灸百病三月三日五月五日採曝乾陳久者良又辟惡殺鬼又採艾之法取五月五日火旺之時灼艾有效制艾先要知法令乾燥入臼搗之以細篩去塵屑每入石臼搗取潔白為上須令焙太燥則灸有力火易燃如潤無功證類本草云出明州圖經云舊不著所出州土但云生田野今在處有之以復道者為佳初春布地生苗莖類蒿而葉背白以苗短者為佳或灸諸風冷痰入硫黃末亦可孟子云七年之病求三年之艾丹溪云艾性至熱入火灸則上行入藥服則下行艾炷大小千金云黃帝曰灸不三分是謂徒冤炷務大也小弱乃小作之又曰小兒七日以上周年以還炷如雀糞明堂下經云凡灸欲炷根下廣三分若不三分即火氣不能達病未能愈則是艾炷欲其大惟頭與四肢欲小耳明堂上經乃曰艾炷依小箸頭作其病脈粗細狀如細線但令當脈灸之雀糞大炷亦能愈疾又有一途如腹中疝瘕痃癖伏梁氣等惟須大艾炷故小品曰腹背爛燒四肢則但去風邪而已不宜大熱如巨闕鳩尾灸之不過四七炷只依竹箸頭大但令正當脈灸之艾炷若大復灸多其人永無心力如頭上灸多令人失精神背腳灸多令人血脈枯竭四肢細而無力既失精神又加細節令人短壽王節齋曰面上艾炷須小手足上則可粗點艾火下經云古來灸病忌松柏枳橘榆棗桑竹八木火切宜避之有火珠曜日以艾承之得火次有火鏡曜日亦以艾引得火此火皆良諸蕃部落用鑌鐵擊階石得火以艾引之凡倉卒難備即不如無木火清麻油點燈上燒艾莖點灸兼滋潤灸瘡至愈不疼用蠟燭更佳良方云凡取火者宜敲石取火或水精鏡於日得太陽火為妙天陰則以槐木取火今行舟人以鐵鈍刀擊石以紙灰為丸在下承之亦得火按周禮夏官司爟掌行火之政令四時變國火以救時疾鄒子曰春取榆柳之火夏取棗杏之火季夏取桑柘之火秋取柞楢之火冬取槐檀之火饒氏曰此古人贊化育之一事艾灸點火只依取五火而已秦漢而下醫家不識此意壯數多少千金云凡言壯數者若丁壯病根深篤可倍於方數老少羸弱可減半又曰小兒七日以上周年以下不過七壯扁鵲灸法有至三五百壯千壯曹氏灸法有百壯有五十壯小品諸方亦然惟明堂本經云針入六分灸三壯更無餘治故後人不準惟以病之輕重而增損之凡灸頭項止於七壯積至七七壯止銅人若治風則灸上星前頂百會至二百壯腹背宜灸五百壯若鳩尾巨闕亦不宜多灸但去風邪不宜多灸灸多則四肢細而無力明堂千金方於足三里穴乃云多至三二百壯心俞禁灸若中風則急灸至百壯皆視其病之輕重而用之不可泥一說而不知其又有一說也下經只云若是禁穴明堂亦許灸一壯至三壯恐未盡也阿是穴千金云凡宦遊吳蜀體上常須三兩處灸之勿令瘡暫瘥則瘴癘溫瘧毒氣不能著人故吳蜀多行灸法有阿是穴之法言人有病即令捏其上若里當其處不問孔穴即得便快成痛處即云阿是灸刺皆驗故云阿是穴治灸瘡令發資生云凡著艾得瘡發所患即瘥不得發其病不愈甲乙經云灸瘡不發者用故履底炙令熱熨之三日即發今用赤皮蔥三五莖去青於煻灰中煨熟拍破熱熨瘡十餘遍其瘡三日自發予見人灸瘡不發者頻用生麻油漬之而發亦有用皂角煎湯候冷頻點之而發亦有恐氣血衰不發於灸前後煎四物湯服以此湯滋養氣血故也不可一概論也予常灸三里各七壯數日過不發再各灸二壯右足發左足不發更灸左足一壯遂發亦在人以意取之若順其自然則終不發矣此人事所當盡也按寶鑑云氣不至而不效灸之亦不發蓋十二經應十二時其氣各以時而至故不知經絡氣血多少應至之候而灸之者則瘡不發世醫莫之知也惜哉若壯實人不候時而灸亦發洗灸瘡凡著灸住火便用赤皮蔥薄荷湯溫洗瘡周圍約一二尺令驅逐風氣於瘡口出更令經脈往來不滯自然瘡疾愈若灸瘡退痂後用東南桃枝青嫩皮煎湯溫洗能護瘡中諸風若瘡內黑爛加胡荽煎若瘡疼不可忍多時不效加黃連煎神效貼灸瘡資生云貼灸瘡春用柳絮夏用竹膜秋用新綿冬用兔腹上白細毛貓兒腹毛更佳今人多以膏藥貼之日三兩易全不疼但以膏藥貼則易干爾若要膿出多而疾除不貼膏藥尤佳按柳絮竹膜兔貓毛貼瘡恐乾燥作疼而太乙膏善應膏又有不對證藥皆不宜今只用白芷乳香當歸川芎等香油另煎膏藥貼之為要小兒戒逆灸千金云小兒新生無疾慎不可逆針灸之如逆針灸則忍痛動其五臟因喜成癇河洛關中土地多寒兒喜病痓其生兒三日多逆灸以防之灸頰以防噤有噤者舌下脈急牙車筋急其土地寒皆決舌下去血灸頰以防噤也吳蜀地溫無此疾也古方既傳之今人不詳南北之殊便按方而用之是以多害於小兒也所以田舍小兒任其自然皆得無橫夭也相天時千金云正午以後乃可灸謂陰氣未至灸無不著午前平旦穀氣虛令人癲眩不可針灸卒急者不可用此例下經云灸時若遇陰霧大風雪猛雨炎暑雷電虹霓停候晴明再灸急難亦不拘此按日正午氣注心經未時注小腸經止可灸極泉青靈少海靈道通里神門少府少衝少澤前谷後谿腕骨等穴其餘經絡各有氣至之時故寶鑑云氣不至灸之發千金所云午後灸之言恐非孫真人口訣也忌食物房勞資生云既灸忌食豬魚熱面生酒動風冷物雞肉最毒而房勞尤忌按既灸之後當茹淡使胃氣和平血氣流通疾病隨艾氣驅出若厚味醉酗則血氣亂生痰涎阻滯病氣而不得驅逐房勞則損精神血脈故當守禁忌丹溪有茹淡論相火論須熟讀不獨針灸為然也避人神千金云欲行針灸先知行年宜忌及人神所在不與禁忌相應即可故男忌除女忌破男忌戊女忌巳有日神忌有每月忌有十二時忌有四季人神有十二部人神有十二部年人神有九部旁通人神有雜忌旁通人神有血支血忌之類凡醫者不能知此避忌若逢病人厄會男女氣怯下手至困通人達士豈拘此哉若遇卒急暴患不拘此法許希亦云卒暴之疾須速灸療一日之間止忌一時是也千金云癰疽疔腫喉痹客忤尤為急凡作湯藥不可避凶日覺病須臾即宜便治又曰凡人卒暴得風中時氣凡百所苦須急救療久後皆難愈此論甚當夫急難之際命在須臾必待吉日後治已淪於鬼錄此所以不可拘忌也惟平居治病於未形選天德月德等日服藥針灸可也炷火千金方云凡點灸法坐點穴則坐灸臥點穴則臥灸立點穴則立灸須四體平直毋令傾側若傾側穴不正徒破好肉耳明堂云須得身體平直毋令蜷縮坐點毋令俯仰立點毋令傾側炷火先後資生云千金方言凡灸當先陽後陰言從頭向左而漸下次從頭向右而漸下先上後下明堂云先灸上後灸下先灸少後灸多皆宜審之王節齋曰灸火須自上而下不可先灸下後灸上針灸避忌太乙圖序針經曰太乙日遊以冬至之日始居葉蟄之宮從其宮數所在日遊一處至九日復反於一常如是無已周而復始此太乙日遊之法也奈行針之士無所知者遂將太乙所直之日編次成圖始自入節得主之日從其宮至所在之處首一終九日徙一宮至九日復反於一周而復始如是次而行之計每宮各得五日九之則一節之日悉備今予一條次備細開具於逐宮之內使觀者臨圖即見逐節太乙所直之日在何宮內乃知人之身體所忌之處庶使行針之士知迴避之俾人無忤犯太乙之凶乃僕之本意也冬至葉蟄宮說冬至葉蟄宮圖周身之法取九宮方位離為上部中五為中部坎為下部巽坤為二肩臂震兌為左右脅乾艮為左右手足太乙遊至處禁忌針灸若起葉蟄取冬至一日為首他皆仿此按冬至葉蟄宮圖載於內經者止言八方之氣有應其時而生物違其時而生病又刺癰曰身有癰腫者欲治之無以其所直之日潰之今曰諸針灸皆忌之是與經旨不合月內人神所在一日在足大指厥陰分刺之跗腫二日在足外踝少陽分刺之經筋緩三日在股內少陰分刺之小腹痛四日在腰太陽分刺之腰僂無力五日在口太陰分刺灸之舌強六日在兩手陽明分刺之咽喉不利一云在足小指七日在足內踝少陰分刺灸之陰經筋急八日在手腕太陽分刺灸之腕不收九日在尻厥陰分刺灸之病結十日在腰背太陽分刺灸之腰背僂十一日在鼻柱陽明分刺灸之齒面腫十二日在髮際少陽分刺之令人耳重聽十三日在牙齒少陰分刺灸之氣寒十四日在胃脘陽明分刺之氣腫十五日在遍身不宜補瀉針灸大忌十六日在胸太陽分刺之逆息十七日在氣衝陽明分刺之難息十八日在股內少陰分刺之引陰氣痛十九日在足趺陽明分刺灸之發腫二十日在內踝少陰分刺之經筋攣二十一日在手小指太陽分刺之不仁二十二日在足外踝少陽分刺之經筋緩二十三日在肝及足厥陰分刺之發轉筋二十四日在手陽明分刺灸之咽喉中不利二十五日在足陽明分刺灸之胃氣脹二十六日在胸太陰分刺灸之令人喘嗽二十七日在膝陽明分刺灸之足經厥逆二十八日在膝少陰分刺之小腹急痛二十九日在膝脛厥陰分刺之筋痿少力三十日在足趺皆忌針灸按內經素問無此說每月血支正月醜二月寅三月卯四月辰五月巳六月午七月未八月申九月酉十月戌十一月亥十二月子每月血忌正月醜二月未三月寅四月申五月卯六月酉七月辰八月戌九月巳十月亥十一月午十二月子十二支人神子目醜耳寅胸卯齒辰腰巳手午心未足申頭酉膝戌陰亥脛十二部人神建日在足禁晡時除日在眼禁日入滿日在腹禁黃昏平日在背禁人定定日在心禁夜半執日在手禁雞鳴破日在口禁平旦危日在鼻禁日出成日在唇禁食時收日在頭禁寅中開日在耳禁午時閉日在目禁日映十二時忌子在踝醜在頭寅在耳卯在面午在胸未在腹申在心酉在背辰在項巳在乳亥在股戌在腰十二部人神一歲十三二十五三十七四十九六十一七十三八十五人神在心二歲十四二十六三十八五十六十二七十四八十六人神在喉三歲十五二十七三十九五十一六十三七十五八十七人神在頭四歲十六二十八四十五十二六十四七十六八十八人神在頸五歲十七二十九四十一五十三六十五七十七八十九人神在背六歲十八三十四十二五十四六十六七十八九十人神在腰七歲十九三十一四十三五十五六十七七十九九十一人神在腹八歲二十三十二四十四五十六六十八八十九十二人神在項九歲二十一三十三四十五五十七六十九八十一九十三人神在足十歲二十二三十四四十六五十八七十八十二九十四人神在腰十一歲二十三三十五四十七五十九七十一八十三九十五人神在陰十二歲二十四三十六四十八六十七十二八十四九十六人神在股九部傍通人神新忌傍通四季人神春在左脅秋在右脅夏在臍冬在腰男忌除女忌破天醫取師療病吉日正月卯日二月寅日三月丑日四月子日五月亥日六月戌日七月酉日八月申日九月未日十月午日十一月巳日十二月辰日胡侍郎奏過尻神指訣一歲十歲十九二十八三十七四六五五六四七三八二坤管叉踝二歲十一歲一十二十九三十八四七五六六五七四八三震管牙腨三歲十二歲二十一三十三十九四八五七六六七五八四巽管頭口乳四歲十三歲二十二三十一四十四九五八六七七六八五中宮管肩及尾窮骨五歲十四歲二十三三十二四一五十五九六八七七八六乾管背面耳六歲十五歲二十四三十三四二五一六十六九七八八七兌管手膊七歲十六歲二十五三十四四三五二六一七十七九八八艮管腰項八歲十七歲二十六三十五四四五三六二七一八十八九離管胸肋九歲十八歲二十七三十六四五五四六三七二八一九十坎管腳肘肚一歲十歲起二宮順行日逐人神就甲子內檢尻神者神農之所制也凡人年命巡行九宮值此尻神所在不可針灸犯者必至喪命或生癰疽宜速急醫治急病不拘此例又曰凡醫者不知此諸般避忌趨吉避凶妄亂針灸非惟不能愈疾甚者或至傷生喪命為害非輕若逢病人年命厄會處男女氣怯下手至難通人達人若遇卒急暴患何暇選擇避忌即不可拘此按以上諸禁忌惟四季所忌似合素問其餘不知何時何人所起如所謂尻神人神者果有之則不分病輕重犯之當有禍今又曰卒急何暇選擇此時人神尻神亦憫病危而不禍乎又按尻尾底骨即臀尖曰尻神則是臀尖神矣何人之一身獨臀尖為神乎是皆不可曉者也以俟能知者
